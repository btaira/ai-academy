/* ─── CONTEXT ENGINEERING PANELS ──────────────────────────────────────────────────── */

'ctx:what': () => `<div class="panel" id="panel-ctx-what">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Foundations</span> › What &amp; Why</div>
  <h1>What Is <span class="hl">Context Engineering?</span></h1>
  <p class="lead">Context engineering is the discipline of deciding what information enters the model's context window, in what order, and in what form — so the model has exactly what it needs and nothing that distracts it. If prompt engineering is writing a good instruction, context engineering is curating the entire working set the model reasons over.</p>
  <div class="info-box"><strong>The one-line definition:</strong> Prompt engineering asks "what do I say?" Context engineering asks "what should the model be able to see right now?" — across the system prompt, history, retrieved data, tool results, and memory.</div>
  <h2>Why It Became Its Own Discipline</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Early LLM use was single-turn: one prompt, one answer. Modern systems are agents and assistants that run for many turns, call tools, retrieve documents, and remember across sessions. Suddenly the question isn't just the wording of one prompt — it's how to manage a constantly-changing window of information that the model reasons over at every step.</p>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🪟</div><div class="card-title">Finite Window</div><div class="card-body">Context is bounded. You can't fit everything, so you must choose. Choosing well is the whole game.</div><span class="tag">constraint</span></div>
    <div class="card"><div class="card-icon">🎯</div><div class="card-title">Uneven Attention</div><div class="card-body">Models don't weigh all context equally. Position and relevance dramatically affect what actually gets used.</div><span class="tag amber">attention</span></div>
    <div class="card"><div class="card-icon">💰</div><div class="card-title">Every Token Costs</div><div class="card-body">Tokens cost money and latency. Bloated context is slower and more expensive — even when it fits.</div><span class="tag violet">cost</span></div>
    <div class="card"><div class="card-icon">📉</div><div class="card-title">More Can Hurt</div><div class="card-body">Irrelevant content dilutes signal and degrades quality — "context rot." More is not better.</div><span class="tag red">quality</span></div>
  </div>
  <h2>The Mindset Shift</h2>
  <div class="info-box green"><strong>From "fill the window" to "curate the window."</strong> The instinct to stuff in every possibly-relevant document is wrong. The goal is the smallest set of high-signal tokens that lets the model do the task well. Think of context as a scarce, expensive resource you allocate deliberately — not a bucket you fill.</div>
  <h2>What This Course Covers</h2>
  <ul class="checklist">
    <li>The token budget — accounting for every part of the context and allocating deliberately</li>
    <li>Ordering and position — exploiting how models attend to context</li>
    <li>Compression — summarization, distillation, and offloading to fit more signal in fewer tokens</li>
    <li>Memory systems — moving information between working context and persistent storage</li>
    <li>Just-in-time retrieval — pulling only what each step needs</li>
    <li>Agent-specific challenges, failure modes, and how to measure and tune context</li>
  </ul>
</div>`,

'ctx:budget': () => `<div class="panel" id="panel-ctx-budget">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Foundations</span> › The Token Budget</div>
  <h1>The Token <span class="hl">Budget</span></h1>
  <p class="lead">Every request to a model has a fixed token budget — the context window. Context engineering begins with treating that window like a financial budget: account for every line item, know what each costs, and spend deliberately on what delivers the most value.</p>
  <div class="info-box"><strong>The accounting mindset:</strong> Before optimizing, measure. Break your context into its components and count the tokens each consumes. You almost always find surprises — a bloated system prompt, redundant history, or tool results dwarfing everything else.</div>
  <h2>Where the Budget Goes</h2>
  <div class="code-block"><span class="code-label">// A TYPICAL CONTEXT BUDGET (illustrative, 200K window)</span>System prompt + tool definitions ......  2,000 tokens   (fixed, every call)
Retrieved documents (RAG) ............. 4,000 tokens   (varies by query)
Conversation history .................. 3,000 tokens   (grows over time)
Tool call results ..................... 8,000 tokens   (grows fast in agents)
Current user message .................. 200 tokens
Reserved for the response ............. 4,000 tokens   (don't forget this!)
                                        ---------------
Used .................................. 21,200 / 200,000

<span class="c"># Plenty of headroom here — but in a long agent run, tool results</span>
<span class="c"># and history are what eventually blow the budget.</span></div>
  <h2>Budgeting Principles</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">📏</div><div class="cap-text"><strong style="color:var(--accent)">Reserve output space</strong><span>The response shares the window. If you fill the input to the brim, the model has no room to answer (or gets truncated). Always leave headroom for the generation.</span></div></li>
    <li><div class="cap-icon">📌</div><div class="cap-text"><strong style="color:var(--accent)">Know your fixed costs</strong><span>The system prompt and tool definitions are paid on every call. Trim them ruthlessly — a bloated 4,000-token system prompt taxes every single request.</span></div></li>
    <li><div class="cap-icon">📈</div><div class="cap-text"><strong style="color:var(--accent)">Watch the growing items</strong><span>History and tool results grow without bound unless managed. These are where budgets silently blow up over a long session. Set thresholds and compress.</span></div></li>
    <li><div class="cap-icon">🧮</div><div class="cap-text"><strong style="color:var(--accent)">Right-size, don't max out</strong><span>Using a fraction of the window is fine — even ideal. Just because you have 200K tokens doesn't mean filling them helps. Lean context is faster, cheaper, and often more accurate.</span></div></li>
  </ul>
  <h2>Caching Changes the Math</h2>
  <div class="info-box green"><strong>Prompt caching:</strong> Stable prefixes (system prompt, tool definitions, fixed context) can be cached so you don't pay full price to re-send them every turn. Structure your context so the stable parts come first and the variable parts last — this maximizes cache hits and slashes cost on multi-turn workloads. On Anthropic's API, a cache write costs roughly 25% more than a normal input token, but a cache <em>read</em> costs only about 10% of the standard input price — call it a ~90% discount on repeated prefixes. OpenAI and Gemini apply caching automatically (implicit caching) on repeated prefixes, typically a ~50% discount. Either way: stable-first ordering isn't just tidy, it's the difference between paying full price every turn and paying full price once.</div>
  <h2>Current Context Windows (know your actual budget)</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">"200K window" isn't a universal constant — it varies by model family and shifts with every release. As of mid-2026, rough orders of magnitude across frontier models:</p>
  <table class="data-table">
    <tr><th>Model family</th><th>Typical context window</th><th>Note</th></tr>
    <tr><td>Claude Opus / Sonnet</td><td>~200K tokens</td><td>Some Sonnet tiers offer a 1M-token beta option</td></tr>
    <tr><td>GPT-5.x</td><td>~256K – 1M+ tokens</td><td>Varies by exact model and tier</td></tr>
    <tr><td>Gemini 3.x Pro</td><td>~1M – 2M tokens</td><td>Largest mainstream window as of 2026</td></tr>
    <tr><td>Open-weight (Llama 4 class)</td><td>Up to ~10M claimed</td><td>Effective recall degrades well before the advertised max</td></tr>
  </table>
  <div class="info-box amber"><strong>Bigger windows don't retire this discipline — they raise the stakes.</strong> A 1M-token window doesn't mean you should use 1M tokens. Independent long-context research shows quality measurably degrades well before the window fills (see Failure Modes). Budgeting discipline matters <em>more</em>, not less, as windows grow — the temptation to dump everything in scales with the room available.</div>
  <h2>Hands-On: Build a Token Budget Worksheet</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Use the rule of thumb <strong>~1.3 tokens per word</strong> (or ~4 characters per token) for English prose; code typically runs about 2x denser. Work through this worksheet for a real agent you're designing or already running.</p>
  <div class="code-block"><span class="code-label">// WORKSHEET — FILL IN YOUR OWN NUMBERS</span>Model context window:.......................... ____________ tokens
Target max input usage (e.g. 40% of window):... ____________ tokens
Reserved for output:............................ ____________ tokens

Component                          Words   Tokens (words x 1.3)
------------------------------------------------------------------
System prompt                      ______  ______
Tool definitions (n tools x avg)   ______  ______
Retrieved docs / RAG chunks        ______  ______
Conversation history (current)     ______  ______
Tool call results (current)        ______  ______
Current user message               ______  ______
------------------------------------------------------------------
TOTAL INPUT                                ______

<span class="c"># Check: TOTAL INPUT + Reserved-for-output  &lt;=  Target max input usage?</span>
<span class="c"># If not: what's the single largest line item, and which compression</span>
<span class="c"># technique (next module) would cut it the most?</span></div>
  <div class="info-box"><strong>Try it now:</strong> A 300-word system prompt is ~390 tokens. Five tool definitions averaging 150 words each is ~975 tokens. A 2,000-word conversation history is ~2,600 tokens. Add up a real or planned agent's components against the window for your actual model from the table above — most people are surprised which line item dominates once they do the arithmetic instead of guessing.</div>
</div>`,

'ctx:anatomy': () => `<div class="panel" id="panel-ctx-anatomy">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Foundations</span> › Anatomy of Context</div>
  <h1>Anatomy of <span class="hl">Context</span></h1>
  <p class="lead">A model's context is assembled from several distinct components, each with its own purpose, cost behavior, and management strategy. Understanding the anatomy lets you optimize each part independently.</p>
  <h2>The Components</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">System Prompt — the persistent brief <span class="acc-arrow">▾</span></div><div class="acc-body">Defines role, rules, output standards, and stable context. Paid on every request, so keep it tight. This is the highest-leverage real estate — a clear system prompt shapes every response, but a bloated one taxes every call. Put the most important rules at the very top.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Tool Definitions — available capabilities <span class="acc-arrow">▾</span></div><div class="acc-body">Schemas describing the tools the model can call. Also fixed-cost per call. Only include tools relevant to the current task — a model with 40 tools loaded spends tokens on all of them and is more likely to choose wrong. Load tools situationally where possible.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Retrieved Knowledge — just-in-time facts <span class="acc-arrow">▾</span></div><div class="acc-body">Documents, datasheet chunks, search results pulled in to ground the answer (RAG). Variable per query. The art is retrieving only what's relevant — high recall without dumping the whole knowledge base into the window.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Conversation History — the thread <span class="acc-arrow">▾</span></div><div class="acc-body">Prior turns of the dialogue. Grows linearly with the conversation. Must be compressed (summarized) or truncated past a threshold, or it eventually consumes the whole window.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Tool Results — observations <span class="acc-arrow">▾</span></div><div class="acc-body">Outputs returned from tool calls. The fastest-growing component in agentic systems — one verbose API response can be thousands of tokens. Aggressive management here (filtering, summarizing, offloading) is the core of agent context engineering.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Memory — retrieved persistence <span class="acc-arrow">▾</span></div><div class="acc-body">Relevant facts pulled from long-term storage: user preferences, prior session summaries, learned facts. Bridges the gap between a single stateless context window and a system that "remembers" across time.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Current Input — the task <span class="acc-arrow">▾</span></div><div class="acc-body">The user's actual request for this turn. Usually small, and best placed at the end of the context where the model attends most strongly.</div></div>
  <h2>Visualizing the Stack</h2>
  <div class="code-block"><span class="code-label">// CONTEXT ASSEMBLED, TOP TO BOTTOM</span>┌─────────────────────────────┐  ← high attention (start)
│ SYSTEM PROMPT + TOOLS       │     stable, cacheable
├─────────────────────────────┤
│ RETRIEVED KNOWLEDGE         │     varies per query
│ MEMORY                      │     pulled from storage
├─────────────────────────────┤
│ CONVERSATION HISTORY        │     compressed if long
│ TOOL RESULTS                │     filtered / offloaded
├─────────────────────────────┤
│ CURRENT USER INPUT          │  ← high attention (end)
└─────────────────────────────┘
│ ...space reserved for output │</div>
  <div class="info-box"><strong>Each part is a separate optimization target.</strong> You compress history differently than you trim tool definitions or retrieve knowledge. Treating context as one undifferentiated blob hides where the real costs and wins are.</div>
</div>`,

'ctx:ordering': () => `<div class="panel" id="panel-ctx-ordering">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Core Techniques</span> › Ordering &amp; Position</div>
  <h1>Ordering <span class="hl">&amp; Position</span></h1>
  <p class="lead">Where information sits in the context window dramatically affects how much the model uses it. Models attend unevenly — exploiting this is one of the cheapest, highest-impact context-engineering levers available.</p>
  <div class="info-box amber"><strong>The "lost in the middle" effect:</strong> Research consistently shows LLMs recall information at the <span class="hl">beginning</span> and <span class="hl">end</span> of the context far better than content buried in the middle. Attention is U-shaped. A critical fact placed in the middle of a long context can be effectively invisible.</div>
  <h2>The Optimal Order</h2>
  <div class="code-block"><span class="code-label">// HIGH-SIGNAL POSITIONS AT THE EDGES</span>1. SYSTEM PROMPT          ← start: strong attention, sets the frame
2. Stable reference / tools
3. Retrieved documents
4. Conversation history    ← middle: weakest attention (compress here)
5. Most relevant retrieved fact
6. CURRENT TASK / QUESTION  ← end: strongest attention, immediate intent

<span class="c"># Rule: put what matters most where attention is strongest —</span>
<span class="c"># the start (framing) and the end (the actual ask).</span></div>
  <h2>Practical Ordering Tactics</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔝</div><div class="cap-text"><strong style="color:var(--accent)">Critical rules at top AND bottom</strong><span>For must-follow constraints, state them in the system prompt and restate them right before the task. Both high-attention zones reinforce compliance.</span></div></li>
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">Most relevant retrieval last</strong><span>When injecting retrieved chunks, place the highest-scoring one closest to the question (the end), not first. Recency weighting favors what's nearest the query.</span></div></li>
    <li><div class="cap-icon">🗜</div><div class="cap-text"><strong style="color:var(--accent)">Compress the middle</strong><span>Since the middle is the low-attention zone, it's the right place for the most compressed content — summarized history rather than verbose transcripts.</span></div></li>
    <li><div class="cap-icon">📍</div><div class="cap-text"><strong style="color:var(--accent)">Label sections clearly</strong><span>Use headers or XML tags to delimit context sections. Clear structure helps the model locate and use the right information regardless of position.</span></div></li>
  </ul>
  <h2>Stable-First for Caching</h2>
  <div class="info-box green"><strong>Ordering also serves caching:</strong> Prompt caching works on stable prefixes. Putting unchanging content (system prompt, tool defs, fixed reference) first — and variable content (this turn's query, fresh tool results) last — maximizes cache hits. Good ordering serves both attention and cost at once.</div>
</div>`,

'ctx:compression': () => `<div class="panel" id="panel-ctx-compression">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Core Techniques</span> › Compression</div>
  <h1><span class="hl">Compression</span></h1>
  <p class="lead">Compression fits more signal into fewer tokens — distilling verbose content down to its essential information. It's how long conversations, large documents, and sprawling tool outputs stay within budget without losing what matters.</p>
  <h2>Compression Techniques</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'cx1','cx-summ')">Summarization</button>
    <button class="tab-btn" onclick="switchTab(this,'cx1','cx-distill')">Distillation</button>
    <button class="tab-btn" onclick="switchTab(this,'cx1','cx-offload')">Offloading</button>
    <button class="tab-btn" onclick="switchTab(this,'cx1','cx-filter')">Filtering</button>
  </div>
  <div id="cx1">
    <div class="tab-content active" id="cx-summ">
      <h2>Rolling Summarization</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">As conversation history grows past a threshold, summarize the oldest turns into a compact paragraph and discard the originals. Typical compression: 10:1 or more.</p>
      <div class="code-block"><span class="code-label">// ROLLING SUMMARY TRIGGER</span>IF history_tokens > 4000:
    old_turns   = history[:-6]              <span class="c"># keep last 6 verbatim</span>
    summary     = llm("Summarize the key facts, decisions, and "
                      "open threads from this conversation:", old_turns)
    history     = [summary] + history[-6:]  <span class="c"># replace old with summary</span>

<span class="c"># The recent turns stay sharp; older context becomes a dense summary.</span></div>
      <div class="info-box"><strong>Preserve the essentials:</strong> A good summary keeps decisions made, facts established, user preferences, and unresolved threads. It drops pleasantries, redundancy, and abandoned tangents.</div>
    </div>
    <div class="tab-content" id="cx-distill">
      <h2>Distillation / Extraction</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Before injecting a document, extract only the fields or facts the task needs. A 5,000-token transcript might distill to a 300-token structured note.</p>
      <div class="code-block"><span class="code-label">// EXTRACT BEFORE INJECTING</span><span class="c"># Instead of dumping a full meeting transcript into context:</span>
distilled = llm("Extract from this transcript: decisions made, "
                "action items with owners, and open questions. "
                "Output as a short structured list.", transcript)

<span class="c"># Inject the 300-token distilled note, not the 5,000-token transcript.</span></div>
    </div>
    <div class="tab-content" id="cx-offload">
      <h2>Context Offloading</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Move bulky detail out of the window into external storage (a file, scratchpad, or note), keeping only a reference or summary in context. Retrieve the full detail on demand.</p>
      <div class="code-block"><span class="code-label">// OFFLOAD DETAIL, KEEP A POINTER</span><span class="c"># The agent writes detailed findings to a file...</span>
write_file("research_notes.md", long_detailed_findings)

<span class="c"># ...and keeps only a one-line reference in context:</span>
context += "Detailed findings saved to research_notes.md "
context += "(covers vendors A, B, C pricing). Read it when needed."

<span class="c"># The window stays lean; full detail is a tool-call away.</span></div>
      <div class="info-box violet"><strong>The scratchpad pattern:</strong> Let the model maintain an external "working memory" file it can write to and read from. This externalizes detail that would otherwise bloat every turn's context — the model pulls back only the piece it currently needs.</div>
    </div>
    <div class="tab-content" id="cx-filter">
      <h2>Filtering Tool Results</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Tool outputs are often verbose — pages of JSON when you need three fields. Filter before the result enters context.</p>
      <div class="code-block"><span class="code-label">// FILTER A VERBOSE TOOL RESULT</span><span class="c"># A search API returns 50 results with 30 fields each (huge).</span>
raw = search_api(query)            <span class="c"># ~15,000 tokens</span>

<span class="c"># Keep only what the model needs to reason:</span>
filtered = [{title, url, snippet} for r in raw[:5]]   <span class="c"># ~500 tokens</span>

<span class="c"># Inject 'filtered' into context, not 'raw'.</span></div>
    </div>
  </div>
  <h2>Compression Tradeoffs</h2>
  <div class="info-box amber"><strong>Compression is lossy — be deliberate about what you lose.</strong> Over-aggressive summarization can drop a detail that mattered later. Keep recent content verbatim (where errors are costly), compress older content (where gist suffices), and when in doubt offload to retrievable storage rather than discarding outright.</div>
  <h2>Hands-On: Calculate Your Compression Ratio</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">"10:1 compression" is a claim you should verify, not assume. Walk through a real example with actual numbers.</p>
  <div class="code-block"><span class="code-label">// WORKED EXAMPLE — ROLLING SUMMARIZATION</span>Original: 14 conversation turns, ~3,400 words  -&gt;  ~4,420 tokens (x1.3)
Summary:  1 paragraph, ~140 words             -&gt;  ~180 tokens (x1.3)

Compression ratio = original_tokens / summary_tokens
                   = 4,420 / 180
                   = <span class="hl">24.5 : 1</span>

Tokens freed       = 4,420 - 180 = 4,240 tokens
% of a 200K window freed = 4,240 / 200,000 = 2.1%
% of a 30K "working budget" freed = 4,240 / 30,000 = 14.1%

<span class="c"># The same absolute savings matters far more in a tight working</span>
<span class="c"># budget than in a huge window — compression ROI scales inversely</span>
<span class="c"># with how constrained your actual operating budget is.</span></div>
  <div class="info-box"><strong>Now do it with your own data:</strong> Take a real transcript or tool-result log. Count words (or paste into a tokenizer) before and after summarizing it with an LLM call. Compute the ratio with the formula above. Then ask the harder question: did the summary preserve every fact a later turn actually needed? Run the compressed version through a downstream task and check whether the answer changes — that's your real compression quality metric, not the ratio alone.</div>
  <table class="data-table">
    <tr><th>Technique</th><th>Typical ratio</th><th>Best for</th></tr>
    <tr><td>Rolling summarization</td><td>10:1 – 25:1</td><td>Older conversation turns</td></tr>
    <tr><td>Distillation / extraction</td><td>15:1 – 30:1</td><td>Structured docs, transcripts</td></tr>
    <tr><td>Filtering (field selection)</td><td>20:1 – 50:1</td><td>Verbose API / tool JSON</td></tr>
    <tr><td>Offloading</td><td>effectively &infin;:1 in-context</td><td>Large detail rarely re-read</td></tr>
  </table>
</div>`,

'ctx:memory': () => `<div class="panel" id="panel-ctx-memory">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Core Techniques</span> › Memory Systems</div>
  <h1>Memory <span class="hl">Systems</span></h1>
  <p class="lead">A context window is working memory — transient, bounded, gone when the session ends. Real assistants need to remember across turns and sessions. Memory systems bridge that gap, moving information between the finite context and persistent external storage.</p>
  <div class="info-box"><strong>Working memory vs. long-term memory:</strong> Context is what the model sees right now (working memory). External memory is durable storage (long-term memory). Context engineering manages the flow between them — writing important things out, and reading relevant things back in just-in-time.</div>
  <h2>Types of Memory</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">📅</div><div class="card-title">Episodic</div><div class="card-body">Records of past events and interactions — "what happened." Prior conversation summaries, session histories.</div><span class="tag">events</span></div>
    <div class="card"><div class="card-icon">📚</div><div class="card-title">Semantic</div><div class="card-body">Facts and knowledge — "what is true." User preferences, learned facts, domain knowledge.</div><span class="tag amber">facts</span></div>
    <div class="card"><div class="card-icon">🔧</div><div class="card-title">Procedural</div><div class="card-body">Know-how — "how to do things." Workflows, learned routines, successful patterns from past tasks.</div><span class="tag violet">skills</span></div>
  </div>
  <h2>The Memory Loop</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// WRITE OUT, RETRIEVE BACK</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-accent" style="text-align:center;min-width:100px;"><div class="node-eyebrow">during</div><div class="node-name" style="font-size:12px;">Extract Facts</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:100px;"><div class="node-eyebrow">write</div><div class="node-name" style="font-size:12px;">Store (DB/file)</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:100px;"><div class="node-eyebrow">later</div><div class="node-name" style="font-size:12px;">Retrieve Relevant</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-green" style="text-align:center;min-width:100px;"><div class="node-eyebrow">inject</div><div class="node-name" style="font-size:12px;">Into Context</div></div>
    </div>
  </div>
  <h2>Implementation Approaches</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔍</div><div class="cap-text"><strong style="color:var(--accent)">Vector store memory</strong><span>Embed memories; retrieve the most semantically relevant ones for the current context. Scales to large memory stores. (This is RAG applied to memory.)</span></div></li>
    <li><div class="cap-icon">📄</div><div class="cap-text"><strong style="color:var(--accent)">Structured profile</strong><span>Maintain a compact, explicit record (user preferences, key facts) that's selectively injected. Simple, predictable, easy to inspect and edit.</span></div></li>
    <li><div class="cap-icon">📝</div><div class="cap-text"><strong style="color:var(--accent)">Summary memory</strong><span>Roll up each session into a summary stored for the next. The assistant "remembers" the gist of prior conversations without replaying them.</span></div></li>
    <li><div class="cap-icon">🗂</div><div class="cap-text"><strong style="color:var(--accent)">File-based scratchpad</strong><span>The agent maintains notes in files it can read and write — externalizing memory the model manages itself during a long task.</span></div></li>
  </ul>
  <div class="info-box amber"><strong>Don't over-remember:</strong> Injecting too much memory is just another form of context bloat. Retrieve only memories relevant to the current task, and prune stale or low-value memories over time. Relevance, not completeness, is the goal.</div>
</div>`,

'ctx:retrieval': () => `<div class="panel" id="panel-ctx-retrieval">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Core Techniques</span> › Just-in-Time Retrieval</div>
  <h1>Just-in-Time <span class="hl">Retrieval</span></h1>
  <p class="lead">The opposite of stuffing everything into context up front is retrieving exactly what each step needs, when it needs it. Just-in-time retrieval keeps the working window lean and focused — mirroring how a person opens the single reference they need rather than spreading every document across the desk.</p>
  <div class="info-box"><strong>Pre-loading vs. just-in-time:</strong> Pre-loading dumps all potentially-relevant data into context at the start. Just-in-time keeps context minimal and fetches specific information on demand via tools or retrieval. For anything beyond small, fixed knowledge, just-in-time wins on cost, speed, and focus.</div>
  <h2>The Core Idea</h2>
  <div class="code-block"><span class="code-label">// PRE-LOAD (wasteful) vs JUST-IN-TIME (lean)</span><span class="c">// Pre-load: inject all 200 product specs up front</span>
context = system_prompt + ALL_PRODUCT_SPECS   <span class="c">// 60,000 tokens, mostly unused</span>

<span class="c">// Just-in-time: give the model a lookup tool, fetch on demand</span>
context = system_prompt + tool("lookup_spec")  <span class="c">// 2,000 tokens</span>
<span class="c">// Model calls lookup_spec("MAX17761") only when it needs that one.</span></div>
  <h2>Patterns for Just-in-Time</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Retrieval tools over pre-loading <span class="acc-arrow">▾</span></div><div class="acc-body">Give the model a tool to fetch information (search, lookup, read-file) rather than pre-injecting everything. The model pulls what it needs as the task unfolds. Keeps the baseline context tiny and lets the model handle arbitrarily large knowledge bases.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Progressive disclosure <span class="acc-arrow">▾</span></div><div class="acc-body">Start with a high-level index or table of contents in context; let the model drill into specific sections on demand. It sees the map first, then requests the territory it actually needs. Efficient for large structured corpora.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Metadata-first retrieval <span class="acc-arrow">▾</span></div><div class="acc-body">Retrieve lightweight metadata (titles, summaries, IDs) first, let the model decide which full documents are worth pulling, then fetch only those. Two-stage retrieval that avoids loading full content speculatively.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Hybrid: pre-load core + retrieve rest <span class="acc-arrow">▾</span></div><div class="acc-body">Pre-load the small, always-needed core (key conventions, the current task) and retrieve everything else on demand. The pragmatic middle ground — instant access to essentials, lean window for the long tail.</div></div>
  <h2>The Tradeoff</h2>
  <div class="info-box amber"><strong>Just-in-time costs round-trips.</strong> Each retrieval is an extra step (latency). For small, fixed knowledge that's always needed, pre-loading is simpler and faster. Reserve just-in-time for large, varied, or rarely-needed information — which is most real-world knowledge. The skill is knowing which is which.</div>
</div>`,

'ctx:agents': () => `<div class="panel" id="panel-ctx-agents">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Advanced</span> › Context for Agents</div>
  <h1>Context for <span class="hl">Agents</span></h1>
  <p class="lead">Agents are where context engineering gets hardest. An agent runs for many steps, accumulating tool results and reasoning at every turn. Without active management, the context window fills with stale observations and the agent degrades or fails. Context engineering is arguably the central challenge of building reliable agents.</p>
  <div class="info-box red"><strong>The core problem:</strong> Each agent step appends the model's reasoning plus the tool result. Over dozens of steps, this grows relentlessly. A 50-step agent can accumulate hundreds of thousands of tokens of history — most of it no longer relevant — crowding out the task itself.</div>
  <h2>Agent Context Strategies</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Compact tool results immediately <span class="acc-arrow">▾</span></div><div class="acc-body">Don't keep raw tool outputs in history. As soon as a tool returns, extract the relevant signal and store only that. A web search that returned 10,000 tokens becomes a 200-token summary of what was learned. This single discipline is the biggest lever in agent context management.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Offload to a scratchpad / files <span class="acc-arrow">▾</span></div><div class="acc-body">Let the agent write findings to external files and keep only references in context. The agent's working window stays focused on the current sub-task; it reads back detail only when needed. Externalizing state is how agents handle tasks larger than any single context window.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Context handoff / compaction <span class="acc-arrow">▾</span></div><div class="acc-body">At a checkpoint, summarize the agent's progress (what's done, what remains, key facts learned) into a compact handoff, then start a fresh context seeded with just that summary. This "compaction" resets the bloat while preserving the thread — essential for very long-running agents.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Sub-agents with isolated context <span class="acc-arrow">▾</span></div><div class="acc-body">Delegate sub-tasks to separate agent instances, each with its own clean context window. The sub-agent does deep work in isolation and returns only a concise result to the orchestrator. This keeps the main agent's context small while enabling deep exploration in branches.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Prune completed steps <span class="acc-arrow">▾</span></div><div class="acc-body">Once a sub-goal is achieved and its details no longer matter, collapse those steps into a single "completed: X" marker. The agent doesn't need the full trace of how it accomplished step 3 while working on step 9 — just that it's done.</div></div>
  <h2>The Long-Running Agent Pattern</h2>
  <div class="code-block"><span class="code-label">// COMBINED STRATEGY FOR A LONG AGENT</span>Every step:
  1. Call tool -> get result
  2. Extract signal -> discard raw result
  3. Append concise observation to working context

When context exceeds threshold:
  4. Write detailed state to a file (offload)
  5. Compact history into a progress summary
  6. Continue with: [summary] + [recent steps] + [current goal]

For deep sub-tasks:
  7. Spawn sub-agent with clean context
  8. Sub-agent returns only its conclusion</div>
  <div class="info-box green"><strong>The throughline:</strong> Reliable agents treat context as a actively-managed resource, not an append-only log. Compact, offload, hand off, and isolate — keep the working window focused on the now, with everything else a retrieval away.</div>
  <h2>These Patterns Are Now Built Into Provider APIs</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Context management for agents has moved from "something you hand-roll" to a first-class API feature. Anthropic's Claude API ships explicit primitives for exactly the strategies above:</p>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🧹</div><div class="card-title">Context Editing</div><div class="card-body">A server-side <code class="inline">clear_tool_uses</code> strategy automatically clears old tool results once input tokens cross a configured threshold, while keeping a placeholder so the model still knows an action happened. You set the trigger (e.g. 30,000 input tokens) and how many recent tool uses to keep verbatim.</div><span class="tag">automatic</span></div>
    <div class="card"><div class="card-icon">🗃</div><div class="card-title">Memory Tool</div><div class="card-body">A file-system-style tool that lets the model write and read its own memory files across a session — the "scratchpad" pattern, but provided natively rather than hand-built with a custom tool.</div><span class="tag amber">native</span></div>
    <div class="card"><div class="card-icon">🤝</div><div class="card-title">Combined Effect</div><div class="card-body">When paired, the model gets a warning before context editing clears old content, and can proactively write the important bits to a memory file first — so compaction loses tokens, not information.</div><span class="tag violet">resilient</span></div>
  </div>
  <div class="code-block"><span class="code-label">// ILLUSTRATIVE — ANTHROPIC CONTEXT-EDITING CONFIG SHAPE</span>context_management = {
  "edits": [{
    "type": "clear_tool_uses_20250919",
    "trigger": { "type": "input_tokens", "value": 30000 },
    "keep": { "type": "tool_uses", "value": 3 },
    "exclude_tools": ["critical_database_query"]
  }]
}
<span class="c">// Tool calls stay visible; their (often huge) results get cleared</span>
<span class="c">// once the conversation crosses 30K input tokens, keeping the 3</span>
<span class="c">// most recent tool results intact for continuity.</span></div>
  <h2>Hands-On: Design Your Compaction Policy</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">For an agent you run (or plan to run) more than ~10 steps, answer these concretely — don't leave them abstract:</p>
  <div class="code-block"><span class="code-label">// COMPACTION POLICY WORKSHEET</span>1. Trigger threshold: at what input-token count do you compact?
   ____________ tokens  (e.g. 40% of your model's window)

2. Keep-verbatim window: how many of the most recent steps/tool
   results stay uncompressed?
   ____________ steps

3. What gets extracted before clearing? (be specific, not "important stuff")
   - Decisions made: ____________
   - Facts established: ____________
   - Open threads / TODOs: ____________

4. Where does cleared detail go — discarded, or offloaded to a
   file/memory store the agent can re-read?
   ____________

5. Which tools are exempt from clearing (e.g. a tool whose result
   the agent must always see)?
   ____________</div>
  <div class="info-box"><strong>Test it against a failure case:</strong> Pick the longest real run you have logs for. At the step where it started to degrade or lose track of something, would your policy above have caught it? If you can't answer, your trigger threshold is probably too high or your "what gets extracted" answer is too vague.</div>
</div>`,

'ctx:failures': () => `<div class="panel" id="panel-ctx-failures">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Advanced</span> › Failure Modes</div>
  <h1>Context <span class="hl">Failure Modes</span></h1>
  <p class="lead">When context is poorly engineered, models fail in characteristic ways. Recognizing these failure modes lets you diagnose problems quickly — and most trace back to too much, poorly-ordered, or conflicting context.</p>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🌫 Context Rot <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> Quality degrades as the context fills, even within the window limit, and even on tasks that should be trivial (like exact retrieval). <strong>Cause:</strong> Accumulated low-signal content dilutes attention; the model loses the thread among noise. <strong>Fix:</strong> Compress aggressively, prune stale content, keep the window lean. More context is not better.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🕳 Lost in the Middle <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> The model ignores a fact that's clearly present in the context. <strong>Cause:</strong> The fact sits in the low-attention middle of a long context. <strong>Fix:</strong> Move critical information to the start or end; shorten the context so there's no neglected middle.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">⚔️ Context Conflict / Poisoning <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> The model gives inconsistent or wrong answers, seemingly contradicting itself. <strong>Cause:</strong> The context contains conflicting information — outdated facts alongside current ones, or a hallucination that got written into memory and keeps getting retrieved. <strong>Fix:</strong> Deduplicate, version, and validate what enters context and memory; remove superseded content.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📉 Distraction <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> The model fixates on irrelevant retrieved content or goes off on a tangent. <strong>Cause:</strong> Loosely-relevant material was retrieved and pulled the model's focus. <strong>Fix:</strong> Improve retrieval precision (reranking, filtering); inject only high-relevance content.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">✂️ Truncation Loss <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> The model forgets something from earlier in a long conversation. <strong>Cause:</strong> Older content was silently dropped when the window filled. <strong>Fix:</strong> Summarize before truncating (don't just cut); offload important earlier content to retrievable memory.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔀 Tool Overload <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Symptom:</strong> The model picks the wrong tool or misuses tools. <strong>Cause:</strong> Too many tool definitions loaded at once; the model can't reliably choose. <strong>Fix:</strong> Load only the tools relevant to the current task; group and gate tools situationally.</div></div>
  <div class="info-box green"><strong>The common root:</strong> Nearly every failure mode is a symptom of unmanaged context — too much, badly ordered, conflicting, or carelessly truncated. The cure is almost always the same: less, cleaner, better-ordered context.</div>
  <h2>The Evidence: Context Rot Is Measured, Not Folklore</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Chroma's "Context Rot" study evaluated 18 frontier models (including GPT-4.1, Claude 4, and Gemini 2.5) on controlled long-context tasks and found that reliability declines <strong>continuously</strong> as input length grows — not as a cliff at the window limit, but as a steady slope. A model with a 200K-token window can show significant degradation by 50K tokens, well under a quarter full. Distractor content, ambiguous needle-haystack similarity, and how the surrounding text is structured all make it worse, independent of whether the relevant fact is technically "in the window."</p>
  <div class="info-box red"><strong>The practical takeaway:</strong> Don't treat "fits in the context window" as a quality bar. Test your actual task at realistic context lengths, not just toy examples — a RAG pipeline that returns perfect answers with 3 retrieved chunks may degrade noticeably with 15, even though all 15 fit comfortably.</div>
</div>`,

'ctx:measure': () => `<div class="panel" id="panel-ctx-measure">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Advanced</span> › Measuring &amp; Tuning</div>
  <h1>Measuring <span class="hl">&amp; Tuning</span></h1>
  <p class="lead">Context engineering, like any engineering, improves through measurement. You can't optimize what you don't observe — so instrument your context, track what matters, and tune systematically rather than by intuition.</p>
  <h2>What to Measure</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🔢</div><div class="card-title">Token Breakdown</div><div class="card-body">How many tokens does each context component consume per request? Reveals where the budget actually goes — usually surprising.</div><span class="tag">cost</span></div>
    <div class="card"><div class="card-icon">📈</div><div class="card-title">Context Growth</div><div class="card-body">How fast does context grow over a session or agent run? Identifies the runaway components before they blow the budget.</div><span class="tag amber">trend</span></div>
    <div class="card"><div class="card-icon">🎯</div><div class="card-title">Utilization</div><div class="card-body">What fraction of the window is used? Are you near limits (risk) or wastefully padding (cost)?</div><span class="tag violet">efficiency</span></div>
    <div class="card"><div class="card-icon">✅</div><div class="card-title">Task Quality</div><div class="card-body">Does the output actually improve when you add/remove context? The metric that ultimately matters.</div><span class="tag green">outcome</span></div>
  </div>
  <h2>The Tuning Loop</h2>
  <div class="code-block"><span class="code-label">// SYSTEMATIC CONTEXT TUNING</span>1. INSTRUMENT — log token counts per component, per request
2. BASELINE   — measure task quality with current context
3. HYPOTHESIZE — "the history is too long" / "retrieval is noisy"
4. CHANGE ONE — adjust a single thing (compress history, rerank, trim tools)
5. MEASURE    — did quality hold/improve? did cost drop?
6. KEEP/REVERT — based on the evidence, not intuition
7. REPEAT</div>
  <h2>The Counter-Intuitive Test</h2>
  <div class="info-box"><strong>Try removing context, not just adding it.</strong> The instinct is always to add more when quality is poor. But often the fix is removal — cutting noisy retrieval, trimming a bloated system prompt, dropping stale history. Regularly test: "does quality hold if I remove this?" You'll frequently find leaner context performs better and cheaper.</div>
  <h2>Tooling</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔭</div><div class="cap-text"><strong style="color:var(--accent)">Tracing platforms</strong><span>LangSmith, Phoenix, Langfuse — capture the full context sent on each call so you can inspect exactly what the model saw and how big it was.</span></div></li>
    <li><div class="cap-icon">🧮</div><div class="cap-text"><strong style="color:var(--accent)">Token counters</strong><span>Use the provider's tokenizer to measure components precisely before sending. Build a habit of knowing your token budget per request.</span></div></li>
    <li><div class="cap-icon">📋</div><div class="cap-text"><strong style="color:var(--accent)">Eval sets</strong><span>A golden set of tasks lets you measure whether a context change actually improved outcomes — not just whether it felt better.</span></div></li>
  </ul>
</div>`,

'ctx:patterns': () => `<div class="panel" id="panel-ctx-patterns">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Training</span> › Pattern Library</div>
  <h1>Pattern <span class="hl">Library</span></h1>
  <p class="lead">A consolidated reference of the core context-engineering patterns, each with when-to-use guidance. Reach for these as building blocks when designing any LLM system.</p>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🗜 Compact — summarize on threshold <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> conversation or agent history grows long. <strong>How:</strong> when context exceeds a threshold, summarize older content into a compact form and replace the originals. Keeps recent content sharp, older content dense.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📤 Offload — externalize detail <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> bulky detail is needed sometimes but not always. <strong>How:</strong> write detail to files/storage, keep a reference in context, retrieve on demand. The scratchpad pattern.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔍 Retrieve — just-in-time fetch <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> knowledge base is large or varied. <strong>How:</strong> give the model retrieval tools instead of pre-loading; fetch only what each step needs. Lean baseline context.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🎯 Filter — trim before injecting <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> tool results or documents are verbose. <strong>How:</strong> extract only the relevant fields/facts before the content enters context. Reranking and field selection.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📊 Order — edges for what matters <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> always. <strong>How:</strong> place critical content at the start and end of context; compress the middle; restate key rules near the task.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🪪 Isolate — sub-agent contexts <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> a sub-task needs deep exploration. <strong>How:</strong> delegate to a sub-agent with a clean window; return only the conclusion to the main context.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔄 Hand off — compaction reset <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> a single agent run outgrows the window. <strong>How:</strong> summarize progress into a handoff, start fresh context seeded with it. Preserves the thread, resets the bloat.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">💾 Remember — persistent memory <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Use when:</strong> information must survive across sessions. <strong>How:</strong> write facts/summaries to durable storage; retrieve relevant ones just-in-time into context.</div></div>
  <div class="info-box green"><strong>These compose.</strong> A production agent might use Order + Filter + Compact + Offload + Isolate together. Context engineering is assembling the right combination for your system's shape and scale.</div>
</div>`,
