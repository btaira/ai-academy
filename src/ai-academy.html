'llm:cheatsheet': () => `<div class="panel" id="panel-llm-cheatsheet">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Training</span> › Quick Reference</div>
  <h1>Quick <span class="hl">Reference</span></h1>
  <div class="cheat-grid">
    <div class="cheat-card"><h3>The Pipeline</h3><ul class="checklist"><li>Text → Tokens → Embeddings</li><li>→ Transformer layers (attention + FFN)</li><li>→ Next-token probability → sample</li><li>→ Repeat (autoregressive)</li></ul></div>
    <div class="cheat-card"><h3>Tokens</h3><ul class="checklist"><li>~0.75 words per token (English)</li><li>Cost &amp; context measured in tokens</li><li>Numbers/letters tokenize awkwardly</li><li>BPE, SentencePiece, WordPiece</li></ul></div>
    <div class="cheat-card"><h3>Attention</h3><ul class="checklist"><li>Every token attends to every other</li><li><span class="hl">Q</span>uery · <span class="hl">K</span>ey → weights → <span class="hl">V</span>alue</li><li>Multi-head = many relationship types</li><li>GQA / MLA shrink the KV cache</li><li>N-squared cost → context limits</li></ul></div>
    <div class="cheat-card"><h3>Training Stages</h3><ul class="checklist"><li><span class="hl">Pre-training</span> — next-token prediction</li><li><span class="hl">SFT</span> — instruction following</li><li><span class="hl">RLHF / DPO / RLAIF</span> — preferences</li><li>Constitutional AI — principled critique</li></ul></div>
    <div class="cheat-card"><h3>Inference</h3><ul class="checklist"><li><span class="hl">Temperature</span> — 0 focused, 1 creative</li><li><span class="hl">Top-p / Top-k</span> — limit token pool</li><li>KV cache — speeds generation</li><li>Speculative decoding / quantization — go faster</li></ul></div>
    <div class="cheat-card"><h3>Why It Fails</h3><ul class="checklist"><li>Hallucination — plausible ≠ true</li><li>Knowledge cutoff — frozen weights</li><li>Math/counting — token-level blindness</li><li>Lost in the middle — context position</li></ul></div>
  </div>
</div>`,



/* ─── AI FOR HARDWARE ENGINEERS PANELS ──────────────────────────────────────────────────── */

'hwai:intro': () => `<div class="panel" id="panel-hwai-intro">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Orientation</span> › AI in the HW Lab</div>
  <h1>AI in the <span class="hl">Hardware Lab</span></h1>
  <p class="lead">Hardware engineering is a domain of precise specifications, safety-critical decisions, and dense technical documentation — exactly the kind of work where AI can save enormous time, and exactly where careless AI use is most dangerous. This course is about using AI as a force multiplier without ever compromising engineering rigor.</p>
  <div class="info-box"><strong>The framing for this whole course:</strong> AI is a research accelerator and a tireless first-pass reviewer — never the final authority. A qualified engineer owns every decision. Used that way, it's one of the highest-leverage tools to enter the hardware lab in years.</div>
  <h2>Where AI Genuinely Helps in Hardware</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">📋</div><div class="card-title">Standards Navigation</div><div class="card-body">Find and summarize relevant clauses across thousand-page standards (IEC 62368-1, UL, OCP) in seconds — then verify against the source.</div><span class="tag">compliance</span></div>
    <div class="card"><div class="card-icon">📐</div><div class="card-title">Design Review</div><div class="card-body">A tireless second set of eyes flagging candidate issues — missing protection, spacing concerns, unconnected nets — for engineer investigation.</div><span class="tag amber">review</span></div>
    <div class="card"><div class="card-icon">📦</div><div class="card-title">BOM Analysis</div><div class="card-body">Spot EOL risk, single-source parts, inconsistencies, and find alternates across large bills of materials.</div><span class="tag violet">sourcing</span></div>
    <div class="card"><div class="card-icon">📊</div><div class="card-title">Test Data</div><div class="card-body">Summarize large datasets, surface anomalies and trends across stress cycles, and draft analysis narratives.</div><span class="tag green">data</span></div>
    <div class="card"><div class="card-icon">📝</div><div class="card-title">Documentation</div><div class="card-body">Draft design rationales, test reports, and procedures from notes — freeing engineers for engineering.</div><span class="tag">docs</span></div>
    <div class="card"><div class="card-icon">🔎</div><div class="card-title">Datasheet Q&A</div><div class="card-body">Ask natural-language questions across hundreds of datasheets with grounded, cited answers (RAG).</div><span class="tag amber">retrieval</span></div>
  </div>
  <h2>The Value Proposition</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Hardware engineers spend a large fraction of their time on information retrieval and documentation — finding the right clause, cross-referencing datasheets, writing reports, sifting test logs. These are precisely the tasks AI accelerates, freeing senior engineers to focus on judgment, design, and verification.</p>
  <div class="info-box green"><strong>Course path:</strong> We start with the safety guardrails that govern everything (next module), then work through concrete applications — schematic review, compliance interpretation, BOM analysis, test data, documentation, and datasheet RAG — and close with how to roll this out across a team responsibly.</div>
</div>`,

'hwai:guardrails': () => `<div class="panel" id="panel-hwai-guardrails">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Orientation</span> › Safety Guardrails</div>
  <h1>Safety <span class="hl">Guardrails</span></h1>
  <p class="lead">In safety-critical hardware, an AI error isn't a typo — it can mean a fire, a shock hazard, a failed certification, or a recall. These guardrails are non-negotiable. Internalize them before applying AI to any engineering task.</p>
  <div class="info-box red"><strong>The prime directive:</strong> AI never makes a safety or compliance decision. A qualified engineer verifies every AI output against authoritative sources before it informs any decision with safety, legal, or certification consequences. AI accelerates the work; the engineer owns the verdict.</div>
  <h2>The Five Guardrails</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🛡</div><div class="cap-text"><strong style="color:var(--accent)">1. Qualified engineer verifies everything</strong><span>Treat every AI output as an unverified draft from a knowledgeable but fallible assistant. The engineer checks it against the actual standard, datasheet, or measured data before acting. No exceptions for safety-relevant outputs.</span></div></li>
    <li><div class="cap-icon">📚</div><div class="cap-text"><strong style="color:var(--accent)">2. Ground in authoritative sources</strong><span>Never let an LLM recall a spec or clause from memory for a real decision — it may hallucinate plausible-but-wrong values. Use RAG over the actual documents with citations, and verify the cited source.</span></div></li>
    <li><div class="cap-icon">📝</div><div class="cap-text"><strong style="color:var(--accent)">3. Document AI use in the engineering record</strong><span>Just as you'd note the use of a reference handbook or simulation tool, record that AI assisted — and that an engineer reviewed and verified the output. This preserves traceability and audit-readiness.</span></div></li>
    <li><div class="cap-icon">🔒</div><div class="cap-text"><strong style="color:var(--accent)">4. Protect sensitive IP</strong><span>Proprietary schematics, unreleased specs, and customer data may be logged or retained by public model APIs. Use enterprise zero-retention agreements or local models for anything sensitive. Check your data policy first.</span></div></li>
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">5. Match autonomy to stakes</strong><span>Let AI act freely on reversible, low-stakes tasks (drafting docs, summarizing logs). Require human review for anything affecting safety, compliance, or shipped product. Never automate the final pass/fail or certification call.</span></div></li>
  </ul>
  <h2>A Practical Risk Tier</h2>
  <table class="data-table">
    <tr><th>Task</th><th>AI role</th><th>Human oversight</th></tr>
    <tr><td>Draft a test report narrative</td><td class="chk">Generate freely</td><td>Light review</td></tr>
    <tr><td>Summarize a datasheet section</td><td class="chk">Generate + cite</td><td>Verify citations</td></tr>
    <tr><td>Flag possible schematic issues</td><td class="partial">△ Suggest only</td><td>Engineer investigates each</td></tr>
    <tr><td>Interpret a compliance clause</td><td class="partial">△ Find + summarize</td><td>Verify against standard text</td></tr>
    <tr><td>Decide pass/fail or certify</td><td class="xmark">Never</td><td>Engineer decides, full stop</td></tr>
  </table>
</div>`,

'hwai:schematic': () => `<div class="panel" id="panel-hwai-schematic">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Design &amp; Review</span> › Schematic &amp; PCB Review</div>
  <h1>Schematic &amp; PCB <span class="hl">Review</span></h1>
  <p class="lead">AI can act as a tireless first-pass reviewer, surfacing candidate issues for an engineer to investigate. The key is framing: AI flags and explains; the engineer verifies and decides. It catches the things tired eyes miss — never replaces the eyes.</p>
  <div class="info-box"><strong>The right mental model:</strong> AI schematic review is like a junior engineer who has read every datasheet and design guide but has never been burned by a real bug. Useful, fast, knowledgeable — and requiring supervision on everything that matters.</div>
  <h2>What AI Can Usefully Flag</h2>
  <ul class="checklist">
    <li>Missing or questionable protection — absent pull-ups/downs, no decoupling near a power pin, unprotected inputs</li>
    <li>Power integrity concerns — a rail lacking overcurrent protection, undersized traces implied by current, missing bulk capacitance</li>
    <li>Consistency issues — net naming mismatches, unconnected nets, parts in the schematic missing from the BOM</li>
    <li>Spacing/creepage concerns to investigate — given voltages and standard, candidate clearance violations to check by hand</li>
    <li>Reference-design deviations — places where the design departs from the chip vendor's recommended application circuit</li>
  </ul>
  <h2>Effective Review Prompting</h2>
  <div class="code-block"><span class="code-label">// FRAMING AI AS A FLAGGING ASSISTANT</span>You are reviewing a netlist/schematic description for candidate issues.

For each potential issue you identify:
1. State the specific location (net, component, or rail)
2. Explain WHY it may be a problem
3. Cite the rule, datasheet section, or design principle behind it
4. Mark it as: [VERIFY] — an engineer must confirm against the source

Do NOT assert anything as a definitive defect. You are flagging
candidates for human investigation, not certifying the design.

Focus this review on: power rail protection and decoupling.</div>
  <div class="info-box amber"><strong>Why "cite the rule":</strong> Requiring the AI to name the datasheet section or design principle behind each flag does two things — it lets the engineer verify quickly, and it exposes hallucinated reasoning (a flag with a fabricated or vague justification is a red flag about the flag).</div>
  <h2>Worked Example: Reviewing a Power Input Stage</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Say you upload a schematic image (or paste a netlist description) of a 12V-input buck converter stage and ask the prompt above, focused on power rail protection. A capable current-generation multimodal model might respond like this:</p>
  <div class="code-block"><span class="code-label">// EXAMPLE MODEL OUTPUT</span><span class="k">[VERIFY]</span> Net <span class="n">VIN_12V</span> — No visible reverse-polarity or
transient protection (TVS/Schottky) before C1. Many 12V barrel-jack
designs add one here. <span class="c">Cite: general practice for field-wired</span>
<span class="c">DC inputs, not a specific datasheet clause — confirm intent with</span>
<span class="c">design requirements before treating as a gap.</span>

<span class="k">[VERIFY]</span> U1 pin 3 (EN) — Appears to float; no pull-up/pull-down
visible. <span class="n">U1</span> datasheet section 7.3.2 recommends a 100k
pull-up to VIN for default-on behavior. Confirm against the actual
datasheet revision used — pin numbering may differ by package option.

<span class="k">[VERIFY]</span> C3 placement — Bulk capacitor appears >15mm from U1's
VIN pin in the layout snippet shown. Datasheet section 8.1 specifies
"as close as possible." Distance is a visual estimate from the image,
not a measurement — verify against the actual layout file.</div>
  <div class="info-box"><strong>Read that output the right way:</strong> Two of the three flags are genuinely useful leads — a missing pull-up and a layout distance worth measuring for real. Notice the model was honest that the first item isn't tied to a specific clause, and that the third is a visual estimate, not a layout-tool measurement. That calibrated uncertainty is what a well-prompted review should produce — an output that asserts everything with equal confidence is the one to distrust.</div>
  <h2>Try It Yourself</h2>
  <div class="info-box green"><strong>Exercise:</strong> Take a non-sensitive reference schematic (a chip vendor's evaluation-board schematic PDF is ideal — publicly available, low stakes). Upload it to a current multimodal model with the flagging prompt above, scoped to one section (e.g. "the USB-PD negotiation circuitry" or "the battery charge path"). For each flag, open the actual datasheet section it cites and check: (1) does that section say what the AI claims, and (2) is the component/net it names actually present at that location in the schematic? Tally how many flags hold up — this calibrates your trust in the tool for your specific schematic style and AI model before you ever apply it to proprietary work.</div>
  <h2>What Current Multimodal Models Are Actually Good and Bad At</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">✅</div><div class="card-title">Strong: Topology &amp; Components</div><div class="card-body">Identifying component types, recognizing standard topologies (buck, LDO, op-amp gain stage), and matching against reference designs are areas where vision models now perform well.</div><span class="tag green">reliable-ish</span></div>
    <div class="card"><div class="card-icon">⚠️</div><div class="card-title">Weak: Fine Print &amp; Measurements</div><div class="card-body">Tiny silkscreen text, exact trace-width/spacing measurements, and dense reference-designator labels are still failure-prone — verify any specific number it reads off an image against the source file.</div><span class="tag amber">verify-always</span></div>
    <div class="card"><div class="card-icon">❌</div><div class="card-title">Unreliable: Multi-Step Analysis</div><div class="card-body">Deriving transfer functions, computing actual currents/voltages across the design, or chaining several inferences from the image is where models degrade fastest — route real calculations through code, not visual reasoning.</div><span class="tag red">do-not-trust</span></div>
  </div>
  <h2>Hard Limits</h2>
  <div class="info-box red"><strong>AI cannot:</strong> replace simulation (SPICE, SI/PI, thermal), verify against the actual board layout's physical reality, or make the final sign-off. It works from the description or image you give it and the patterns it learned — it has no ground truth about your specific design, and it cannot measure a real distance from a picture. Treat every output as a hypothesis to test, never a conclusion.</div>
</div>`,

'hwai:compliance': () => `<div class="panel" id="panel-hwai-compliance">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Design &amp; Review</span> › Compliance Interpretation</div>
  <h1>Compliance <span class="hl">Interpretation</span></h1>
  <p class="lead">Safety standards like IEC 62368-1 (the hazard-based safety standard now used across ICT and AV equipment, currently in its 4th Edition) are vast, cross-referenced, and dense. AI excels at navigating them — finding the relevant clause, summarizing requirements, and explaining how sections interrelate. But interpretation that informs a compliance decision must always be verified against the authoritative text by a qualified engineer.</p>
  <div class="info-box red"><strong>The compliance-specific risk:</strong> An LLM may confidently cite a clause number that doesn't say what it claims, or misremember a threshold value. In compliance, a wrong interpretation has legal and safety weight. RAG with citations + engineer verification is mandatory — never trust recalled clause content.</div>
  <div class="info-box amber"><strong>Standards keep moving — verify the edition, not just the clause:</strong> Standards are periodically revised (IEC 62368-1 moved from its 3rd to 4th Edition, with regional adoption and enforcement dates staggered for years afterward — e.g. a 2023-published edition can still have a 2026 mandatory cutover in a given market). Before trusting any AI-cited clause number, confirm you're checking it against the same edition your RAG index was built from, and that the edition is the one currently enforced in your target market. An AI tool grounded in a stale PDF will cite real-looking clause numbers from the wrong edition.</div>
  <h2>High-Value Compliance Uses</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🧭</div><div class="card-title">Clause Navigation</div><div class="card-body">"Which clauses cover energy source classification for this circuit?" AI points you to the right sections far faster than manual search.</div><span class="tag">find</span></div>
    <div class="card"><div class="card-icon">📖</div><div class="card-title">Plain-Language Summary</div><div class="card-body">Translate dense normative language into a clear explanation — then verify against the original before relying on it.</div><span class="tag amber">explain</span></div>
    <div class="card"><div class="card-icon">🔗</div><div class="card-title">Cross-References</div><div class="card-body">Surface related clauses, referenced standards, and dependencies that are easy to miss in a complex standard.</div><span class="tag violet">connect</span></div>
    <div class="card"><div class="card-icon">📋</div><div class="card-title">Requirement Checklists</div><div class="card-body">Draft a checklist of applicable requirements for a given component or function, for an engineer to confirm and complete.</div><span class="tag green">organize</span></div>
  </div>
  <h2>The Verification Workflow</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// SAFE COMPLIANCE-INTERPRETATION FLOW</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-accent" style="text-align:center;min-width:96px;"><div class="node-eyebrow">1</div><div class="node-name" style="font-size:12px;">Ask AI (RAG over standard)</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:96px;"><div class="node-eyebrow">2</div><div class="node-name" style="font-size:12px;">Get answer + clause citation</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:96px;"><div class="node-eyebrow">3</div><div class="node-name" style="font-size:12px;">Open cited clause in standard</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-green" style="text-align:center;min-width:96px;"><div class="node-eyebrow">4</div><div class="node-name" style="font-size:12px;">Engineer verifies &amp; decides</div></div>
    </div>
  </div>
  <div class="info-box"><strong>Example — energy source classification:</strong> Ask AI to find the clauses defining ES1/ES2/ES3 thresholds and summarize how they apply to a given circuit. It accelerates finding and understanding — but the engineer confirms the actual voltage/current/power thresholds against the standard text before classifying. The AI gets you to the right page faster; it doesn't make the call.</div>
  <h2>Worked Example: A Tricky Cross-Clause Question</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The hardest compliance questions span multiple clauses. Here's a realistic exchange with a RAG system indexed over the standard's text:</p>
  <div class="code-block"><span class="code-label">// QUESTION</span><span class="n">Engineer:</span> "Our board's USB-C port sources 20W at 9V. Does the
output need to be treated as ES2 or ES3, and does that change our
clearance requirements to the chassis?"

<span class="n">RAG answer (example):</span>
"At 9V/20W the relevant clause for DC voltage/power classification
places this in the <span class="k">ES2</span> range for the voltage threshold, <span class="k">[Clause 5.2.2.1]</span> —
provided current is also limited per the same clause's table. <span class="k">[VERIFY:
confirm the actual current draw against the table's current limit,
not just voltage]</span>. Clearance to chassis (basic insulation) is
addressed separately in <span class="k">[Clause 5.4.2]</span>, which depends on the
working voltage and pollution degree of the enclosure — <span class="k">[VERIFY:
pollution degree assumption against your enclosure's actual rating]</span>."</div>
  <div class="info-box amber"><strong>Why this example is "tricky":</strong> The honest answer touches two different clauses (classification and clearance) and depends on a variable the AI cannot know on its own — actual current draw and enclosure pollution degree. A good compliance-RAG answer surfaces both clauses and flags exactly which inputs the engineer must supply or verify, rather than guessing at them. If a tool instead gives a single confident number with no caveats, that is the warning sign to dig into the source clauses yourself.</div>
  <h2>Checklist: AI-Assisted Compliance Review</h2>
  <ul class="checklist">
    <li>Confirm the RAG index is built from the current, correctly-edition standard text for your target market — not a cached or superseded PDF</li>
    <li>For every cited clause, open the actual standard and confirm the clause says what the AI claims it says</li>
    <li>Identify which inputs the classification depends on (voltage, current, power, pollution degree, altitude) and verify each against your actual design — never let the AI assume them</li>
    <li>Treat a multi-clause question as multiple verification steps, not one — each clause cited needs its own check</li>
    <li>Have a second qualified engineer review any AI-assisted interpretation that will appear in a compliance file or certification submission</li>
    <li>Record the AI's role explicitly: "research aid, all interpretations verified by [engineer] against [standard, edition, clause]"</li>
  </ul>
  <div class="info-box red"><strong>Reminder:</strong> None of this replaces engineering sign-off. AI-assisted compliance review accelerates research and surfaces what to check — a qualified engineer, and where required a certification body or notified body, still makes and owns the actual compliance determination.</div>
  <h2>Documentation for Audit</h2>
  <ul class="checklist">
    <li>Record which clauses were consulted and the verified interpretation</li>
    <li>Note that AI assisted in locating/summarizing, and that an engineer verified against the source</li>
    <li>Keep the citation trail so any conclusion can be traced back to authoritative text</li>
  </ul>
</div>`,

'hwai:bom': () => `<div class="panel" id="panel-hwai-bom">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Design &amp; Review</span> › BOM &amp; Component Analysis</div>
  <h1>BOM &amp; Component <span class="hl">Analysis</span></h1>
  <p class="lead">A Bill of Materials is a structured dataset — exactly what AI handles well. It can scan hundreds of line items for risk, inconsistency, and sourcing concerns far faster than manual review. As always, any safety- or compliance-critical spec must be verified against the authoritative datasheet.</p>
  <h2>What AI Surfaces in a BOM</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">⏳</div><div class="cap-text"><strong style="color:var(--accent)">Lifecycle risk</strong><span>Flag parts that are EOL, NRND (not recommended for new designs), or long-lead — candidates for redesign or last-time buys.</span></div></li>
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">Single-source exposure</strong><span>Identify components with only one supplier or no drop-in alternate — supply-chain risk to mitigate early.</span></div></li>
    <li><div class="cap-icon">🔍</div><div class="cap-text"><strong style="color:var(--accent)">Inconsistencies</strong><span>Mismatched reference designators, parts in the schematic missing from the BOM (or vice versa), duplicate or conflicting entries.</span></div></li>
    <li><div class="cap-icon">🔄</div><div class="cap-text"><strong style="color:var(--accent)">Alternate suggestions</strong><span>Propose candidate second sources or equivalents to evaluate — always pending datasheet verification of fit, form, and function.</span></div></li>
    <li><div class="cap-icon">🌡</div><div class="cap-text"><strong style="color:var(--accent)">Wear-out &amp; rating flags</strong><span>Highlight lifetime-limited parts (electrolytics, relays) and components to double-check for adequate voltage/temperature margin.</span></div></li>
  </ul>
  <div class="info-box red"><strong>Always verify independently:</strong> Voltage ratings, tolerances, temperature grades, creepage/clearance implications, and certification marks (UL, etc.) must be confirmed against the authoritative datasheet — never accepted on the AI's claim. Treat AI output as a flag to investigate, not a sourcing decision.</div>
  <h2>Example Analysis Prompt</h2>
  <div class="code-block"><span class="code-label">// BOM RISK SCAN</span>Analyze this BOM (CSV) for risk. For each flagged line, output:
- Reference designator and part number
- Risk category: [EOL] [SINGLE-SOURCE] [LONG-LEAD] [WEAR-OUT]
                 [INCONSISTENCY] [RATING-CHECK]
- Why it's flagged
- A [VERIFY] note stating what the engineer must confirm in the datasheet

Do not assert ratings or availability as fact — flag for verification.
Prioritize the list by risk severity.

BOM data:
{paste_bom_csv}</div>
  <h2>Worked Example: A Five-Line BOM Excerpt</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Feed in a small excerpt to see the expected output shape before running it on a full BOM:</p>
  <div class="code-block"><span class="code-label">// INPUT EXCERPT (CSV)</span>RefDes,MPN,Description,Qty,Supplier
C14,GRM188R71H104KA93D,0.1uF 50V X7R 0603,12,Murata
U7,MAX17761AAUE+,Battery charger IC,1,Maxim/ADI
R22,RC0402FR-0710KL,10k 1% 0402,8,Yageo
D3,1N4148W-7-F,Switching diode,4,Diodes Inc
J1,USB4125-GF-A,USB-C connector,1,GCT</div>
  <div class="code-block"><span class="code-label">// EXAMPLE MODEL OUTPUT</span><span class="n">U7</span> — MAX17761AAUE+ — <span class="k">[RATING-CHECK]</span>
Single-source (Maxim/ADI only, no listed second source).
<span class="k">[VERIFY]</span> confirm current lifecycle status (active/NRND) on the
manufacturer's site — training data may not reflect this week's status.

<span class="n">J1</span> — USB4125-GF-A — <span class="k">[RATING-CHECK]</span>
Connector parts frequently have certification/contact-plating
variants under similar part numbers. <span class="k">[VERIFY]</span> confirm this exact
suffix matches the certification and current rating your design needs.

<span class="n">C14, R22, D3</span> — No flags raised. Common, multi-sourced
passive/discrete parts. Still recommend periodic lifecycle re-scan;
passives can still go EOL during a long program.</div>
  <div class="info-box amber"><strong>Note the calibration:</strong> The model didn't claim a definitive EOL/NRND status for U7 — it flagged that its knowledge may be stale and pointed at where to get the authoritative answer. That's the correct behavior for any fact that changes over time (lifecycle status, stock, pricing). A model asserting "U7 is NRND as of [specific date]" from memory alone is a bigger red flag than one admitting it doesn't know.</div>
  <h2>Try It Yourself</h2>
  <div class="info-box green"><strong>Exercise:</strong> Take a real (or de-identified) BOM from a past project and run the risk-scan prompt above. Pick the three highest-severity flags and actually verify them: check current lifecycle status on the distributor/manufacturer site, confirm the rating against the datasheet, and check sourcing. Note how many flags were real findings vs. false positives — that hit rate is the actual measure of whether this workflow is worth adopting for your team's BOMs.</div>
  <div class="info-box"><strong>Workflow tip:</strong> Run this as a structured-output task (CSV or JSON) so results drop straight into a tracking spreadsheet. Pair with live distributor/lifecycle APIs for authoritative availability data — let AI organize and reason, let the data source supply the ground truth.</div>
</div>`,

'hwai:testdata': () => `<div class="panel" id="panel-hwai-testdata">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Data &amp; Docs</span> › Test Data Analysis</div>
  <h1>Test Data <span class="hl">Analysis</span></h1>
  <p class="lead">Environmental stress testing, power measurements, and qualification runs generate large datasets. AI can summarize trends, surface anomalies, and draft the analysis narrative — compressing hours of log-sifting into minutes, while the engineer retains ownership of conclusions.</p>
  <h2>High-Value Applications</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">📈</div><div class="card-title">Trend Summarization</div><div class="card-body">Summarize behavior across temperature/humidity cycles, load steps, or time — highlighting where parameters drift.</div><span class="tag">trends</span></div>
    <div class="card"><div class="card-icon">⚠️</div><div class="card-title">Anomaly Flagging</div><div class="card-body">Surface outliers, unexpected excursions, and points where measurements approach limits — for engineer investigation.</div><span class="tag amber">anomalies</span></div>
    <div class="card"><div class="card-icon">📝</div><div class="card-title">Report Drafting</div><div class="card-body">Draft the analysis/results narrative from the raw data and the engineer's notes — a first draft to refine, not a final verdict.</div><span class="tag violet">reporting</span></div>
    <div class="card"><div class="card-icon">🔗</div><div class="card-title">Cross-Run Comparison</div><div class="card-body">Compare results across units, revisions, or conditions to spot regressions or unit-to-unit variation.</div><span class="tag green">comparison</span></div>
  </div>
  <div class="info-box red"><strong>The engineer owns the verdict:</strong> AI assists the <em>analysis</em> — it never makes the pass/fail or qualification decision. Conclusions that feed certification or release must be made by a qualified engineer reviewing the actual data. AI is a co-analyst, not the judge. And never let AI silently discard "outlier" data — outliers are often the most important signal.</div>
  <h2>Use Code, Not Mental Math</h2>
  <div class="info-box amber"><strong>Critical:</strong> LLMs are unreliable at precise arithmetic. For any real numerical analysis (statistics, margin calculations, psychrometrics), have the AI <span class="hl">write and run code</span> (Python/pandas) rather than computing in its head. Code execution gives correct, reproducible, auditable numbers — mental arithmetic invites errors. The AI's value is in writing the analysis and interpreting it, with the math done by actual computation.</div>
  <h2>Example Workflow</h2>
  <div class="code-block"><span class="code-label">// AI-ASSISTED TEST ANALYSIS</span>1. Provide the dataset (CSV of test measurements + conditions)
2. Ask the AI to WRITE Python to:
   - compute summary stats per condition
   - flag points within X% of spec limits
   - plot the key parameters vs. cycle/time
3. Review the generated charts and statistics (engineer checks the code)
4. Ask the AI to draft the results narrative from the verified numbers
5. Engineer reviews, corrects, and owns the conclusions</div>
  <h2>Try It Yourself</h2>
  <div class="info-box green"><strong>Exercise:</strong> Take a CSV of any real test log you have (or synthesize one — e.g. 200 rows of "cycle, chamber_temp_C, vout_V, iout_A" for a thermal cycling test with a couple of injected outliers). Ask an AI coding assistant to: (1) write Python to compute mean/std/min/max of vout per temperature bin, (2) flag any reading within 5% of a stated spec limit, (3) generate a plot of vout vs. cycle colored by temperature bin. Then deliberately check one flagged "anomaly" by hand against the raw row — this is the habit that catches the rare case where the generated code has an off-by-one or unit-conversion bug. Trust the chart only after you've spot-checked the numbers behind it once.</div>
  <div class="info-box amber"><strong>Common code-gen pitfall to watch for:</strong> Unit mix-ups (a column labeled "temp" might be °C in one log and °F in another) and silent NaN-dropping (pandas quietly excludes missing rows from a mean unless told otherwise) are the two most common ways an AI-written analysis script produces a confidently wrong number. Ask the AI to print row counts before/after any filtering step so drops are visible, not silent.</div>
</div>`,

'hwai:docs': () => `<div class="panel" id="panel-hwai-docs">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Data &amp; Docs</span> › Documentation</div>
  <h1><span class="hl">Documentation</span></h1>
  <p class="lead">Documentation is the lowest-risk, highest-return AI application in hardware engineering. Drafting design rationales, test procedures, and reports is time-consuming work where AI errors are cheap to catch and easy to fix — the ideal place to start and build trust.</p>
  <div class="info-box green"><strong>Why start here:</strong> A documentation draft is reviewed by definition — the engineer reads and edits it anyway. There's no safety risk in a first draft, and the time savings are immediate and obvious. This is the perfect on-ramp for a skeptical team (more in the Team Workflows module).</div>
  <h2>Documentation AI Handles Well</h2>
  <ul class="checklist">
    <li>Design rationale sections — turn bullet-point decisions into clear prose explaining the why</li>
    <li>Test procedures and work instructions — structure rough notes into clear, ordered steps</li>
    <li>Test and qualification reports — draft narratives from verified data and results</li>
    <li>Change descriptions and ECO justifications — articulate what changed and why</li>
    <li>Internal wikis and onboarding docs — explain subsystems and conventions for new engineers</li>
    <li>Meeting and review summaries — distill design-review notes into action items and decisions</li>
  </ul>
  <h2>Effective Documentation Prompting</h2>
  <div class="code-block"><span class="code-label">// DRAFTING A DESIGN RATIONALE</span>You are a hardware design engineer writing internal documentation.

Turn these decision notes into a clear "Design Rationale" section.
For each decision: state what was chosen, the alternatives considered,
and the reasoning. Keep it concise and technical. Use prose, not
marketing language. Flag anywhere the notes are ambiguous so I can
clarify rather than you guessing.

Decision notes:
{paste_notes}</div>
  <div class="info-box"><strong>The "flag ambiguity" instruction matters:</strong> Telling the AI to flag unclear points rather than fill gaps with assumptions prevents it from inventing rationale you didn't intend. In technical documentation, a guessed justification is worse than a marked gap.</div>
  <h2>Keep IP in Mind</h2>
  <p style="color:var(--muted2);">Documentation often contains proprietary design details. Apply the same data-protection guardrail: use enterprise zero-retention endpoints or local models for sensitive internal documents. Convenience never overrides IP protection.</p>
</div>`,

'hwai:datasheets': () => `<div class="panel" id="panel-hwai-datasheets">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Data &amp; Docs</span> › Datasheet Q&A (RAG)</div>
  <h1>Datasheet Q&A <span class="hl">(RAG)</span></h1>
  <p class="lead">Engineers spend countless hours hunting through datasheets for a single parameter. A RAG system over your datasheet library turns that into a natural-language question with a grounded, cited answer — the single most practical AI application in many hardware teams.</p>
  <div class="info-box"><strong>Why RAG is the right tool here:</strong> Datasheets contain precise values an LLM would otherwise misremember. RAG retrieves the actual datasheet text and grounds the answer in it — with a citation the engineer can open and verify. This is far safer than asking a model to recall specs from memory.</div>
  <h2>What a Datasheet RAG System Enables</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🔎</div><div class="card-title">Cross-Datasheet Search</div><div class="card-body">"Which of our power ICs support PMBus and operate to 105C?" — answered across hundreds of datasheets at once.</div><span class="tag">search</span></div>
    <div class="card"><div class="card-icon">📊</div><div class="card-title">Parameter Lookup</div><div class="card-body">"What's the thermal shutdown threshold for the MAX17761?" — with the exact value and a citation to the page.</div><span class="tag amber">lookup</span></div>
    <div class="card"><div class="card-icon">⚖️</div><div class="card-title">Comparison</div><div class="card-body">"Compare the Rds(on) and current limits of these three eFuses" — pulled from each part's datasheet.</div><span class="tag violet">compare</span></div>
    <div class="card"><div class="card-icon">📖</div><div class="card-title">Application Guidance</div><div class="card-body">"What does the datasheet recommend for input capacitance?" — surfacing the relevant application-section text.</div><span class="tag green">guidance</span></div>
  </div>
  <h2>Building It Right (Hardware-Specific)</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">✂️</div><div class="cap-text"><strong style="color:var(--accent)">Preserve tables</strong><span>Datasheet specs live in tables. Chunk so parameter tables stay intact — a split spec table is useless. This is the #1 datasheet-RAG pitfall.</span></div></li>
    <li><div class="cap-icon">🔀</div><div class="cap-text"><strong style="color:var(--accent)">Use hybrid search</strong><span>Part numbers and parameter names are exact tokens — combine keyword search with semantic search so "MAX17761" and "thermal shutdown" both match precisely.</span></div></li>
    <li><div class="cap-icon">📄</div><div class="cap-text"><strong style="color:var(--accent)">Cite page and section</strong><span>Every answer must link to the exact datasheet page so the engineer can verify. Store page/section metadata at index time.</span></div></li>
    <li><div class="cap-icon">🚫</div><div class="cap-text"><strong style="color:var(--accent)">Decline when unsure</strong><span>Instruct the system to say "not found in the datasheets" rather than guess. A fabricated spec is far worse than an admitted gap.</span></div></li>
  </ul>
  <h2>Worked Example: A Tricky Multi-Datasheet Question</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Single-parameter lookups are the easy case. The questions that actually separate a well-built datasheet RAG system from a fragile demo are ones that require combining numbers from <em>multiple</em> datasheets correctly:</p>
  <div class="code-block"><span class="code-label">// QUESTION</span><span class="n">Engineer:</span> "If I drive the gate of the IRFZ44N with the output of
the TPS54360, is the gate threshold guaranteed to be met across the
full -40C to 85C range?"</div>
  <div class="code-block"><span class="code-label">// EXAMPLE GOOD RAG ANSWER</span>From the <span class="n">IRFZ44N datasheet</span> (p.2, Electrical Characteristics):
Vgs(th) ranges 2.0V-4.0V at 25C. <span class="k">[VERIFY: the datasheet's table
does not give a temperature coefficient for Vgs(th) on this page —
check the typical characteristics curves on p.5 for the temperature
dependence before concluding]</span>.

From the <span class="n">TPS54360 datasheet</span> (p.4): the gate driver output is
not a dedicated MOSFET gate driver — this is a buck converter IC,
not a gate-drive IC. <span class="k">[VERIFY: confirm you intend to drive the
IRFZ44N gate directly from this device's output; if so, check the
output's drive voltage/current against the FZ44N's gate capacitance
and your switching frequency — this combination is not addressed by
either datasheet directly]</span>.

<span class="c">I can't fully answer the temperature-margin question from these</span>
<span class="c">two datasheets alone — the IRFZ44N's threshold temperature drift</span>
<span class="c">and the TPS54360's output drive characteristics need to be checked</span>
<span class="c">together, and the second part isn't addressed in either source.</span></div>
  <div class="info-box amber"><strong>Why this is the right answer, not a weak one:</strong> The system correctly refused to synthesize a confident "yes, it's fine across temperature" by combining two documents that don't actually connect the way the question assumes. It named exactly which sub-question each datasheet does and doesn't answer, and pointed at the curve (not just the table) where the missing data might live. A RAG system that confidently said "yes, guaranteed across the full range" here would be fabricating a conclusion neither datasheet supports — the failure mode the citations are supposed to prevent.</div>
  <h2>Try It Yourself</h2>
  <div class="info-box green"><strong>Exercise:</strong> Pick two real datasheets from parts you actually use together (a sensor + its recommended ADC, or a regulator + the MOSFET it drives). Ask a multi-datasheet question that requires combining a spec from each one to reach a conclusion — and that has a plausible "gotcha" (a missing temperature coefficient, a units mismatch, an assumption the two parts don't actually share a rail). Compare: does the tool clearly separate what each source supports vs. what it's inferring, or does it blend them into one unverifiable claim? That distinction is the entire value of RAG over plain chat with an LLM.</div>
  <div class="info-box"><strong>Connects to the RAG course:</strong> This is a direct application of everything in the RAG Deep Dive — chunking, hybrid search, reranking, and grounded generation — tuned for the specific challenges of technical datasheets (dense tables, exact part numbers, safety-critical values).</div>
</div>`,

'hwai:workflow': () => `<div class="panel" id="panel-hwai-workflow">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Deployment</span> › Team Workflows</div>
  <h1>Team <span class="hl">Workflows</span></h1>
  <p class="lead">Rolling AI out to a hardware engineering team — especially one with healthy skepticism toward new tools — is as much about change management as technology. Done well, skeptics become advocates. Done poorly, a powerful tool gets shelved.</p>
  <div class="info-box"><strong>Earn trust before asking for it:</strong> Hardware engineers are rightly cautious — their mistakes have physical consequences. Don't ask them to trust AI on design decisions. Show value where errors are cheap, let the wins accumulate, and expand only as confidence grows.</div>
  <h2>A Phased Rollout</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Phase 1 — Low-stakes, high-volume <span class="acc-arrow">▾</span></div><div class="acc-body">Start with documentation drafts, test-log summaries, and datasheet lookups. Errors are obvious and harmless; time savings are immediate. This builds familiarity and trust with zero risk to product safety. Let the team experience "this saved me an hour" before anything else.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Phase 2 — Assisted review <span class="acc-arrow">▾</span></div><div class="acc-body">Introduce AI as a flagging assistant for schematic review and BOM analysis — always framed as "suggestions for you to verify," with reasoning shown. Engineers stay fully in control; AI just catches more. Track real catches to demonstrate value.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Phase 3 — Grounded knowledge tools <span class="acc-arrow">▾</span></div><div class="acc-body">Deploy datasheet/standards RAG systems with citations. Now AI is woven into daily research, with verifiable grounding. By this point the team trusts the tooling and understands its limits.</div></div>
  <h2>The Skeptic-to-Advocate Playbook</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">Let skeptics define the guardrails</strong><span>Ask your most cautious engineer to write the list of what AI must never decide alone. Make those the hard rules. People who shape the constraints become its advocates.</span></div></li>
    <li><div class="cap-icon">🔍</div><div class="cap-text"><strong style="color:var(--accent)">Always show reasoning</strong><span>Configure tools to cite the standard, datasheet, or principle behind every output. Engineers trust transparent reasoning, not black-box answers.</span></div></li>
    <li><div class="cap-icon">📣</div><div class="cap-text"><strong style="color:var(--accent)">Publicize real wins</strong><span>When AI catches a missed edge case or a BOM inconsistency, share it. Concrete examples persuade far better than abstract claims.</span></div></li>
    <li><div class="cap-icon">👤</div><div class="cap-text"><strong style="color:var(--accent)">"AI proposes, engineer disposes"</strong><span>Make it a cultural mantra: AI presents analysis and options; the engineer always decides. This preserves professional ownership and addresses the core fear of being replaced.</span></div></li>
  </ul>
  <h2>Governance to Establish Early</h2>
  <ul class="checklist">
    <li>A clear data policy — what can/can't be sent to which tools (IP protection)</li>
    <li>Documentation standard — how AI use is recorded in the engineering record</li>
    <li>The non-negotiable list — decisions AI never makes (safety, compliance, certification)</li>
    <li>Approved tools and endpoints — vetted for data retention and security</li>
  </ul>
</div>`,

'hwai:impl': () => `<div class="panel" id="panel-hwai-impl">
  <div class="breadcrumb">HW + AI › <span class="bc-accent">Deployment</span> › Host Setup Guides</div>
  <h1>Setup <span class="hl">for Hardware Teams</span></h1>
  <p class="lead">Practical setups for applying AI in a hardware engineering context — chosen with IP protection and verifiability front of mind.</p>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'hi1','hi-claudeai')">Claude.ai (Team)</button>
    <button class="tab-btn" onclick="switchTab(this,'hi1','hi-ollama')">Local (Ollama)</button>
    <button class="tab-btn" onclick="switchTab(this,'hi1','hi-rag')">Datasheet RAG</button>
    <button class="tab-btn" onclick="switchTab(this,'hi1','hi-code')">Claude Code</button>
    <button class="tab-btn" onclick="switchTab(this,'hi1','hi-api')">API + Code Exec</button>
  </div>
  <div id="hi1">
    <div class="tab-content active" id="hi-claudeai">
      <h2>Claude.ai for Teams</h2>
      <div class="info-box"><strong>Best for:</strong> Documentation, analysis, and review with enterprise data protection.</div>
      <ul class="checklist">
        <li>Use a <strong>Team/Enterprise</strong> plan — these carry data-retention and no-training commitments suitable for company data (verify against your current agreement)</li>
        <li>Create <strong>Projects</strong> per subsystem or product, with custom instructions encoding your review standards and guardrails</li>
        <li>Upload reference docs (design guides, internal standards) to a Project for grounded answers</li>
        <li>Still verify all safety/compliance outputs against authoritative sources — enterprise data protection addresses IP, not correctness</li>
      </ul>
    </div>
    <div class="tab-content" id="hi-ollama">
      <h2>Local Models (Ollama) for Sensitive IP</h2>
      <div class="info-box green"><strong>Best for:</strong> Proprietary schematics and unreleased specs that must never leave your infrastructure.</div>
      <div class="code-block"><span class="code-label">// FULLY LOCAL — NOTHING LEAVES YOUR MACHINE</span>curl -fsSL https://ollama.ai/install.sh | sh

ollama pull llama3.3          # strong general model
ollama pull qwen2.5-coder      # for scripting analysis code

ollama run llama3.3            # interactive, fully offline

<span class="c"># Data never touches an external API. Ideal for the most</span>
<span class="c"># sensitive design data. Trade-off: local models are less</span>
<span class="c"># capable than frontier models — verify outputs accordingly.</span></div>
    </div>
    <div class="tab-content" id="hi-rag">
      <h2>Datasheet RAG System</h2>
      <div class="info-box"><strong>Best for:</strong> Grounded, cited Q&A across your datasheet and standards library.</div>
      <ul class="checklist">
        <li>Ingest datasheets (PDF) — use a parser that preserves tables; chunk so spec tables stay intact</li>
        <li>Use hybrid search (keyword + semantic) so part numbers match exactly</li>
        <li>Store page/section metadata for citations; add a reranker for precision</li>
        <li>For sensitive internal docs, pair a local embedding model + local vector DB (Qdrant/Chroma) + local LLM for a fully on-prem stack</li>
        <li>See the RAG Deep Dive course for the full build</li>
      </ul>
    </div>
    <div class="tab-content" id="hi-code">
      <h2>Claude Code for Engineering Scripts</h2>
      <div class="info-box"><strong>Best for:</strong> Test-data analysis scripts, automation, parsing tools.</div>
      <ul class="checklist">
        <li>Install: <code class="inline">npm install -g @anthropic-ai/claude-code</code></li>
        <li>Use it to write/verify Python for test-data analysis — getting correct computed numbers instead of LLM mental math</li>
        <li>Add a <code class="inline">CLAUDE.md</code> encoding your conventions: "safety-critical repo, explain timing/power impacts, cite datasheet sections"</li>
        <li>Great for parsing instrument logs, automating report generation, and building internal tools</li>
      </ul>
    </div>
    <div class="tab-content" id="hi-api">
      <h2>API with Code Execution</h2>
      <div class="info-box amber"><strong>Best for:</strong> Reliable numerical analysis — let the AI write code, not do mental math.</div>
      <div class="code-block"><span class="code-label">// AI WRITES + RUNS ANALYSIS CODE</span><span class="c"># The pattern that makes numerical analysis trustworthy:</span>
<span class="c"># 1. AI receives the dataset + the analysis question</span>
<span class="c"># 2. AI writes Python (pandas/numpy) to do the actual computation</span>
<span class="c"># 3. The code runs; real numbers come back</span>
<span class="c"># 4. AI interprets the verified results in prose</span>

<span class="c"># Never let the model report computed statistics from "memory" —</span>
<span class="c"># always route real math through executed code for correct,</span>
<span class="c"># reproducible, auditable results.</span></div>
    </div>
  </div>
</div>`,
