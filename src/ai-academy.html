'ctx:cheatsheet': () => `<div class="panel" id="panel-ctx-cheatsheet">
  <div class="breadcrumb">Context Eng › <span class="bc-accent">Training</span> › Quick Reference</div>
  <h1>Quick <span class="hl">Reference</span></h1>
  <div class="cheat-grid">
    <div class="cheat-card"><h3>Core Principle</h3><ul class="checklist"><li>Curate, don't accumulate</li><li>Smallest high-signal token set</li><li>More context can hurt (rot)</li><li>Every token costs $ and attention</li></ul></div>
    <div class="cheat-card"><h3>Token Budget</h3><ul class="checklist"><li>Reserve space for output</li><li>Trim fixed costs (system, tools)</li><li>Watch growing items (history, tools)</li><li>Right-size, don't max out</li></ul></div>
    <div class="cheat-card"><h3>Ordering</h3><ul class="checklist"><li>Critical content at start &amp; end</li><li>Lost-in-the-middle is real</li><li>Most relevant retrieval last</li><li>Stable-first for caching</li></ul></div>
    <div class="cheat-card"><h3>Compression</h3><ul class="checklist"><li>Rolling summarization (history)</li><li>Distillation (extract fields)</li><li>Offloading (files/scratchpad)</li><li>Filtering (trim tool results)</li></ul></div>
    <div class="cheat-card"><h3>Agents</h3><ul class="checklist"><li>Compact tool results immediately</li><li>Offload to files</li><li>Compaction / handoff on threshold</li><li>Sub-agents = isolated context</li></ul></div>
    <div class="cheat-card"><h3>Failure Modes</h3><ul class="checklist"><li>Context rot — too much noise</li><li>Lost in middle — bad position</li><li>Conflict/poisoning — stale data</li><li>Truncation loss — cut not summarized</li></ul></div>
  </div>
</div>`,



/* ─── VIBE CODING PANELS ──────────────────────────────────────────────────── */

'vibe:what': () => `<div class="panel" id="panel-vibe-what">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Foundations</span> › What Is Vibe Coding?</div>
  <h1>What Is <span class="hl">Vibe Coding?</span></h1>
  <p class="lead">Vibe coding is the AI-first development workflow: you describe intent in natural language, the model generates code, you steer by results, and you iterate. You're the architect and the critic — the AI is the implementer. It's fast, powerful, and it accumulates entropy faster than any workflow you've used before.</p>
  <div class="info-box"><strong>Coined by Andrej Karpathy (2025):</strong> "There's a new kind of coding I call vibe coding, where you fully give in to the vibes, embrace exponentials, and forget that the code even exists." The power is real. So is the mess it creates without discipline.</div>
  <h2>The Vibe Coding Loop</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// THE CORE WORKFLOW</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-amber" style="text-align:center;min-width:90px;"><div class="node-eyebrow">you</div><div class="node-name" style="font-size:12px;">Describe Intent</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:90px;"><div class="node-eyebrow">AI</div><div class="node-name" style="font-size:12px;">Generate</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:90px;"><div class="node-eyebrow">you</div><div class="node-name" style="font-size:12px;">Test / Review</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:90px;"><div class="node-eyebrow">you</div><div class="node-name" style="font-size:12px;">Steer / Accept</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:90px;"><div class="node-eyebrow">repeat</div><div class="node-name" style="font-size:12px;">Commit &amp; Iterate</div></div>
    </div>
  </div>
  <h2>What Makes It Different</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">⚡</div><div class="card-title">Speed</div><div class="card-body">Features that took days take hours. Boilerplate that took hours takes minutes. The velocity multiplier is real and large.</div><span class="tag">benefit</span></div>
    <div class="card"><div class="card-icon">🌊</div><div class="card-title">Volume</div><div class="card-body">AI generates a lot — fast. More code, more files, more docs. Volume without curation becomes entropy.</div><span class="tag amber">risk</span></div>
    <div class="card"><div class="card-icon">👁</div><div class="card-title">Attention Gap</div><div class="card-body">You can't read every line the AI writes. Unread code accumulates. So do its mistakes, dead code, and duplication.</div><span class="tag red">risk</span></div>
    <div class="card"><div class="card-icon">🧭</div><div class="card-title">You Are the Architect</div><div class="card-body">The AI implements. You must hold the vision, enforce the structure, and catch the drift. Discipline enables the speed.</div><span class="tag green">key</span></div>
  </div>
  <div class="info-box green"><strong>The discipline pays the speed dividend:</strong> Vibe coding without structure produces a fast-moving mess that becomes unmaintainable within days or weeks. Vibe coding with structure — good directory layout, context files, small commits, regular pruning — compounds the velocity instead of eroding it. This course is the structure.</div>
</div>`,

'vibe:risks': () => `<div class="panel" id="panel-vibe-risks">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Foundations</span> › The Bloat Problem</div>
  <h1>The <span class="hl">Bloat Problem</span></h1>
  <p class="lead">Bloat is the defining failure mode of AI-assisted development. Because generation is cheap and fast, projects accumulate dead code, redundant helpers, stale docs, and forgotten artifacts far faster than any human-written project. Left unmanaged, this entropy kills velocity — eventually making the project harder to work with than if it had been written by hand.</p>
  <div class="info-box red"><strong>The core dynamic:</strong> The marginal cost of the AI generating 50 more lines is near zero. So it does — even when 30 of those lines duplicate existing logic. You don't notice because you're not reading every line. Weeks later, the codebase has three versions of the same utility function and nobody knows which is canonical.</div>
  <div class="info-box amber"><strong>This isn't anecdotal — it's measured.</strong> Industry analysis of AI-accelerated codebases in 2026 found code duplication up roughly 48% in repos with heavy AI authorship, refactoring activity down about 60% over the same period (the cleanup isn't keeping pace with the generation), and a majority of organizations expecting technical debt to reach moderate-to-high severity in 2026, with AI-assisted development cited as a primary driver. The dynamic this course teaches you to counter is a documented industry-wide trend, not a hypothetical.</div>
  <h2>The Three Bloat Types</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🧟</div><div class="card-title">Code Bloat</div><div class="card-body">Dead functions, duplicate helpers, abandoned experiments, overly-abstracted scaffolding the AI added "just in case." It compiles, it passes lint, it does nothing useful.</div><span class="tag red">code</span></div>
    <div class="card"><div class="card-icon">📄</div><div class="card-title">Document Bloat</div><div class="card-body">A proliferation of markdown files — NOTES.md, TODO_v2.md, ARCHITECTURE_old.md — that overlap, contradict, and go stale immediately. Nobody knows what's current.</div><span class="tag amber">docs</span></div>
    <div class="card"><div class="card-icon">🗂</div><div class="card-title">Artifact Bloat</div><div class="card-body">Experimental scripts, generated test fixtures, temp outputs, scratchpad files that were never cleaned up — a growing layer of debris under the real project.</div><span class="tag violet">files</span></div>
  </div>
  <h2>How It Compounds</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Bloat degrades the AI too <span class="acc-arrow">▾</span></div><div class="acc-body">When you load a bloated project into the AI's context, it sees the dead code, the stale docs, and the conflicting implementations — and confidently builds on them. It can't tell what's current and what's abandoned. Bloat in the repo becomes context pollution in every future AI call. The problem compounds.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Duplication explodes refactoring cost <span class="acc-arrow">▾</span></div><div class="acc-body">When the same logic exists in three places and you need to change the behavior, you have to find and update all three — or introduce subtle divergence. The AI is especially prone to duplicating rather than discovering existing utilities because it looks at what's in context, not what's in the whole codebase.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Stale docs actively mislead <span class="acc-arrow">▾</span></div><div class="acc-body">An outdated architecture doc is worse than no doc — it misleads you and the AI into making decisions based on how things used to work. When in doubt, the AI will happily follow the stale doc you forgot existed. Every outdated document is an active hazard.</div></div>
  <h2>The Bloat Prevention Mindset</h2>
  <div class="info-box green"><strong>Prevention over cleanup:</strong> Like technical debt, bloat is far easier to prevent than to clear. The rest of this course is mostly about prevention — the structures, habits, and workflows that keep entropy from accumulating in the first place.</div>
</div>`,

'vibe:mindset': () => `<div class="panel" id="panel-vibe-mindset">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Foundations</span> › Operating Mindset</div>
  <h1>Operating <span class="hl">Mindset</span></h1>
  <p class="lead">Successful vibe coding requires a different mental posture than traditional development. You're not writing every line — but you are responsible for every line that ships. The mindset shift that makes this work is moving from implementer to architect, reviewer, and editor.</p>
  <div class="info-box"><strong>The core posture:</strong> You own the vision. The AI implements drafts. Your job is to specify clearly, review critically, prune ruthlessly, and maintain the structure that keeps the project coherent across dozens of AI sessions.</div>
  <h2>The Four Posture Shifts</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🏗</div><div class="cap-text"><strong style="color:var(--accent)">Architect, not coder</strong><span>Your leverage is in the decisions: what the system does, how it's structured, where boundaries are. Let the AI fill in the implementation. Spend your attention on structure, not syntax.</span></div></li>
    <li><div class="cap-icon">✂️</div><div class="cap-text"><strong style="color:var(--accent)">Editor, not just accepter</strong><span>Generated code is a draft. Accept what's good, rewrite what's wrong, delete what's bloat. "Accept all" is how projects become unmaintainable. Be a rigorous editor.</span></div></li>
    <li><div class="cap-icon">🔁</div><div class="cap-text"><strong style="color:var(--accent)">Pruner, not just builder</strong><span>Regular pruning is part of the workflow, not an optional cleanup. Plan time to remove what the AI accumulated: dead code, redundant docs, stale artifacts. Build is not done until bloat is removed.</span></div></li>
    <li><div class="cap-icon">📐</div><div class="cap-text"><strong style="color:var(--accent)">Convention enforcer</strong><span>The AI will drift. Every new session starts without memory of your last decisions. The structures, context files, and conventions you maintain are how you keep the AI aligned across sessions. You enforce the conventions; you can't assume the AI will remember them.</span></div></li>
  </ul>
  <h2>When to Read the Code</h2>
  <div class="info-box amber"><strong>You don't have to read every line — but you must read some.</strong> The areas that warrant careful reading: anything touching auth or security, data persistence logic, anything the AI adds to an existing complex module, and any code that touches a user-visible behavior. A quick scan of what changed each commit is a minimum discipline. "Accept all" is a debt spiral.</div>
  <h2>The Rule of Thumb</h2>
  <div class="info-box"><strong>If you wouldn't be comfortable explaining this code to a colleague, it's not ready to commit.</strong> That discomfort is the signal to read it, understand it, or simplify it before it becomes someone else's mystery — including future-you.</div>
  <h2>Prose Rules vs. Enforced Rules</h2>
  <div class="info-box amber"><strong>Know the difference between a convention you've written down and a convention you've enforced.</strong> A rule in your context file ("never commit .env", "always run lint before stopping") is a strong suggestion the model usually follows — but it's prose, and prose can be missed under a long context or a rushed session. Claude Code's hooks (PreToolUse, PostToolUse, etc.) run real, deterministic code that executes regardless of what the model "decides." For the handful of rules that must never be violated — secrets never committed, tests must pass before a session ends, no edits to generated files — back the prose rule with a hook. Reserve hooks for the few rules that truly can't be skipped; everything else stays as a documented convention you and the AI both read.</div>
</div>`,

'vibe:directory': () => `<div class="panel" id="panel-vibe-directory">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Project Structure</span> › Directory Structure</div>
  <h1>Directory <span class="hl">Structure</span></h1>
  <p class="lead">A clear, conventional directory structure is the single highest-leverage structural decision in a vibe-coded project. It tells the AI where to put things, prevents duplicate implementations across directories, and lets you load only the relevant slice of the project into context.</p>
  <div class="info-box"><strong>Why it matters more in AI projects:</strong> The AI places new code wherever seems locally sensible — which means scattered files and duplicate implementations unless you've established clear conventions. A predictable structure is the contract between you and every future AI session.</div>
  <h2>A Recommended Layout</h2>
  <div class="code-block"><span class="code-label">// GENERAL-PURPOSE PROJECT LAYOUT</span>my-project/
  CLAUDE.md               <span class="c"># AI context file (persistent brief)</span>
  README.md               <span class="c"># human-facing overview</span>
  .gitignore              <span class="c"># always includes scratch/ and .env</span>
  .env.example            <span class="c"># template, never secrets</span>
  |
  src/                    <span class="c"># ALL production source code</span>
    core/                 <span class="c"># domain logic, no framework deps</span>
    features/             <span class="c"># one folder per feature/module</span>
    lib/                  <span class="c"># shared utilities (one canonical location)</span>
    types/                <span class="c"># type definitions / interfaces</span>
  |
  tests/                  <span class="c"># mirrors src/ structure</span>
  |
  docs/                   <span class="c"># a FEW living docs (not many files)</span>
    architecture.md
    decisions.md          <span class="c"># ADR log</span>
    api.md
  |
  scripts/                <span class="c"># one-off automation, clearly named</span>
  |
  scratch/                <span class="c"># gitignored experiments &amp; throwaway</span></div>
  <h2>The Critical Rules</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">📍</div><div class="cap-text"><strong style="color:var(--accent)">One canonical home for shared code</strong><span>lib/ (or utils/ or shared/) is the single source of truth for utilities. If the AI generates a helper anywhere else, move it here. Two utility directories = two versions of every function within a month.</span></div></li>
    <li><div class="cap-icon">🚮</div><div class="cap-text"><strong style="color:var(--accent)">scratch/ is gitignored</strong><span>Every experiment, one-off script, and generated artifact that isn't production code lives in scratch/. Clean it weekly. Its contents should never influence the AI's view of the codebase.</span></div></li>
    <li><div class="cap-icon">🔗</div><div class="cap-text"><strong style="color:var(--accent)">tests/ mirrors src/</strong><span>tests/features/auth.test.ts corresponds to src/features/auth.ts. One-to-one structure makes tests findable and prevents "I can't find where the test for this goes."</span></div></li>
    <li><div class="cap-icon">📋</div><div class="cap-text"><strong style="color:var(--accent)">Encode the layout in CLAUDE.md</strong><span>The AI doesn't know your layout unless you tell it. Your context file must explicitly state where each type of code belongs and what each top-level directory is for.</span></div></li>
  </ul>
  <h2>Feature-Specific Layout (Vertical Slices)</h2>
  <div class="code-block"><span class="code-label">// ALTERNATIVE: FEATURE-FIRST (works well for larger apps)</span>src/
  features/
    auth/
      auth.controller.ts
      auth.service.ts
      auth.test.ts
      auth.types.ts
    dashboard/
      ...
  shared/                 <span class="c"># still ONE shared utilities dir</span>
  <span class="c"># Everything for a feature lives together — easier to load</span>
  <span class="c"># a single feature into AI context cleanly.</span></div>
  <h2 style="margin-top:28px;">Exercise: Audit This Directory Structure</h2>
  <div class="info-box amber"><strong>Hands-on (10 minutes).</strong> A teammate's vibe-coded project looks like this after six weeks. Find every structural problem before reading the answer.</div>
  <div class="code-block"><span class="code-label">// REAL EXAMPLE — SIX WEEKS OF UNCURATED AI SESSIONS</span>project/
  src/
    components/
    utils/                 <span class="c"># shared helpers</span>
    helpers/                <span class="c"># ...also shared helpers?</span>
    auth-stuff/
      login.js
      authHelpers.js
    Dashboard/              <span class="c"># PascalCase, inconsistent with rest</span>
      dashboard_utils.js
    api/
      client.js
      api-client-v2.js      <span class="c"># is this the same thing?</span>
  test/                     <span class="c"># singular...</span>
    auth.test.js
  tests/                    <span class="c"># ...and plural — two test dirs</span>
    dashboard.test.js
  NOTES.md
  TODO_old.md
  TODO_new.md
  scratch_data.json         <span class="c"># at repo root, not gitignored</span>
  CLAUDE.md                 <span class="c"># last updated week 1, never since</span></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Reveal the structural problems <span class="acc-arrow">▾</span></div><div class="acc-body">1) <strong>Two shared-utility dirs</strong> (utils/ and helpers/) — guaranteed duplicate helpers split across both. 2) <strong>Inconsistent naming</strong> — auth-stuff/ (kebab, vague) next to Dashboard/ (PascalCase) next to api/ (lowercase) — the AI picked a different convention each session because none was specified. 3) <strong>api-client-v2.js next to client.js</strong> — classic "AI wrote a new version instead of editing the old one" pattern; almost certainly one is dead. 4) <strong>Two test directories</strong> (test/ and tests/) — both will keep growing because neither was deleted. 5) <strong>Three doc files of overlapping/competing purpose</strong> (NOTES.md, TODO_old.md, TODO_new.md) sitting at root, uncommitted-looking but actually committed. 6) <strong>An ungitignored data artifact at root</strong> — scratch_data.json should be in a gitignored scratch/ or deleted. 7) <strong>CLAUDE.md frozen at week 1</strong> — none of problems 1-6 are reflected in it, so the AI keeps being briefed on a project that no longer exists. The fix is one merged utils/ dir, one tests/ dir, one current context file, and a delete pass on the rest.</div></div>
</div>`,

'vibe:contextfiles': () => `<div class="panel" id="panel-vibe-contextfiles">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Project Structure</span> › Context Files</div>
  <h1>Context <span class="hl">Files</span></h1>
  <p class="lead">Every AI session starts with zero memory of past sessions. Context files are your solution — version-controlled documents that give the AI a persistent, accurate briefing on your project every time. They're the closest thing vibe coding has to institutional memory.</p>
  <div class="info-box"><strong>A context file is not README.md.</strong> README is for humans using your project. The context file is for the AI working on it — different audience, different content.</div>
  <h2>AGENTS.md Is Now the Cross-Tool Standard</h2>
  <div class="info-box amber"><strong>This changed recently — update your mental model:</strong> <code class="inline">AGENTS.md</code> has emerged as the shared, tool-agnostic convention, read natively by Codex CLI, Cursor, Aider, Devin, Copilot, Gemini CLI, Windsurf, Amazon Q, and more. <strong>Claude Code is the exception</strong> — it reads <code class="inline">CLAUDE.md</code>, not <code class="inline">AGENTS.md</code>, natively. If your repo only has an AGENTS.md and no CLAUDE.md, Claude Code loads zero project instructions.</div>
  <h2>Bridging CLAUDE.md and AGENTS.md</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">If you work across multiple AI tools (Claude Code plus Cursor or Copilot), write one file and point the other at it. Two options, in order of preference:</p>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'vibe-ctx1','vibe-ctx-import')">Import (recommended)</button>
    <button class="tab-btn" onclick="switchTab(this,'vibe-ctx1','vibe-ctx-symlink')">Symlink (fallback)</button>
  </div>
  <div id="vibe-ctx1">
    <div id="vibe-ctx-import" class="tab-content active">
      <div class="code-block"><span class="code-label">// CLAUDE.md — IMPORT AGENTS.md, NO DUPLICATION</span><span class="c"># Project context</span>
@AGENTS.md

<span class="c"># Claude-specific additions (optional)</span>
- Prefer subagents for large refactors; keep the main thread for planning.</div>
      <div class="info-box green">Claude Code supports <code class="inline">@path</code> import syntax in CLAUDE.md. Write your real conventions once in AGENTS.md, then import them — every tool stays in sync, and Claude-only notes stay in CLAUDE.md where only Claude reads them. This survives Windows checkouts and CI runners that don't preserve symlinks.</div>
    </div>
    <div id="vibe-ctx-symlink" class="tab-content">
      <div class="code-block"><span class="code-label">// FALLBACK: SYMLINK (POSIX ONLY)</span>ln -s AGENTS.md CLAUDE.md
git add CLAUDE.md   <span class="c"># confirm git stored a symlink, not a copy</span></div>
      <div class="info-box amber">Works, but fragile: you can't add Claude-only lines, and some Windows checkouts / CI runners don't preserve symlinks (use the <code class="inline">@AGENTS.md</code> import on Windows instead).</div>
    </div>
  </div>
  <h2>What Goes in a Context File</h2>
  <div class="code-block"><span class="code-label">// AGENTS.md — THE TEMPLATE (import this from CLAUDE.md)</span># Project Brief
[One paragraph: what this is, who it's for, the core purpose]

# Tech Stack
- Language: TypeScript 5.x
- Framework: Next.js 14 (App Router)
- Database: PostgreSQL via Prisma ORM
- Styling: Tailwind CSS
[List every major dependency with version. Be specific.]

# Directory Structure
- src/core/     Domain logic, no framework dependencies
- src/features/ One folder per feature; keep feature-local
- src/lib/      Shared utilities — ONLY place for shared code
- tests/        Mirrors src/ structure exactly
- scratch/      Gitignored experiments, never production code
[Skip this section entirely if your layout already follows standard
framework conventions the agent already knows — don't restate the obvious.]

# Conventions
- Functions: camelCase, pure where possible
- Files: kebab-case
- Types: PascalCase interfaces, co-located with usage
- Error handling: use Result pattern (see src/lib/result.ts)
- No default exports
[Only list rules that differ from the language/framework default.]

# Build, Test &amp; Commands
- npm run dev    Start dev server (port 3000)
- npm test       Run vitest (exact flags matter — include them)
- npm run lint   ESLint + Prettier check
- npm run build  Production build

# DO NOT
- Create files outside the defined directories without asking
- Add new dependencies without confirming
- Duplicate existing utilities in src/lib/
- Modify .env — use .env.example

# Current Focus
[What you're working on right now — update each session]</div>
  <h2>Keeping It Current</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔄</div><div class="cap-text"><strong style="color:var(--accent)">Update the "Current Focus" section each session</strong><span>A stale context file is only slightly better than none. The current-focus section helps the AI pick up where you left off without re-explaining the context.</span></div></li>
    <li><div class="cap-icon">🏗</div><div class="cap-text"><strong style="color:var(--accent)">Reflect major architectural decisions</strong><span>When you make a significant structure or pattern decision, add it immediately. Future sessions inherit the decision automatically.</span></div></li>
    <li><div class="cap-icon">📦</div><div class="cap-text"><strong style="color:var(--accent)">Commit it with the changes it reflects</strong><span>Context file updates should be in the same commit as the changes they describe. This keeps them in sync and makes the history meaningful.</span></div></li>
    <li><div class="cap-icon">🪶</div><div class="cap-text"><strong style="color:var(--accent)">Keep it short, critical rules first</strong><span>Bloated context files are counter-productive — the agent has to wade through noise to find the rules. Put the most important constraints near the top; move verbose reference into docs/ and link to it.</span></div></li>
    <li><div class="cap-icon">🔒</div><div class="cap-text"><strong style="color:var(--accent)">Pair it with hooks for anything that must never fail</strong><span>A context file is a strong suggestion the model usually follows. For rules that cannot be skipped — "never commit .env", "always run lint before stopping" — back them with a deterministic Claude Code hook (PreToolUse / PostToolUse). Hooks run real code and can't be talked out of the rule; prose in a context file sometimes can.</span></div></li>
  </ul>
  <h2>Platform-Specific Names (mid-2026)</h2>
  <table class="data-table">
    <tr><th>Tool</th><th>File</th><th>Location</th></tr>
    <tr><td>Claude Code</td><td>CLAUDE.md (native) — import <code class="inline">@AGENTS.md</code> for shared rules</td><td>Repo root (or per-subdirectory)</td></tr>
    <tr><td>Codex CLI, Cursor, Aider, Devin, Copilot, Gemini CLI, Windsurf, Amazon Q</td><td>AGENTS.md</td><td>Repo root</td></tr>
    <tr><td>Cursor (legacy)</td><td>.cursorrules or .cursor/rules</td><td>Repo root</td></tr>
    <tr><td>GitHub Copilot (legacy)</td><td>copilot-instructions.md</td><td>.github/</td></tr>
  </table>
  <h2 style="margin-top:28px;">Exercise: Write Your Own Context File</h2>
  <div class="info-box"><strong>Hands-on (15-20 minutes).</strong> Pick a real or hypothetical project you're working on and write an AGENTS.md for it using the template above. Then answer these four checks:</div>
  <ul class="checklist">
    <li>Does the "Tech Stack" section name exact versions, not just "React" or "Node"?</li>
    <li>Does "Directory Structure" map every top-level folder to a one-line rule — or did you correctly skip it because your layout is already framework-standard?</li>
    <li>Is every line in "Conventions" something that differs from the language/framework default? (If the AI would already do it without being told, delete the line.)</li>
    <li>Could you read the entire file in under 60 seconds? If not, move detail into docs/ and link to it from here.</li>
  </ul>
  <div class="info-box green">If you use Claude Code day to day, finish the exercise by adding a one-line <code class="inline">@AGENTS.md</code> import to a CLAUDE.md so the file works for every tool, not just one.</div>
</div>`,

'vibe:docs': () => `<div class="panel" id="panel-vibe-docs">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Project Structure</span> › Documentation Strategy</div>
  <h1>Documentation <span class="hl">Strategy</span></h1>
  <p class="lead">AI generates documentation effortlessly — which is the problem. The natural vibe-coding failure mode is an explosion of markdown files: NOTES.md, TODO_v2.md, PLAN_final_FINAL.md, all overlapping, all slightly wrong, none clearly authoritative. A few living documents beat a graveyard of stale ones every time.</p>
  <div class="info-box amber"><strong>The instinct to suppress:</strong> When the AI offers to "generate docs," your default should be "update the existing doc," not "sure, make a new one." Every new doc file you accept is one more thing to keep current and one more potential source of conflicting information.</div>
  <h2>The Living Document Set (Keep It Small)</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">📖</div><div class="cap-text"><strong style="color:var(--accent)">README.md</strong><span>What it is, how to run it, how to contribute. One document, always current. The entry point for everyone, including the AI you load next session.</span></div></li>
    <li><div class="cap-icon">🏗</div><div class="cap-text"><strong style="color:var(--accent)">docs/architecture.md</strong><span>The high-level structure: what the major components are, how they relate, and why the key architectural decisions were made. Update in-place — no versioned copies.</span></div></li>
    <li><div class="cap-icon">📋</div><div class="cap-text"><strong style="color:var(--accent)">docs/decisions.md (ADR log)</strong><span>An append-only log of significant decisions: what was decided, the alternatives considered, and the reasoning. This is the most valuable doc you'll maintain — it explains the "why" that code alone cannot.</span></div></li>
    <li><div class="cap-icon">🤖</div><div class="cap-text"><strong style="color:var(--accent)">CLAUDE.md</strong><span>The AI-facing brief. Covers conventions, structure, current focus, and DO NOT rules. This is a living document the AI updates with you.</span></div></li>
  </ul>
  <h2>What NOT to Create</h2>
  <ul class="checklist">
    <li>TODO.md — use GitHub issues or your task tracker, not a file that goes stale</li>
    <li>NOTES.md, SCRATCH.md — these belong in scratch/ (gitignored) or nowhere</li>
    <li>PLAN.md — your planning lives in issues/tickets, not versioned files</li>
    <li>Multiple files covering the same topic with slightly different names</li>
    <li>Auto-generated API docs checked into source (generate them at build time)</li>
  </ul>
  <h2>The ADR Pattern (Decisions Log)</h2>
  <div class="code-block"><span class="code-label">// docs/decisions.md — APPEND-ONLY FORMAT</span>## 2025-06-10 — Use Prisma over raw SQL
Why: team more productive with ORM; type safety catches schema drift.
Alternatives considered: Drizzle, Kysely.
Tradeoff: some perf overhead; acceptable at current scale.

## 2025-06-15 — No default exports
Why: explicit named imports make refactoring and AI-assisted search reliable.
Rule in CLAUDE.md enforcing this.

## 2025-07-02 — Feature-first directory over type-first
Why: easier to load a single feature into AI context cleanly.
Exceptions: shared utilities stay in src/lib/.</div>
  <div class="info-box green"><strong>AI accelerates ADRs:</strong> After making a decision in conversation with the AI, ask it to write the ADR entry. It already knows the alternatives discussed. This makes the high-value decisions log essentially free to maintain — the AI drafts, you approve and commit.</div>
</div>`,

'vibe:codebloat': () => `<div class="panel" id="panel-vibe-codebloat">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Fighting Bloat</span> › Code Bloat</div>
  <h1>Code <span class="hl">Bloat</span></h1>
  <p class="lead">Code bloat is the silent accumulation of functions that do nothing, helpers that duplicate each other, abstractions nobody uses, and experiments that never got cleaned up. It's invisible until the codebase becomes heavy and confusing — then it's everywhere.</p>
  <h2>How It Happens</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Duplication — the #1 source <span class="acc-arrow">▾</span></div><div class="acc-body">The AI is asked to add a feature. It writes a new helper function rather than discovering that an identical one exists in src/lib/. Next week it happens again. Three months later there are four slightly-different versions of formatDate() scattered across the codebase. The AI cannot reliably search across a whole repo — it builds on what's in context, not what exists everywhere.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Dead code accumulation <span class="acc-arrow">▾</span></div><div class="acc-body">You ask the AI to rewrite a function. It writes the new one and leaves the old one — not sure if you still need it. You accept the diff without noticing. The old function sits there, compiling fine, doing nothing, confusing the next session of the AI (and you) that encounters it.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Preemptive abstraction <span class="acc-arrow">▾</span></div><div class="acc-body">AI-generated code often over-abstracts — it creates configurable, extensible, generic infrastructure for a use case that needs exactly one thing, now. You end up with plugin systems, factories, and registry patterns for features that will never vary. YAGNI (you ain't gonna need it) is violated constantly by helpful AI assistants.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Abandoned experiment code <span class="acc-arrow">▾</span></div><div class="acc-body">You explored an approach, decided against it, moved on — but the exploratory code got committed. Now it's in main with no context about why it exists or whether it's safe to delete. The AI in future sessions treats it as intentional production code and builds on it.</div></div>
  <h2>Prevention</h2>
  <div class="code-block"><span class="code-label">// TELL THE AI TO REUSE, NOT DUPLICATE</span><span class="c">// Always orient the AI to the existing codebase:</span>

"Before implementing a date formatter, check src/lib/ for existing
utilities and reuse or extend them. Do NOT create a new one unless
there is no suitable existing implementation."

"Remove the old implementation of X before adding the new one.
I don't need both."

"Keep this function simple and specific — no generalization
beyond what's needed right now."</div>
  <h2>Regular Pruning Passes</h2>
  <div class="info-box green"><strong>Schedule dead-code passes:</strong> Every 1-2 weeks, run a pass specifically for removal. Ask the AI: "Identify functions, exports, and files in src/ that appear unused. List them with your confidence level. I will confirm before deletion." This keeps the codebase lean and keeps the AI's future context signal-rich.</div>
  <div class="code-block"><span class="code-label">// DEAD CODE DISCOVERY PROMPT</span>"Audit the codebase for dead code. For each candidate:
- Name and location
- Why you believe it's unused
- Confidence: HIGH / MEDIUM / LOW
Do not delete anything — list only. I will review and confirm."</div>
  <h2 style="margin-top:28px;">Exercise: Spot the Bloat</h2>
  <div class="info-box amber"><strong>Hands-on (10 minutes).</strong> The three snippets below were all generated by an AI assistant across three different sessions on the same project, two weeks apart. Find the problems before reading the answer.</div>
  <div class="code-block"><span class="code-label">// src/lib/format.ts — session 1</span><span class="k">export function</span> <span class="n">formatUserDate</span>(date: Date): string {
  <span class="k">return</span> date.toLocaleDateString(<span class="s">'en-US'</span>, { year: <span class="s">'numeric'</span>, month: <span class="s">'short'</span>, day: <span class="s">'numeric'</span> });
}</div>
  <div class="code-block"><span class="code-label">// src/features/dashboard/utils.ts — session 2 (two weeks later)</span><span class="k">export function</span> <span class="n">prettyDate</span>(d: Date) {
  <span class="k">return</span> d.toLocaleDateString(<span class="s">'en-US'</span>, { year: <span class="s">'numeric'</span>, month: <span class="s">'short'</span>, day: <span class="s">'numeric'</span> });
}

<span class="k">export function</span> <span class="n">formatDateForDisplay</span>(date) { <span class="c">// no type — note this</span>
  <span class="k">if</span> (!date) <span class="k">return</span> <span class="s">''</span>;
  <span class="k">return</span> <span class="k">new</span> Date(date).toLocaleDateString();
}</div>
  <div class="code-block"><span class="code-label">// src/features/billing/invoice-helpers.ts — session 3</span><span class="k">class</span> <span class="n">DateFormatterFactory</span> {
  <span class="k">static</span> <span class="n">create</span>(locale = <span class="s">'en-US'</span>) {
    <span class="k">return</span> { format: (d) =&gt; d.toLocaleDateString(locale, { year: <span class="s">'numeric'</span>, month: <span class="s">'short'</span>, day: <span class="s">'numeric'</span> }) };
  }
}
<span class="c">// used in exactly one place, instead of just calling formatUserDate()</span></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Reveal the bloat findings <span class="acc-arrow">▾</span></div><div class="acc-body">1) <strong>Three implementations of the same date formatter</strong> — formatUserDate, prettyDate, and formatDateForDisplay all do roughly the same thing with subtly different behavior (formatDateForDisplay silently returns '' on falsy input; the others don't guard at all). 2) <strong>formatDateForDisplay has no types</strong> — likely added under time pressure, now untyped code sits next to a typed codebase. 3) <strong>DateFormatterFactory is preemptive abstraction</strong> — a factory pattern for a single call site, more ceremony than the formatUserDate() it should have just called. The fix: pick formatUserDate as canonical, delete the other two, fix the one call site that needs locale support to take a parameter instead of a factory, and add "reuse src/lib/format.ts for all date formatting" to your context file so the next session doesn't repeat this.</div></div>
</div>`,

'vibe:docbloat': () => `<div class="panel" id="panel-vibe-docbloat">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Fighting Bloat</span> › Doc &amp; Artifact Bloat</div>
  <h1>Doc <span class="hl">&amp; Artifact Bloat</span></h1>
  <p class="lead">Documentation and artifact bloat is subtler than code bloat but equally damaging. A proliferation of overlapping, stale files makes it impossible to know what's current — for you, for teammates, and for the AI that reads the repo every session.</p>
  <h2>Document Bloat Patterns</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">👻</div><div class="card-title">Ghost Docs</div><div class="card-body">Docs that once described the plan, now describe the old plan. Every architectural shift leaves a phantom document that misleads anyone who reads it.</div><span class="tag red">stale</span></div>
    <div class="card"><div class="card-icon">🪞</div><div class="card-title">Mirror Docs</div><div class="card-body">Two docs covering the same topic with 80% overlap. Neither is complete; neither is authoritative. Both are wrong in different places.</div><span class="tag amber">duplicate</span></div>
    <div class="card"><div class="card-icon">📌</div><div class="card-title">Sticky Notes in Repo</div><div class="card-body">TODO.md, THOUGHTS.md, QUESTIONS.md — mental scribbles that got committed and never revisited. They belong in scratch/ or an issue tracker.</div><span class="tag violet">noise</span></div>
    <div class="card"><div class="card-icon">🏭</div><div class="card-title">Generated Noise</div><div class="card-body">AI-generated summaries, reports, analysis files that were useful once and committed "just in case." They age immediately and accumulate.</div><span class="tag">junk</span></div>
  </div>
  <h2>Artifact Bloat</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Artifacts are anything generated that isn't production source: test fixtures, sample outputs, exported data, screenshots, mock files. Left unchecked these pile up in the repo silently.</p>
  <div class="code-block"><span class="code-label">// .gitignore — KEEP THESE OUT OF THE REPO</span>scratch/
tmp/
*.tmp
*.bak
*.log
generated/          <span class="c"># anything auto-generated at runtime</span>
test-output/
fixtures/generated/ <span class="c"># handcrafted fixtures go in tests/fixtures/</span>
.env
.env.local
*.png               <span class="c"># unless intentional (logos etc.)</span>
dist/               <span class="c"># build output</span></div>
  <h2>Document Hygiene Rules</h2>
  <ul class="checklist">
    <li><strong>Update, don't create:</strong> When the AI offers to document something, ask "which existing doc should this go in?" not "should I create a new one?"</li>
    <li><strong>Delete when superseded:</strong> When a doc is replaced by a better version, delete the old one in the same commit. No versioned copies in the repo.</li>
    <li><strong>Scratch stays gitignored:</strong> Notes, plans, explorations, generated outputs — scratch/ is where they live and never get committed.</li>
    <li><strong>Quarterly doc audit:</strong> Walk docs/ and ask for each file: "Is this current? Is this the only doc on this topic? If not, merge and delete the others."</li>
    <li><strong>Issue tracker for todos:</strong> TODO in source code is acceptable (with a ticket number). TODO.md in the repo is not.</li>
  </ul>
  <div class="info-box"><strong>The review question for every doc the AI generates:</strong> "Does this file need to exist as a permanent versioned artifact, or is it a scratchpad that belongs in scratch/?" Most generated analysis files are scratchpads pretending to be docs.</div>
</div>`,

'vibe:githygiene': () => `<div class="panel" id="panel-vibe-githygiene">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Fighting Bloat</span> › Git Hygiene</div>
  <h1>Git <span class="hl">Hygiene</span></h1>
  <p class="lead">Git is your safety net and your audit trail. In a vibe-coded project where you're not reading every line, it's also the mechanism that makes large AI changes reviewable and reversible. Poor git hygiene turns AI's speed into a liability.</p>
  <div class="info-box red"><strong>The worst anti-pattern:</strong> "AI, implement the whole feature." Accept. One 47-file commit with message "implement feature." This is unauditable, unrollback-able, and impossible to reason about when something breaks. It destroys the value of version control.</div>
  <div class="info-box red"><strong>Git hygiene is also a security control.</strong> Analysis of AI-assisted commits in 2026 found they expose secrets (API keys, tokens, credentials) at more than twice the rate of human-only commits. The AI will happily hardcode a key it sees in your .env to "make the example work," and if you're skimming a large diff instead of reviewing it line by line, that secret ships straight to your remote. Reviewing every diff before commit and keeping .env out of context (never paste its contents into a prompt) is not optional polish — it's the control that catches this.</div>
  <h2>Small, Frequent, Scoped Commits</h2>
  <div class="code-block"><span class="code-label">// BAD — AI-generated mega-commit</span>commit a7f3b9e
"implement user authentication and dashboard and fix styles and add tests"
 47 files changed, 1,203 insertions(+), 89 deletions(-)

<span class="c">// You have no idea what's in here. Rolling back anything is surgery.</span></div>
  <div class="code-block"><span class="code-label">// GOOD — scoped, reviewable, revertable</span>commit 1a2b3c4  "feat(auth): add JWT token generation in auth.service"
commit 2b3c4d5  "feat(auth): add login endpoint with validation"
commit 3c4d5e6  "test(auth): unit tests for login happy path + errors"
commit 4d5e6f7  "feat(dashboard): skeleton layout, no data yet"

<span class="c">// Each commit is one thing. You can review, revert, or bisect any one.</span></div>
  <h2>Commit Message Discipline</h2>
  <div class="code-block"><span class="code-label">// CONVENTIONAL COMMITS FORMAT</span>type(scope): short imperative description

feat(auth):     new user-facing capability
fix(parser):    bug fix
refactor(lib):  code change with no behavior change
test(api):      adding or updating tests
docs(readme):   documentation only
chore(deps):    tooling, dependencies, build
prune(utils):   deletion of dead code or artifacts

<span class="c"># The AI can write these for you — tell it to use conventional commits.</span>
<span class="c"># "Write a conventional-commit message for the changes you just made."</span></div>
  <h2>Branch Discipline</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🌿</div><div class="cap-text"><strong style="color:var(--accent)">Branch per feature/experiment</strong><span>Never vibe-code directly on main. Each feature or significant experiment gets a branch. This lets you throw away a bad AI direction without touching main.</span></div></li>
    <li><div class="cap-icon">🗑</div><div class="cap-text"><strong style="color:var(--accent)">Delete branches after merge</strong><span>Stale branches are repo clutter and confuse the AI when it lists them. Merge → delete → keep main clean.</span></div></li>
    <li><div class="cap-icon">📸</div><div class="cap-text"><strong style="color:var(--accent)">Tag stable checkpoints</strong><span>Before a major AI-driven refactor, tag the current state: git tag stable-before-refactor. This is your emergency rollback point if the AI direction goes sideways.</span></div></li>
  </ul>
  <h2>Review Before Commit</h2>
  <div class="code-block"><span class="code-label">// YOUR PRE-COMMIT RITUAL</span>git diff --staged          <span class="c"># what am I actually committing?</span>
git status                 <span class="c"># any unintended files staged?</span>

<span class="c"># Specifically check:</span>
<span class="c"># - Did the AI add files I didn't expect?</span>
<span class="c"># - Did it modify .env or config files?</span>
<span class="c"># - Is there dead code left over from a rewrite?</span>
<span class="c"># - Any generated artifacts that should be gitignored?</span></div>
  <div class="info-box green"><strong>The two-minute review:</strong> A quick git diff before every commit catches 90% of AI drift. The AI sometimes adds files, modifies things it wasn't asked to touch, or leaves scaffolding behind. Two minutes of review before committing prevents hours of debugging later.</div>
</div>`,

'vibe:refactor': () => `<div class="panel" id="panel-vibe-refactor">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Fighting Bloat</span> › Refactoring Loop</div>
  <h1>The <span class="hl">Refactoring Loop</span></h1>
  <p class="lead">Refactoring is not optional cleanup in vibe-coded projects — it's a core part of the cycle. Without regular refactoring loops, accumulated AI drift, duplication, and dead abstractions compound until the project becomes resistant to further AI assistance (and to reading by anyone).</p>
  <div class="info-box"><strong>The build-refactor rhythm:</strong> Build in sprints (AI-accelerated feature work). Refactor in pauses (deliberately simplify, consolidate, prune). The ratio depends on pace, but a project that never refactors will accumulate entropy until it stops moving. Plan a refactor pass every 1-2 weeks of active building.</div>
  <h2>The Refactoring Cadence</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// BUILD-REFACTOR CYCLE</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-amber" style="text-align:center;min-width:100px;"><div class="node-eyebrow">1-2 weeks</div><div class="node-name" style="font-size:12px;">Build Sprint</div><div class="node-sub">feature work, AI-fast</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:100px;"><div class="node-eyebrow">1-2 days</div><div class="node-name" style="font-size:12px;">Refactor Pass</div><div class="node-sub">audit, prune, consolidate</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:100px;"><div class="node-eyebrow">update</div><div class="node-name" style="font-size:12px;">Update CLAUDE.md</div><div class="node-sub">reflect new shape</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:100px;"><div class="node-eyebrow">repeat</div><div class="node-name" style="font-size:12px;">Next Sprint</div></div>
    </div>
  </div>
  <h2>What the Refactor Pass Covers</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔍</div><div class="cap-text"><strong style="color:var(--accent)">Find and consolidate duplicates</strong><span>"Scan the codebase for functions with similar names or purposes and identify consolidation candidates." Then merge duplicates into src/lib/ and update all callers.</span></div></li>
    <li><div class="cap-icon">🧹</div><div class="cap-text"><strong style="color:var(--accent)">Remove dead code</strong><span>Unused functions, imports, and files. Use the AI to list candidates; confirm before deletion.</span></div></li>
    <li><div class="cap-icon">📄</div><div class="cap-text"><strong style="color:var(--accent)">Prune docs and artifacts</strong><span>Walk docs/ and scratch/ — delete stale files, merge overlapping ones, remove committed artifacts.</span></div></li>
    <li><div class="cap-icon">✂️</div><div class="cap-text"><strong style="color:var(--accent)">Simplify over-abstracted code</strong><span>"This plugin system is used in exactly one place. Inline it." Simplicity is a feature; premature abstraction is debt.</span></div></li>
    <li><div class="cap-icon">🤖</div><div class="cap-text"><strong style="color:var(--accent)">Update CLAUDE.md</strong><span>After every refactor pass, update the context file to reflect the new shape of the project. The AI you load next session should get an accurate picture.</span></div></li>
  </ul>
  <div class="info-box green"><strong>The AI refactors too — carefully.</strong> Use the AI for refactoring, but with extra discipline. Refactoring PRs should be pure — no behavior changes mixed with cleanup. And always run your tests before and after. The AI is especially likely to miss a subtle behavior difference when consolidating two almost-identical functions.</div>
</div>`,

'vibe:workflow': () => `<div class="panel" id="panel-vibe-workflow">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Practice</span> › A Sustainable Workflow</div>
  <h1>A Sustainable <span class="hl">Workflow</span></h1>
  <p class="lead">Putting it all together: a session-by-session workflow that captures vibe coding's speed without the entropy spiral. This is the operating rhythm that lets you sustain high velocity over weeks and months, not just the first exciting sprint.</p>
  <h2>Session Start Ritual (5 minutes)</h2>
  <div class="code-block"><span class="code-label">// EVERY SESSION BEGINS WITH ORIENTATION</span>1. Open CLAUDE.md — read the "Current Focus" section
2. Update it if the focus has shifted since last session
3. Check git log — what did the last session actually change?
   git log --oneline -10
4. Run tests — confirm you're starting from green
   npm test
5. Brief the AI: share CLAUDE.md + the specific task for this session

<span class="c"># Never just "resume" a session without these 5 minutes.</span>
<span class="c"># The AI has zero memory. You have to re-establish context.</span></div>
  <h2>During the Session</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">One task at a time</strong><span>Tell the AI one thing per message. "Add the login endpoint" not "add auth, dashboard, and fix the CSS." Focused prompts produce reviewable, committable output.</span></div></li>
    <li><div class="cap-icon">📦</div><div class="cap-text"><strong style="color:var(--accent)">Commit as you go</strong><span>Each coherent unit of work gets its own commit. Don't let a session's work pile up into one blob. Review the diff before each commit.</span></div></li>
    <li><div class="cap-icon">🔒</div><div class="cap-text"><strong style="color:var(--accent)">Point at existing code</strong><span>When asking for new code, explicitly direct the AI to existing utilities: "use the Result type in src/lib/result.ts, use the logger in src/lib/logger.ts."</span></div></li>
    <li><div class="cap-icon">🚩</div><div class="cap-text"><strong style="color:var(--accent)">Name what to prune</strong><span>When the AI replaces something, explicitly say "delete the old implementation." Don't leave it to chance.</span></div></li>
  </ul>
  <h2>Session End Ritual (10 minutes)</h2>
  <div class="code-block"><span class="code-label">// CLOSE EVERY SESSION DELIBERATELY</span>1. Run tests — session must end green (or with known, documented failures)
2. git diff --staged — review anything not yet committed
3. Commit all clean work with descriptive messages
4. Ask the AI: "What did we add this session? Anything to clean up?"
5. Update CLAUDE.md "Current Focus" for next session
6. Push — never end a session with local-only work

<span class="c"># A clean session end means next session can start fast.</span></div>
  <h2>The Weekly Rhythm</h2>
  <table class="data-table">
    <tr><th>Cadence</th><th>Activity</th></tr>
    <tr><td>Each session</td><td>Session start + end ritual, commit as you go</td></tr>
    <tr><td>Every 3-4 sessions</td><td>Mini prune: dead code scan, scratch/ cleanup</td></tr>
    <tr><td>Weekly</td><td>Refactor pass: consolidate duplicates, update CLAUDE.md</td></tr>
    <tr><td>Monthly</td><td>Doc audit: walk docs/, delete stale, merge overlapping</td></tr>
  </table>
  <div class="info-box green"><strong>The compounding payoff:</strong> These rituals take 15-20 minutes per session. In return, every future session starts faster (clean context, up-to-date brief), the AI makes fewer mistakes (clean signal), and the codebase stays readable. The overhead is trivially worth the return at any scale.</div>
</div>`,

'vibe:checklist': () => `<div class="panel" id="panel-vibe-checklist">
  <div class="breadcrumb">Vibe Coding › <span class="bc-accent">Practice</span> › Health Checklist</div>
  <h1>Project Health <span class="hl">Checklist</span></h1>
  <p class="lead">Run this checklist weekly (or whenever the project starts feeling heavy). Each check is a question you should be able to answer yes to. Items you can't answer yes to are your highest-priority maintenance tasks.</p>
  <h2>Structure &amp; Context</h2>
  <ul class="checklist">
    <li>CLAUDE.md exists, is current, and reflects the actual project structure</li>
    <li>The "Current Focus" section in CLAUDE.md reflects what you're working on now</li>
    <li>All top-level directories have a clear, documented purpose</li>
    <li>There is exactly one shared utilities directory and the AI knows where it is</li>
    <li>scratch/ is gitignored and you know what's in it</li>
  </ul>
  <h2>Code Hygiene</h2>
  <ul class="checklist">
    <li>No duplicate implementations of the same utility (run a dedup check if unsure)</li>
    <li>No dead exports — every exported symbol is imported somewhere</li>
    <li>No leftover experimental code on main branches</li>
    <li>No over-engineered abstractions used in only one place</li>
    <li>Tests pass on main</li>
  </ul>
  <h2>Documentation</h2>
  <ul class="checklist">
    <li>docs/ contains no more than 4-5 files — each with a clear, distinct purpose</li>
    <li>No duplicate or overlapping docs on the same topic</li>
    <li>README is current — running the start commands in it actually works</li>
    <li>docs/decisions.md reflects recent significant choices</li>
    <li>No TODO.md, NOTES.md, or PLAN.md committed to the repo</li>
  </ul>
  <h2>Git Health</h2>
  <ul class="checklist">
    <li>Last 10 commits each do one describable thing</li>
    <li>No commit messages that say "WIP", "stuff", or "AI changes"</li>
    <li>No stale branches older than 2 weeks that aren't merged or abandoned</li>
    <li>.gitignore covers scratch/, tmp/, .env, and generated artifacts</li>
    <li>Nothing sensitive (secrets, keys) has ever been committed (check with git log -S)</li>
  </ul>
  <h2>Context Quality</h2>
  <ul class="checklist">
    <li>Loading the project context into a fresh AI session gives sensible, accurate behavior</li>
    <li>The AI can find existing utilities without being reminded each time</li>
    <li>There are no contradictions between CLAUDE.md and the actual codebase</li>
  </ul>
  <div class="info-box green"><strong>The test:</strong> Can you hand this project to a new team member (or a fresh AI session) with CLAUDE.md + the README and have them be productive within 30 minutes? If yes, the project is healthy. If not, the checklist tells you what to fix.</div>
</div>`,

'qa:philosophy': () => `<div class="panel" id="panel-qa-philosophy">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Foundations</span> › QA Philosophy</div>
  <h1>QA <span class="hl">Philosophy</span></h1>
  <p class="lead">A test suite is not a bureaucratic tax on development — it's a confidence machine. Good tests let you move fast without fear. Bad tests slow you down and still miss the real bugs. The goal is a lean, meaningful suite that catches real failures and runs in under two minutes.</p>
  <div class="info-box"><strong>The testing pyramid:</strong> Many fast unit tests at the base. Fewer integration tests in the middle. A handful of E2E tests at the top. The pyramid is about matching cost to value — not about writing as many tests as possible.</div>
  <h2>The Three Test Types</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🔬</div><div class="card-title">Unit Tests</div><div class="card-body">Test one function or class in isolation. No network, no DB. Milliseconds each. Hundreds of them. Catch logic bugs instantly.</div><span class="tag">fast · cheap · many</span></div>
    <div class="card"><div class="card-icon">🔗</div><div class="card-title">Integration Tests</div><div class="card-body">Test how components work together — API endpoints, DB queries, service interactions. Slower, but verify the contracts between parts.</div><span class="tag amber">medium · fewer</span></div>
    <div class="card"><div class="card-icon">🌐</div><div class="card-title">E2E Tests</div><div class="card-body">Simulate a real user through a real browser. Slowest, most fragile, most realistic. Reserve for critical user journeys only.</div><span class="tag red">slow · fewest · critical paths</span></div>
  </div>
  <h2>What Makes a Test Good?</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🎯</div><div class="cap-text"><strong style="color:var(--accent)">Tests one thing</strong><span>A test that checks 10 behaviors at once tells you something broke but not what. One assertion per test is the ideal — one failing reason, one clear diagnosis.</span></div></li>
    <li><div class="cap-icon">⚡</div><div class="cap-text"><strong style="color:var(--accent)">Runs in isolation</strong><span>Tests that share state, depend on run order, or require a live service are fragile and slow. Good tests mock everything external and own their setup and teardown.</span></div></li>
    <li><div class="cap-icon">📖</div><div class="cap-text"><strong style="color:var(--accent)">Acts as documentation</strong><span>A well-named test is the best spec for a function. "returns null when user is not found" tells you more than comments ever will.</span></div></li>
    <li><div class="cap-icon">🔴</div><div class="cap-text"><strong style="color:var(--accent)">Fails for the right reason</strong><span>A test that never fails is useless. Write the test to fail first (Red), then make it pass (Green). A test that can't fail doesn't test anything.</span></div></li>
  </ul>
  <div class="info-box amber"><strong>The coverage trap:</strong> 100% line coverage sounds great and tells you very little. A test that calls a function and ignores the output scores perfect coverage with zero quality assurance. Write tests that assert meaningful behavior, not tests that touch lines.</div>
</div>`,

'qa:stack': () => `<div class="panel" id="panel-qa-stack">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Foundations</span> › Choosing Your Stack</div>
  <h1>Choosing Your <span class="hl">Stack</span></h1>
  <p class="lead">Your testing stack depends on your language, framework, and what you're testing. The good news: modern AI is fluent in all of them. Pick defaults that work, commit to them, and put them in your CLAUDE.md so the AI generates consistent tests every session.</p>
  <h2>Recommended Stacks by Language</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'qs1','qs-ts')">TypeScript / Node</button>
    <button class="tab-btn" onclick="switchTab(this,'qs1','qs-py')">Python</button>
    <button class="tab-btn" onclick="switchTab(this,'qs1','qs-go')">Go</button>
    <button class="tab-btn" onclick="switchTab(this,'qs1','qs-java')">Java / Kotlin</button>
  </div>
  <div id="qs1">
    <div class="tab-content active" id="qs-ts">
      <h2>TypeScript / Node.js</h2>
      <table class="data-table">
        <tr><th>Layer</th><th>Tool</th><th>Why</th></tr>
        <tr><td>Unit + Integration</td><td><span class="hl">Vitest</span></td><td>Fast, ESM-native, Jest-compatible API. Best default for modern TS projects.</td></tr>
        <tr><td>Unit + Integration</td><td><span class="hl-amber">Jest</span></td><td>The old standard. Mature ecosystem, more config required. Good if team already knows it.</td></tr>
        <tr><td>E2E</td><td><span class="hl">Playwright</span></td><td>Cross-browser, fast, excellent CI support, great AI generation target.</td></tr>

'qa:structure': () => `<div class="panel" id="panel-qa-structure">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Foundations</span> › Test Structure</div>
  <h1>Test <span class="hl">Structure</span></h1>
  <p class="lead">How you organize tests is as important as how you write them. A well-structured test suite is easy to navigate, easy for the AI to extend correctly, and easy to run in targeted slices. A chaotic test structure produces orphaned tests, duplicate coverage, and CI pipelines nobody wants to debug.</p>
  <h2>Directory Layout</h2>
  <div class="code-block"><span class="code-label">// CO-LOCATED TESTS (recommended for most projects)</span>src/
  features/
    auth/
      auth.service.ts
      auth.service.test.ts     <span class="c"># co-located — easy to find</span>
      auth.controller.ts
      auth.controller.test.ts
  lib/
    validators.ts
    validators.test.ts

tests/                          <span class="c"># integration and E2E separate</span>
  integration/
    auth.api.test.ts
    user.api.test.ts
  e2e/
    login.spec.ts
    checkout.spec.ts
  fixtures/                     <span class="c"># shared test data</span>
    users.ts
    orders.ts</div>
  <h2>The Anatomy of a Great Test File</h2>
  <div class="code-block"><span class="code-label">// VITEST EXAMPLE — auth.service.test.ts</span>import { describe, it, expect, beforeEach, vi } from 'vitest'
import { AuthService } from './auth.service'
import { UserRepository } from '../lib/user.repository'

vi.mock('../lib/user.repository')   <span class="c"># mock external deps</span>

describe('AuthService', () => {
  let service: AuthService
  let mockRepo: UserRepository

  beforeEach(() => {                 <span class="c"># fresh state each test</span>
    mockRepo = new UserRepository()
    service  = new AuthService(mockRepo)
  })

  describe('login', () => {
    it('returns a JWT when credentials are valid', async () => {
      vi.mocked(mockRepo.findByEmail).mockResolvedValue({ id: '1', hash: '...' })
      const token = await service.login('user@example.com', 'correct-password')
      expect(token).toMatch(/^eyJ/)  <span class="c"># JWT prefix check</span>
    })

    it('throws AuthError when user is not found', async () => {
      vi.mocked(mockRepo.findByEmail).mockResolvedValue(null)
      await expect(service.login('no@one.com', 'pw')).rejects.toThrow('AuthError')
    })

    it('throws AuthError when password is wrong', async () => { ... })
  })
})</div>
  <h2>Test File Naming Convention</h2>
  <table class="data-table">
    <tr><th>Layer</th><th>Pattern</th><th>Example</th></tr>
    <tr><td>Unit</td><td><code class="inline">*.test.ts</code></td><td>auth.service.test.ts</td></tr>
    <tr><td>Integration</td><td><code class="inline">*.api.test.ts</code> or <code class="inline">*.integration.test.ts</code></td><td>auth.api.test.ts</td></tr>
    <tr><td>E2E</td><td><code class="inline">*.spec.ts</code></td><td>login.spec.ts</td></tr>
  </table>
  <div class="info-box"><strong>Encode conventions in CLAUDE.md:</strong> "Unit tests are co-located as *.test.ts. Integration tests live in tests/integration/. E2E tests live in tests/e2e/ as *.spec.ts. Always use describe() blocks named after the module, then nested describe() for each method." The AI follows this exactly when it generates new tests.</div>
</div>`,

'qa:unit': () => `<div class="panel" id="panel-qa-unit">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Writing Tests with AI</span> › Unit Tests</div>
  <h1>Unit Tests <span class="hl">with AI</span></h1>
  <p class="lead">Unit tests are where AI assistance is most powerful — the patterns are well-defined, the AI knows every testing framework deeply, and generating a full suite for a function takes seconds. The skill is in prompting precisely and reviewing critically.</p>
  <h2>The Unit Test Generation Prompt</h2>
  <div class="code-block"><span class="code-label">// MASTER UNIT TEST PROMPT — paste this, fill the blanks</span>Generate a complete Vitest unit test suite for the following function.

FUNCTION:
{paste the complete function with its type signatures}

BEHAVIOR:
{describe what it's supposed to do in plain English}

REQUIREMENTS:
- Test all happy paths (successful inputs)
- Test all error/null/edge cases listed below
- Mock all external dependencies (list them: {deps})
- Use describe() named after the function, nested describe() per scenario
- Each it() tests exactly one behavior
- Assertion messages should read as documentation

EDGE CASES TO COVER:
- {list each one explicitly: empty array, null user, negative amount, etc.}

FRAMEWORK: Vitest with TypeScript
TEST FILE LOCATION: {path/to/file.test.ts}</div>
  <h2>Example: From Function to Full Suite</h2>
  <div class="code-block"><span class="code-label">// THE FUNCTION</span>export async function calculateDiscount(
  userId: string,
  cartTotal: number,
  couponCode?: string
): Promise<{ finalTotal: number; discountApplied: number }> {
  // validates userId, looks up coupon, applies discount
}</div>
  <div class="code-block"><span class="code-label">// THE PROMPT (abbreviated)</span>"Generate Vitest tests for calculateDiscount().
 It fetches user tier from UserService, fetches coupon from CouponService,
 applies tier discount (gold=20%, silver=10%, bronze=0%) then coupon discount.
 Edge cases: invalid userId throws UserNotFoundError, expired coupon returns
 0 discount, null couponCode skips coupon lookup, negative cartTotal throws
 ValidationError, both discounts stack (tier first, then coupon on remainder)."</div>
  <div class="code-block"><span class="code-label">// AI GENERATES (excerpt)</span>describe('calculateDiscount', () => {
  describe('with valid gold user and valid coupon', () => {
    it('applies 20% tier discount then coupon discount on remainder', async () => {
      mockUserService.getUser.mockResolvedValue({ tier: 'gold' })
      mockCouponService.getCoupon.mockResolvedValue({ discount: 0.1, expired: false })
      const result = await calculateDiscount('user-1', 100, 'SAVE10')
      expect(result.finalTotal).toBe(72)          <span class="c"># 100 * 0.8 * 0.9</span>
      expect(result.discountApplied).toBe(28)
    })
  })
  describe('when couponCode is omitted', () => {
    it('skips coupon lookup and applies only tier discount', async () => { ... })
  })
  describe('when userId is invalid', () => {
    it('throws UserNotFoundError', async () => { ... })
  })
})</div>
  <div class="info-box green"><strong>Review what AI generates:</strong> Check that every mock is properly set up, every assertion is actually meaningful, and the edge cases you named are genuinely covered. AI sometimes generates test structure that looks complete but asserts on the wrong value. Read the assertions, not just the test names.</div>
</div>`,

'qa:integration': () => `<div class="panel" id="panel-qa-integration">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Writing Tests with AI</span> › Integration Tests</div>
  <h1>Integration Tests <span class="hl">with AI</span></h1>
  <p class="lead">Integration tests verify that components work together correctly — your API endpoint responds correctly, your database queries return the right shape, your service calls compose properly. They're slower than unit tests but catch an entirely different class of bugs.</p>
  <h2>API Integration Testing</h2>
  <div class="code-block"><span class="code-label">// SUPERTEST + VITEST — TEST AN EXPRESS ENDPOINT</span>import request from 'supertest'
import { app } from '../src/app'
import { db } from '../src/lib/db'

beforeAll(async () => { await db.migrate.latest() })
afterAll(async () => { await db.destroy() })
afterEach(async () => { await db.raw('TRUNCATE users CASCADE') })

describe('POST /api/auth/login', () => {
  it('returns 200 and a JWT with valid credentials', async () => {
    await db('users').insert({ email: 'test@test.com', password_hash: '...' })
    const res = await request(app)
      .post('/api/auth/login')
      .send({ email: 'test@test.com', password: 'correct' })
    expect(res.status).toBe(200)
    expect(res.body.token).toMatch(/^eyJ/)
  })

  it('returns 401 with wrong password', async () => {
    const res = await request(app)
      .post('/api/auth/login')
      .send({ email: 'test@test.com', password: 'wrong' })
    expect(res.status).toBe(401)
    expect(res.body.token).toBeUndefined()
  })
})</div>
  <h2>Integration Test Generation Prompt</h2>
  <div class="code-block"><span class="code-label">// MASTER INTEGRATION TEST PROMPT</span>Generate Vitest + Supertest integration tests for this API endpoint.

ENDPOINT: {METHOD} {/path}
HANDLER CODE: {paste the handler}
SCHEMA: {paste relevant DB schema or types}

TEST EACH:
- Happy path with a real DB insert and response assertion
- Auth failure (missing/invalid token) -> 401
- Validation failure (bad body) -> 400 with error details
- Not found (valid auth, nonexistent resource) -> 404
- Any business-rule failures specific to this endpoint

SETUP:
- Use SQLite in-memory for the test DB
- Truncate affected tables in afterEach()
- Use beforeAll() to run migrations

Keep tests independent — each test owns its own seed data.</div>
  <h2>Using Testcontainers for Real DBs</h2>
  <div class="code-block"><span class="code-label">// TESTCONTAINERS — REAL POSTGRES IN CI</span>import { PostgreSqlContainer } from '@testcontainers/postgresql'

let container: StartedPostgreSqlContainer

beforeAll(async () => {
  container = await new PostgreSqlContainer().start()
  process.env.DATABASE_URL = container.getConnectionUri()
  await runMigrations()
})

afterAll(async () => { await container.stop() })

<span class="c"># Testcontainers spins up a real Postgres in Docker,</span>
<span class="c"># runs your tests against it, then tears it down.</span>
<span class="c"># Works in GitHub Actions with Docker enabled (default).</span></div>
  <div class="info-box amber"><strong>Integration tests in CI need a database.</strong> Options: SQLite in-memory (fastest, least realistic), Testcontainers (real DB, needs Docker — works in GitHub Actions), or a GitHub Actions service container (postgres:15 as a service in the workflow YAML). The Actions service approach is the simplest for teams already on GitHub.</div>
</div>`,

'qa:e2e': () => `<div class="panel" id="panel-qa-e2e">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Writing Tests with AI</span> › E2E Tests</div>
  <h1>E2E Tests <span class="hl">with AI</span></h1>
  <p class="lead">End-to-end tests simulate real users in a real browser. They catch what unit and integration tests can't: broken user flows, JS errors in the browser, CSS-invisible buttons, cross-service integration failures. Use them sparingly on your most critical paths.</p>
  <div class="info-box amber"><strong>E2E selection rule:</strong> If a user can't do X, the business stops. Test X end-to-end. Everything else gets unit or integration coverage. Too many E2E tests create a slow, fragile suite that everyone disables. Pick 5-10 critical journeys maximum for most apps.</div>
  <h2>Playwright Setup</h2>
  <div class="code-block"><span class="code-label">// playwright.config.ts</span>import { defineConfig } from '@playwright/test'

export default defineConfig({
  testDir: './tests/e2e',
  timeout: 30_000,
  use: {
    baseURL: process.env.E2E_BASE_URL ?? 'http://localhost:3000',
    screenshot: 'only-on-failure',  <span class="c"># screenshots on fail = easy debug</span>
    video: 'retain-on-failure',
    trace: 'retain-on-failure',
  },
  projects: [
    { name: 'chromium', use: { browserName: 'chromium' } },
  ],
})</div>
  <h2>E2E Test Generation Prompt</h2>
  <div class="code-block"><span class="code-label">// MASTER E2E PROMPT</span>Generate a Playwright E2E test for this critical user journey.

JOURNEY: {name, e.g. "User signs up, verifies email, and logs in"}

STEPS:
1. {navigate to /signup}
2. {fill email, password, confirm-password fields}
3. {click Submit button}
4. {expect to see "Check your email" page}
5. {click verification link (use a test email API or seed the token)}
6. {expect to land on /dashboard}

PAGE SELECTORS:
- Email input: {data-testid="email-input" or #email or [name="email"]}
- Password input: {data-testid="password-input"}
- Submit button: {data-testid="submit-btn"}

ASSERTIONS AT EACH STEP:
- Confirm the URL changed
- Confirm key text is visible
- Confirm no console errors

USE: Playwright Page Object Model (create a SignupPage class).</div>
  <h2>The Page Object Model Pattern</h2>
  <div class="code-block"><span class="code-label">// PAGE OBJECT — LoginPage.ts</span>import { Page, Locator } from '@playwright/test'

export class LoginPage {
  readonly emailInput: Locator
  readonly passwordInput: Locator
  readonly submitBtn: Locator

  constructor(private page: Page) {
    this.emailInput   = page.getByTestId('email-input')
    this.passwordInput = page.getByTestId('password-input')
    this.submitBtn    = page.getByTestId('submit-btn')
  }

  async goto()  { await this.page.goto('/login') }
  async login(email: string, password: string) {
    await this.emailInput.fill(email)
    await this.passwordInput.fill(password)
    await this.submitBtn.click()
  }
}

<span class="c">// In tests: const loginPage = new LoginPage(page); await loginPage.login(...)</span>
<span class="c">// Selector changes happen in ONE place, not every test.</span></div>
  <div class="info-box green"><strong>Add data-testid to your HTML:</strong> Ask the AI to add data-testid attributes to key interactive elements as it builds them. "Add data-testid='submit-btn' to this button." This makes selectors stable across CSS and text changes — the single best practice for maintainable E2E tests.</div>
</div>`,

EXPECTED BEHAVIOR: {what should have happened}

  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📊 Audit test coverage gaps <span class="acc-arrow">▾</span></div><div class="acc-body"><div class="code-block">Review this file and its test file. Identify:

For each gap: explain what's missing and write the test to fill it.

SOURCE: {paste source file}
TEST FILE: {paste test file}</div></div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🏗 Bootstrap a full test suite for a new module <span class="acc-arrow">▾</span></div><div class="acc-body"><div class="code-block">Bootstrap a complete test suite for this new module.

Framework: {Vitest / pytest / go test}

  <div class="info-box green"><strong>Save your best prompts in prompts/testing.md:</strong> Once you find prompt variants that produce great tests for your codebase, save them. Commit prompts/testing.md to the repo — it's part of your team's AI workflow infrastructure, just like CLAUDE.md.</div>
