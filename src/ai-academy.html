'qa:basics': () => `<div class="panel" id="panel-qa-basics">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">GitHub Actions</span> › Actions Basics</div>
  <h1>GitHub Actions <span class="hl">Basics</span></h1>
  <p class="lead">GitHub Actions runs your tests automatically on every push and pull request — in a clean environment, every time, enforcing quality before code merges. It's the infrastructure that makes your test suite enforce itself instead of relying on developer discipline.</p>
  <h2>Key Concepts</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">📄</div><div class="card-title">Workflow</div><div class="card-body">A YAML file in .github/workflows/. Defines triggers and jobs. Multiple workflows can run in parallel.</div><span class="tag">file</span></div>
    <div class="card"><div class="card-icon">⚡</div><div class="card-title">Trigger</div><div class="card-body">The event that starts a workflow: push, pull_request, schedule, workflow_dispatch (manual).</div><span class="tag amber">event</span></div>
    <div class="card"><div class="card-icon">💼</div><div class="card-title">Job</div><div class="card-body">A set of steps that run on the same runner. Jobs run in parallel by default; add needs: to sequence them.</div><span class="tag violet">job</span></div>
    <div class="card"><div class="card-icon">🔧</div><div class="card-title">Step</div><div class="card-body">A single command or action within a job. Steps share the runner's filesystem and environment.</div><span class="tag green">step</span></div>
  </div>
  <h2>Your First Workflow</h2>
  <div class="code-block"><span class="code-label">// .github/workflows/ci.yml — MINIMAL CI</span>name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci              <span class="c"># ci not install — uses lockfile exactly</span>

      - name: Run tests
        run: npm test

      - name: Check build
        run: npm run build</div>
  <h2>Triggering Rules</h2>
  <div class="code-block"><span class="code-label">// COMMON TRIGGER PATTERNS</span>on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**']  <span class="c"># only if source files changed</span>

  pull_request:
    branches: [main]               <span class="c"># on any PR targeting main</span>

  schedule:
    - cron: '0 2 * * *'            <span class="c"># nightly at 2am UTC</span>

  workflow_dispatch:               <span class="c"># manual "Run workflow" button</span></div>
  <div class="info-box"><strong>Branch protection:</strong> After you have a working CI workflow, go to Settings > Branches > Add rule, require the CI job to pass before merging. Now it's impossible to merge broken code to main — the test suite enforces itself.</div>
</div>`,

'qa:pipeline': () => `<div class="panel" id="panel-qa-pipeline">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">GitHub Actions</span> › Full CI Pipeline</div>
  <h1>Full CI <span class="hl">Pipeline</span></h1>
  <p class="lead">A production-grade CI pipeline runs tests in parallel layers, enforces coverage thresholds, uploads reports, and gates merges on all checks passing. Here's a complete, copy-paste workflow to adapt for your project.</p>
  <div class="code-block"><span class="code-label">// .github/workflows/ci.yml — FULL PRODUCTION PIPELINE</span>name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  COVERAGE_THRESHOLD: '80'

jobs:
  # ─── JOB 1: LINT & TYPE CHECK (fast gate) ─────────────────
  lint:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '&#36;{{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # ─── JOB 2: UNIT TESTS ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '&#36;{{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/

  # ─── JOB 3: INTEGRATION TESTS (with DB service) ───────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '&#36;{{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/testdb
      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/testdb

  # ─── JOB 4: E2E TESTS ─────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]      <span class="c"># only run if unit tests pass</span>
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '&#36;{{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build and start app
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  # ─── JOB 5: COVERAGE GATE ─────────────────────────────────
  coverage-check:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: unit-coverage, path: coverage }
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi</div>
  <div class="info-box green"><strong>Parallel jobs = fast pipeline:</strong> Lint, unit tests, and integration tests run in parallel. E2E waits for unit tests to pass (no point running E2E if unit tests fail). The whole pipeline often completes in under 3 minutes for a typical app.</div>
</div>`,

'qa:autogen': () => `<div class="panel" id="panel-qa-autogen">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">GitHub Actions</span> › Auto-Generate Tests</div>
  <h1>Auto-Generate <span class="hl">Tests</span></h1>
  <p class="lead">The most powerful vibe-coding QA discipline: whenever new code lands, automatically generate tests for uncovered functions. This section covers workflows, git hooks, and AI prompt patterns that keep test coverage growing alongside the codebase.</p>
  <h2>Strategy 1 — Pre-commit Hook</h2>
  <div class="code-block"><span class="code-label">// .husky/pre-commit — auto-check for untested functions</span>#!/bin/sh
npm run test:unit --passWithNoTests
npm run coverage:check

<span class="c"># If coverage drops below threshold, commit is rejected.</span>
<span class="c"># Developer must write (or generate) tests before committing.</span></div>
  <div class="code-block"><span class="code-label">// package.json — scripts</span>"scripts": {
  "test:unit":       "vitest run --reporter=verbose",
  "test:watch":      "vitest",
  "coverage":        "vitest run --coverage",
  "coverage:check":  "vitest run --coverage --coverage.thresholds.lines=80"
}</div>
  <h2>Strategy 2 — CI Coverage Diff on PRs</h2>
  <div class="code-block"><span class="code-label">// .github/workflows/coverage-diff.yml</span>name: Coverage Diff

on:
  pull_request:
    branches: [main]

jobs:
  coverage-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run coverage -- --reporter=json
      - name: Post coverage diff as PR comment
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage/coverage-summary-base.json

<span class="c"># Posts a table to the PR showing which files gained/lost coverage.</span>
<span class="c"># Reviewers see immediately if new code lacks tests.</span></div>
  <h2>Strategy 3 — AI-Assisted Test Generation in PR Flow</h2>
  <div class="code-block"><span class="code-label">// THE PROMPT TO RUN ON EVERY NEW MODULE</span>"I just added these new exported functions (see diff below).
For each function that has NO corresponding test:
1. Generate a unit test suite in the correct co-located test file
2. Cover all happy paths and error conditions you can infer from the signature
3. Use TODO comments to mark edge cases that need real business knowledge:
   // TODO(test): add edge case for {scenario} — need domain knowledge

Output one complete test file per source file modified.
Use our testing conventions from CLAUDE.md.

GIT DIFF: {paste git diff HEAD~1}"</div>
  <h2>Strategy 4 — Scheduled Coverage Audit</h2>
  <div class="code-block"><span class="code-label">// .github/workflows/coverage-audit.yml</span>name: Weekly Coverage Audit

on:
  schedule:
    - cron: '0 9 * * 1'    <span class="c"># every Monday 9am</span>

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run coverage -- --reporter=text > coverage-report.txt
      - name: Open issue if coverage drops
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('coverage-report.txt', 'utf8')
            const lowCoverage = report.match(/[0-9.]+(?=% )/g)
              .some(pct => parseFloat(pct) < 75)
            if (lowCoverage) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Coverage Alert: below 75% threshold',
                body: '&#96;&#96;&#96;\n' + report + '\n&#96;&#96;&#96;'
              })
            }</div>
  <div class="info-box green"><strong>The compound effect:</strong> Pre-commit hook + PR coverage diff + weekly audit creates three layers of coverage enforcement. Each layer catches different things: the hook catches regressions at commit time, the PR diff catches net new uncovered code, and the weekly audit catches slow drift from small omissions.</div>
</div>`,

'qa:maintenance': () => `<div class="panel" id="panel-qa-maintenance">
  <div class="breadcrumb">QA Stack › <span class="bc-accent">Practice</span> › Maintaining Tests</div>
  <h1>Maintaining <span class="hl">Tests</span></h1>
  <p class="lead">Tests rot just like code. A test suite that doesn't keep up with the codebase becomes a red-flagging machine that nobody trusts. Active test maintenance — with AI assistance — is part of the engineering workflow, not optional cleanup.</p>
  <h2>When Tests Break</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Real failure — the code is broken <span class="acc-arrow">▾</span></div><div class="acc-body">The test found a real bug in new code. Fix the code. Don't touch the test. This is the test suite doing its job. Write a regression test before fixing, so the bug can never return silently.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Behavior changed — test needs updating <span class="acc-arrow">▾</span></div><div class="acc-body">The feature intentionally changed; the test reflects old behavior. Update the test to match the new intended behavior — but confirm the change was intentional before updating. Use the prompt: "I intentionally changed {behavior}. Update this test to reflect the new behavior while preserving all other assertions."</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Flaky test — intermittent failure <span class="acc-arrow">▾</span></div><div class="acc-body">The test fails sometimes but not always — usually timing issues in async tests, shared state between tests, or external service dependencies. Prompt: "This test is flaky — fails intermittently. Diagnose the likely cause and fix it. Possible causes: timing (add awaits), shared state (add beforeEach cleanup), or external dependency (add a mock)."</div></div>
  <div class="info-box red"><strong>Never skip a failing test without a ticket.</strong> A skipped test is a lie — the suite says green, the functionality is uncovered. If you must skip temporarily: add a comment with the GitHub issue number and a deadline. A skip with no context is technical debt that never gets paid.</div>
  <h2>Prompts for Test Maintenance</h2>
  <div class="code-block"><span class="code-label">// REFACTORING — KEEP TESTS GREEN</span>"I'm refactoring {function/module} but NOT changing its behavior.
Update the tests to match the new implementation details
(new function names, new class structure, etc.)
while keeping every behavioral assertion identical.
Before: {old code}
After: {new code}
Tests: {current test file}"</div>
  <div class="code-block"><span class="code-label">// DEPENDENCY UPDATE — MOCK API CHANGED</span>"We updated {library} from v2 to v3. The mock API changed.
Update all mocks in this test file to use the v3 API.
Old mock pattern: {example}
New mock pattern: {example}
Test file: {paste}"</div>
  <div class="code-block"><span class="code-label">// QUARTERLY TEST AUDIT</span>"Audit this test file for quality issues:
1. Tests that assert nothing meaningful (testing implementation, not behavior)
2. Tests that are too broad (multiple behaviors in one it())
3. Missing edge cases now visible with hindsight
4. Duplicated test logic that should be in a shared fixture
5. Tests for deleted or changed functionality
Report findings. I will confirm before any changes."</div>
</div>`,

'docker:concepts': () => `<div class="panel" id="panel-docker-concepts">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Foundations</span> › Docker Concepts</div>
  <h1>Docker <span class="hl">Concepts</span></h1>
  <p class="lead">Docker packages your application and everything it needs to run into a portable, isolated unit that behaves identically on any machine — your laptop, a teammate's laptop, and production. It eliminates "works on my machine" permanently.</p>
  <div class="info-box"><strong>The core abstraction:</strong> A container is a lightweight, isolated process that shares the host OS kernel but has its own filesystem, network, and process space. It's faster than a VM and more portable than a bare-metal install.</div>
  <h2>Key Concepts</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">📄</div><div class="card-title">Dockerfile</div><div class="card-body">The recipe. A text file of instructions that builds an image layer by layer — base OS, install packages, copy code, set entrypoint.</div><span class="tag">blueprint</span></div>
    <div class="card"><div class="card-icon">📦</div><div class="card-title">Image</div><div class="card-body">The built artifact — a read-only snapshot of the filesystem at every layer. Shareable via a registry. Build once, run anywhere.</div><span class="tag amber">artifact</span></div>
    <div class="card"><div class="card-icon">🏃</div><div class="card-title">Container</div><div class="card-body">A running instance of an image with a writable layer on top. Ephemeral — stopped containers can be deleted; their image stays.</div><span class="tag violet">runtime</span></div>
    <div class="card"><div class="card-icon">📋</div><div class="card-title">Registry</div><div class="card-body">Where images are stored and shared. Docker Hub is public. GitHub Container Registry, AWS ECR, GCP Artifact Registry are common private options.</div><span class="tag green">storage</span></div>
    <div class="card"><div class="card-icon">🎼</div><div class="card-title">Compose</div><div class="card-body">Orchestrates multiple containers as one application — app + database + cache + proxy — defined in a single docker-compose.yml.</div><span class="tag">orchestration</span></div>
    <div class="card"><div class="card-icon">📁</div><div class="card-title">Volume</div><div class="card-body">Persistent storage mounted into a container. Data survives container restarts and deletions. Essential for databases.</div><span class="tag amber">persistence</span></div>
  </div>
  <h2>The Layer Model</h2>
  <div class="code-block"><span class="code-label">// EACH DOCKERFILE INSTRUCTION = ONE LAYER</span>FROM node:20-alpine      <span class="c"># layer 1 — base image (cached remotely)</span>
WORKDIR /app              <span class="c"># layer 2</span>
COPY package*.json ./     <span class="c"># layer 3 — deps manifest (changes rarely)</span>
RUN npm ci                <span class="c"># layer 4 — install deps (cached if layer 3 unchanged)</span>
COPY . .                  <span class="c"># layer 5 — app source (changes every build)</span>
CMD ["node", "server.js"] <span class="c"># layer 6 — entrypoint</span>

<span class="c"># KEY INSIGHT: Docker caches layers. If layer 3 (package.json) hasn't</span>
<span class="c"># changed, layer 4 (npm ci) is skipped — saved 2 minutes per build.</span>
<span class="c"># Order instructions by change frequency: stable things first.</span></div>
  <div class="info-box green"><strong>Why layer order matters:</strong> Put things that change rarely (base image, package install) before things that change often (your source code). This maximizes cache hits and makes builds fast. Reversed order = full reinstall every build.</div>
</div>`,

'docker:dockerfile': () => `<div class="panel" id="panel-docker-dockerfile">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Foundations</span> › Dockerfile Mastery</div>
  <h1>Dockerfile <span class="hl">Mastery</span></h1>
  <p class="lead">A well-written Dockerfile produces a fast-building, small, secure image. A poorly written one produces multi-gigabyte images that take five minutes to build and expose unnecessary attack surface. The patterns below are what the AI should generate every time.</p>
  <h2>The Production-Ready Pattern</h2>
  <div class="code-block"><span class="code-label">// MULTI-STAGE NODE.JS DOCKERFILE</span># ─── Stage 1: Build ───────────────────────────────────────
FROM node:20-alpine AS builder
WORKDIR /app

COPY package*.json ./
RUN npm ci                              <span class="c"># ci = exact lockfile</span>

COPY . .
RUN npm run build                       <span class="c"># compile TS, bundle, etc.</span>

# ─── Stage 2: Production ──────────────────────────────────
FROM node:20-alpine AS production
WORKDIR /app

ENV NODE_ENV=production

RUN addgroup -S appgroup && \
    adduser  -S appuser -G appgroup     <span class="c"># non-root user</span>

COPY package*.json ./
RUN npm ci --omit=dev                   <span class="c"># prod deps only</span>

COPY --from=builder /app/dist ./dist    <span class="c"># copy only the build output</span>

USER appuser                            <span class="c"># switch to non-root</span>

EXPOSE 3000
HEALTHCHECK --interval=30s --timeout=5s \
  CMD wget -qO- http://localhost:3000/health || exit 1

CMD ["node", "dist/server.js"]</div>
  <h2>The Non-Negotiables</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🪶</div><div class="cap-text"><strong style="color:var(--accent)">Alpine base images</strong><span>node:20-alpine is ~180MB vs node:20 at ~1.1GB. python:3.12-slim vs python:3.12 saves 600MB. Always use slim or alpine variants in production.</span></div></li>
    <li><div class="cap-icon">🏗</div><div class="cap-text"><strong style="color:var(--accent)">Multi-stage builds</strong><span>Build tools, dev dependencies, test fixtures — none of these belong in a production image. Multi-stage copies only the artifact. Image size drops by 60-90%.</span></div></li>
    <li><div class="cap-icon">👤</div><div class="cap-text"><strong style="color:var(--accent)">Non-root user</strong><span>The highest-impact security step. Create a system user, switch before CMD. A container escape as root = root on the host.</span></div></li>
    <li><div class="cap-icon">❤️</div><div class="cap-text"><strong style="color:var(--accent)">HEALTHCHECK</strong><span>Tells Docker (and orchestrators) when your container is actually ready vs. just started. Essential for compose depends_on and Kubernetes readiness.</span></div></li>
  </ul>
  <h2>The .dockerignore</h2>
  <div class="code-block"><span class="code-label">// .dockerignore — ALWAYS HAVE THIS</span>node_modules
.git
.gitignore
*.md
.env
.env.*
dist
coverage
.nyc_output
tests
scratch
*.log
.DS_Store
Dockerfile*
docker-compose*</div>
  <div class="info-box amber"><strong>Missing .dockerignore = slow builds + secrets risk.</strong> Without it, COPY . . copies node_modules (huge), .git history, and any .env files into the build context and potentially into the image. Always have a .dockerignore.</div>
</div>`,

'docker:compose': () => `<div class="panel" id="panel-docker-compose">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Foundations</span> › Docker Compose</div>
  <h1>Docker <span class="hl">Compose</span></h1>
  <p class="lead">Docker Compose defines and runs multi-container applications as a single unit. One file, one command — and your app, database, cache, and any other services start together, networked correctly, with volumes configured. It's the local development standard.</p>
  <h2>A Complete Compose File</h2>
  <div class="code-block"><span class="code-label">// docker-compose.yml — APP + POSTGRES + REDIS</span>services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production          <span class="c"># specify which stage</span>
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/mydb
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - .env                      <span class="c"># load secrets from .env file</span>
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app-logs:/app/logs

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data  <span class="c"># persist DB</span>
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:
  app-logs:</div>
  <h2>Essential Commands</h2>
  <div class="code-block"><span class="code-label">// DAY-TO-DAY COMPOSE COMMANDS</span>docker compose up -d              <span class="c"># start all services (detached)</span>
docker compose up -d --build      <span class="c"># rebuild images then start</span>
docker compose down               <span class="c"># stop and remove containers</span>
docker compose down -v            <span class="c"># also delete volumes (WIPES DATA)</span>
docker compose logs -f app        <span class="c"># tail logs for app service</span>
docker compose ps                 <span class="c"># show running services</span>
docker compose exec app sh        <span class="c"># shell into running container</span>
docker compose restart app        <span class="c"># restart one service</span></div>
  <h2>Dev vs. Production Compose</h2>
  <div class="code-block"><span class="code-label">// docker-compose.dev.yml — OVERRIDE FOR DEV</span>services:
  app:
    build:
      target: development         <span class="c"># use the dev stage with hot reload</span>
    volumes:
      - .:/app                    <span class="c"># mount source for live reload</span>
      - /app/node_modules         <span class="c"># exclude node_modules from mount</span>
    command: npm run dev
    environment:
      NODE_ENV: development

<span class="c"># Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up</span>
<span class="c"># Or set COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml in .env</span></div>
</div>`,

'docker:aibuilding': () => `<div class="panel" id="panel-docker-aibuilding">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Building with AI</span> › AI Build Prompts</div>
  <h1>AI Build <span class="hl">Prompts</span></h1>
  <p class="lead">The right prompt produces a production-ready, secure Dockerfile on the first attempt. These are the prompts to save, adapt, and reuse for every Docker task — from initial creation to debugging to optimization.</p>

REQUIREMENTS:

Also generate a docker-compose.dev.yml override that:

  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔍 Diagnose a broken build or failing container <span class="acc-arrow">▾</span></div><div class="acc-body"><div class="code-block">My Docker build/container is failing. Diagnose and fix.

ERROR OUTPUT:
{paste the full error from docker build or docker logs}

{paste Dockerfile}

DOCKER-COMPOSE (if relevant):
{paste}

Please:
1. Identify the specific cause of the failure
2. Explain why this error occurs

  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📉 Reduce image size <span class="acc-arrow">▾</span></div><div class="acc-body"><div class="code-block">My Docker image is {size}. Reduce it as much as possible.

Techniques to apply where beneficial:

Explain each optimization and its size impact.</div></div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔒 Security audit a Dockerfile <span class="acc-arrow">▾</span></div><div class="acc-body"><div class="code-block">Audit this Dockerfile for security issues.

Check for:

'docker:images': () => `<div class="panel" id="panel-docker-images">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Building with AI</span> › Image Management</div>
  <h1>Image <span class="hl">Management</span></h1>
  <p class="lead">Images accumulate fast. Build often enough and you'll have gigabytes of dangling layers and outdated versions consuming disk. A simple tagging strategy and cleanup habit keeps image sprawl from becoming a problem.</p>
  <h2>Tagging Strategy</h2>
  <div class="code-block"><span class="code-label">// TAG FORMATS — USE ALL THREE</span><span class="c"># 1. Semantic version — for releases</span>
docker build -t myapp:1.4.2 -t myapp:1.4 -t myapp:latest .

<span class="c"># 2. Git SHA — for traceability (what exact code is in this image?)</span>
GIT_SHA=$(git rev-parse --short HEAD)
docker build -t myapp:&#36;{GIT_SHA} .

<span class="c"># 3. Timestamp — for session-end scripts (always sortable)</span>
TIMESTAMP=$(date +%Y%m%d-%H%M)
docker build -t myapp:&#36;{TIMESTAMP} .

<span class="c"># In a registry (GitHub Container Registry example):</span>
docker build -t ghcr.io/myorg/myapp:&#36;{GIT_SHA} .</div>
  <h2>Cleanup Commands</h2>
  <div class="code-block"><span class="code-label">// REGULAR CLEANUP</span><span class="c"># Remove dangling images (no tag, unreferenced)</span>
docker image prune -f

<span class="c"># Remove all images older than 48h</span>
docker image prune -a --filter "until=48h" -f

<span class="c"># Full system cleanup (images + stopped containers + volumes)</span>
docker system prune -a -f

<span class="c"># See what's using disk</span>
docker system df
docker system df -v          <span class="c"># verbose — per image/volume</span></div>
  <h2>Working with a Registry</h2>
  <div class="code-block"><span class="code-label">// GITHUB CONTAINER REGISTRY (ghcr.io)</span><span class="c"># Login (once per machine)</span>
echo $GITHUB_TOKEN | docker login ghcr.io -u USERNAME --password-stdin

<span class="c"># Build and tag for the registry</span>
docker build -t ghcr.io/ORG/APP:latest -t ghcr.io/ORG/APP:$(git rev-parse --short HEAD) .

<span class="c"># Push all tags</span>
docker push ghcr.io/ORG/APP --all-tags

<span class="c"># Pull on another machine</span>
docker pull ghcr.io/ORG/APP:latest</div>
  <div class="info-box"><strong>Use Git SHA tags in production:</strong> "latest" is convenient but dangerous — you can't tell which code is actually running. Tag every production image with the Git SHA so you can always answer "what's deployed?" and roll back to an exact previous version.</div>
</div>`,

'docker:security': () => `<div class="panel" id="panel-docker-security">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Building with AI</span> › Security &amp; Hardening</div>
  <h1>Security <span class="hl">&amp; Hardening</span></h1>
  <p class="lead">Docker security is not optional. A misconfigured container is a misconfigured server. These hardening practices are the minimum bar for any container going near production.</p>
  <h2>The Hardening Checklist</h2>
  <ul class="checklist">
    <li><strong>Non-root user</strong> — create and switch to a system user before CMD. Never run as root.</li>
    <li><strong>Read-only filesystem</strong> — add --read-only flag; mount writable volumes only where needed</li>
    <li><strong>No secrets in images</strong> — never use ENV or ARG to bake in passwords or keys</li>
    <li><strong>Pin base image versions</strong> — use node:20.11-alpine3.19 not node:latest</li>
    <li><strong>Minimal base image</strong> — alpine or distroless; fewer packages = smaller attack surface</li>
    <li><strong>Scan images for CVEs</strong> — integrate docker scout or Trivy into CI</li>
    <li><strong>Drop Linux capabilities</strong> — --cap-drop ALL in compose and Kubernetes</li>
    <li><strong>.dockerignore</strong> — prevents .env, .git, and creds from entering the build context</li>
  </ul>
  <h2>Secrets at Runtime</h2>
  <div class="code-block"><span class="code-label">// CORRECT — secrets injected at runtime, never in image</span><span class="c"># Via env_file in compose (file is gitignored):</span>
env_file: .env

<span class="c"># Via environment in compose (values from shell):</span>
environment:
  DATABASE_URL: &#36;{DATABASE_URL}   <span class="c"># reads from host env, not hardcoded</span>

<span class="c"># Via Docker secrets (swarm / compose secrets):</span>
secrets:
  db_password:
    file: ./secrets/db_password.txt</div>
  <div class="code-block"><span class="code-label">// WRONG — secrets baked into image (NEVER DO THIS)</span>ENV DATABASE_PASSWORD=supersecret    <span class="c"># visible in docker inspect</span>
ARG API_KEY=sk-live-abc123           <span class="c"># visible in build history</span>
COPY .env .                          <span class="c"># copies secrets into the layer</span></div>
  <h2>Scanning for Vulnerabilities</h2>
  <div class="code-block"><span class="code-label">// SCAN WITH TRIVY (free, excellent)</span>brew install trivy            <span class="c"># or apt-get / winget</span>
trivy image myapp:latest      <span class="c"># scan an image</span>
trivy image --severity HIGH,CRITICAL myapp:latest   <span class="c"># only show high risk</span>

<span class="c"># In GitHub Actions:</span>
- name: Scan image with Trivy
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: myapp:&#36;{{ github.sha }}
    severity: 'CRITICAL,HIGH'
    exit-code: '1'            <span class="c"># fail the build on critical CVEs</span></div>
  <div class="info-box amber"><strong>The AI security audit prompt:</strong> Paste your Dockerfile and ask "Audit this for security issues. Check for root user, baked-in secrets, unpinned versions, unnecessary packages, and missing .dockerignore. Rate each finding HIGH/MEDIUM/LOW and provide the fix." Run this prompt on every new Dockerfile before it goes to production.</div>
</div>`,

'docker:scripts': () => `<div class="panel" id="panel-docker-scripts">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Automation</span> › Session Scripts (.bat/.sh)</div>
  <h1>Session Scripts <span class="hl">(.bat / .sh)</span></h1>
  <p class="lead">Session scripts are the vibe-coder's best friend in a Docker workflow. Instead of remembering 8 commands at the end of every session, you run one script — and it builds, tags, cleans, and optionally pushes your images with a full status report. Here are complete, ready-to-use templates.</p>
  <h2>End-of-Session Build Script (Windows .bat)</h2>
  <div class="code-block"><span class="code-label">// scripts/session-end.bat</span>@echo off
setlocal enabledelayedexpansion

echo ============================================
echo  SESSION END — Docker Build and Clean
echo ============================================
echo.

REM ─── Configuration ───────────────────────────
set APP_NAME=myapp
set REGISTRY=ghcr.io/myorg
set TIMESTAMP=%date:~10,4%%date:~4,2%%date:~7,2%-%time:~0,2%%time:~3,2%
set TIMESTAMP=%TIMESTAMP: =0%

REM ─── Get git SHA ─────────────────────────────
for /f %%i in ('git rev-parse --short HEAD 2^>nul') do set GIT_SHA=%%i
if "%GIT_SHA%"=="" set GIT_SHA=no-git

echo [1/5] Building image...
docker build -t %APP_NAME%:latest -t %APP_NAME%:%TIMESTAMP% -t %APP_NAME%:%GIT_SHA% .
if %ERRORLEVEL% neq 0 (
  echo BUILD FAILED. Fix errors before pushing.
  exit /b 1
)
echo     Built: %APP_NAME%:%TIMESTAMP%

echo.
echo [2/5] Stopping running containers...
docker compose down 2>nul
echo     Containers stopped.

echo.
echo [3/5] Pruning dangling images...
docker image prune -f >nul
echo     Dangling images removed.

echo.
echo [4/5] Disk usage summary:
docker system df

echo.
echo [5/5] Optional — push to registry? (Y/N)
set /p PUSH_CONFIRM=
if /i "%PUSH_CONFIRM%"=="Y" (
  echo     Pushing %REGISTRY%/%APP_NAME%:%GIT_SHA%
  docker tag %APP_NAME%:%GIT_SHA% %REGISTRY%/%APP_NAME%:%GIT_SHA%
  docker tag %APP_NAME%:latest    %REGISTRY%/%APP_NAME%:latest
  docker push %REGISTRY%/%APP_NAME%:%GIT_SHA%
  docker push %REGISTRY%/%APP_NAME%:latest
  echo     Push complete.
)

echo.
echo ============================================
echo  DONE. Image: %APP_NAME%:%TIMESTAMP%
echo  Git SHA:     %GIT_SHA%
echo ============================================  <h2>End-of-Session Build Script (macOS / Linux .sh)</h2>
  <div class="code-block"><span class="code-label">// scripts/session-end.sh</span>#!/usr/bin/env bash
set -euo pipefail

APP_NAME="myapp"
REGISTRY="ghcr.io/myorg"
TIMESTAMP=$(date +%Y%m%d-%H%M)
GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "no-git")

echo "============================================"
echo " SESSION END — Docker Build and Clean"
echo "============================================"

echo ""
echo "[1/5] Building image..."
docker build \
  -t "&#36;{APP_NAME}:latest" \
  -t "&#36;{APP_NAME}:&#36;{TIMESTAMP}" \
  -t "&#36;{APP_NAME}:&#36;{GIT_SHA}" \
  . || { echo "BUILD FAILED"; exit 1; }
echo "    Built: &#36;{APP_NAME}:&#36;{TIMESTAMP}"

echo ""
echo "[2/5] Stopping containers..."
docker compose down 2>/dev/null || true

echo ""
echo "[3/5] Pruning dangling images..."
docker image prune -f > /dev/null

echo ""
echo "[4/5] Disk usage:"
docker system df

echo ""
read -p "[5/5] Push to registry? (y/N) " PUSH_CONFIRM
if [[ "&#36;{PUSH_CONFIRM,,}" == "y" ]]; then
  docker tag "&#36;{APP_NAME}:&#36;{GIT_SHA}"  "&#36;{REGISTRY}/&#36;{APP_NAME}:&#36;{GIT_SHA}"
  docker tag "&#36;{APP_NAME}:latest"      "&#36;{REGISTRY}/&#36;{APP_NAME}:latest"
  docker push "&#36;{REGISTRY}/&#36;{APP_NAME}:&#36;{GIT_SHA}"
  docker push "&#36;{REGISTRY}/&#36;{APP_NAME}:latest"
  echo "    Pushed."
fi

echo ""
echo "============================================"
echo " DONE.  &#36;{APP_NAME}:&#36;{TIMESTAMP}  (&#36;{GIT_SHA})"
echo "============================================"</div>
  <h2>Session Start Script</h2>
  <div class="code-block"><span class="code-label">// scripts/session-start.bat (Windows)</span>@echo off
echo ============================================
echo  SESSION START — Docker Environment
echo ============================================
echo.
echo [1/3] Pulling latest base images...
docker pull node:20-alpine
echo.
echo [2/3] Starting services...
docker compose up -d
echo.
echo [3/3] Services status:
docker compose ps
echo.
echo  App running at: http://localhost:3000
echo  DB port: 5432
echo ============================================</div>
  <div class="info-box green"><strong>Save scripts in scripts/ and commit them.</strong> These are part of the project infrastructure. Every team member (and future you) gets the same ritual. Add them to CLAUDE.md: "Run scripts/session-end.bat at the end of every coding session."</div>
</div>`,

'docker:compose2': () => `<div class="panel" id="panel-docker-compose2">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Automation</span> › Multi-Service Compose</div>
  <h1>Multi-Service <span class="hl">Compose</span></h1>
  <p class="lead">Real applications have multiple services. Compose orchestrates them — starting in the right order, connecting them on shared networks, and managing their persistent data. Here's the full production-grade setup for common stack combinations.</p>
  <h2>Full Stack: API + DB + Cache + Proxy</h2>
  <div class="code-block"><span class="code-label">// docker-compose.yml — FULL PRODUCTION STACK</span>services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build: { context: ., target: production }
    expose: ["3000"]               <span class="c"># internal only — nginx proxies</span>
    environment:
      DATABASE_URL: &#36;{DATABASE_URL}
      REDIS_URL: redis://redis:6379
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     &#36;{POSTGRES_USER}
      POSTGRES_PASSWORD: &#36;{POSTGRES_PASSWORD}
      POSTGRES_DB:       &#36;{POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U &#36;{POSTGRES_USER}"]
      interval: 10s; retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass &#36;{REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "&#36;{REDIS_PASSWORD}", "ping"]
      interval: 10s

volumes:
  postgres-data:
  redis-data:</div>
  <h2>The AI Prompt for This</h2>
  <div class="code-block"><span class="code-label">// MULTI-SERVICE COMPOSE GENERATION PROMPT</span>Generate a production docker-compose.yml for this stack:

SERVICES:
- {App: Node.js Express, port 3000, builds from local Dockerfile}
- {Postgres 15, persistent volume, env var credentials}
- {Redis 7, password-protected, append-only}
- {Nginx, reverse proxy to app, ports 80/443}

REQUIREMENTS:
- Health checks on all services with appropriate commands
- depends_on with health conditions (app waits for DB + Redis)
- All secrets via env_file: .env (not hardcoded)
- Named volumes for all persistent data
- App uses expose not ports (Nginx is the only public-facing service)
- restart: unless-stopped on all services

Also generate the corresponding .env.example file
with all required variable names and placeholder values.</div>
</div>`,

'docker:cicd': () => `<div class="panel" id="panel-docker-cicd">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Automation</span> › Docker in CI/CD</div>
  <h1>Docker in <span class="hl">CI/CD</span></h1>
  <p class="lead">Docker in CI/CD means every PR builds a verified image, scans it for vulnerabilities, and pushes it to your registry automatically. On merge to main, deployment is automatic. Here's the full GitHub Actions pipeline.</p>
  <div class="code-block"><span class="code-label">// .github/workflows/docker.yml — BUILD + SCAN + PUSH</span>name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: &#36;{{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: &#36;{{ env.REGISTRY }}
          username: &#36;{{ github.actor }}
          password: &#36;{{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: &#36;{{ env.REGISTRY }}/&#36;{{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=&#36;{{ github.ref == 'refs/heads/main' }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false              <span class="c"># build only first (for scan)</span>
          tags: &#36;{{ steps.meta.outputs.tags }}
          labels: &#36;{{ steps.meta.outputs.labels }}
          cache-from: type=gha    <span class="c"># GitHub Actions layer cache</span>
          cache-to: type=gha,mode=max
          load: true

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: &#36;{{ env.REGISTRY }}/&#36;{{ env.IMAGE_NAME }}:sha-&#36;{{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1            <span class="c"># block push on critical CVEs</span>

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: &#36;{{ steps.meta.outputs.tags }}
          cache-from: type=gha</div>
  <div class="info-box green"><strong>BuildKit layer caching:</strong> The cache-from/cache-to gha lines tell GitHub Actions to cache Docker build layers between runs. A full build that took 4 minutes becomes a 40-second cached rebuild when only source files changed. Always include this.</div>
</div>`,

'docker:maintain': () => `<div class="panel" id="panel-docker-maintain">
  <div class="breadcrumb">Docker + AI › <span class="bc-accent">Practice</span> › Maintaining Images</div>
  <h1>Maintaining <span class="hl">Images</span></h1>
  <p class="lead">Docker images need maintenance like any dependency — base images get security patches, dependencies accumulate CVEs, and build configurations drift. A regular update habit keeps your images current without surprises.</p>
  <h2>The Monthly Image Update Ritual</h2>
  <div class="code-block"><span class="code-label">// MONTHLY UPDATE PROMPT</span>"Review my Dockerfile and docker-compose.yml for updates needed:

1. Check if base image tags are outdated
   Current: node:20.11-alpine3.19
   Is there a newer patch version I should pin to?

2. Identify any packages installed with apt-get or apk that have
   known CVEs (I will scan with Trivy but flag obvious ones)

3. Check if any compose service images have new minor/patch versions
   postgres:15.3, redis:7.0, nginx:1.25

4. Flag any deprecated Dockerfile syntax I should update

DOCKERFILE: {paste}
COMPOSE: {paste}"</div>
  <h2>Scheduled CVE Scan Workflow</h2>
  <div class="code-block"><span class="code-label">// .github/workflows/weekly-scan.yml</span>name: Weekly Image Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'   <span class="c"># Monday 8am</span>

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build current image
        run: docker build -t scan-target:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:latest
          severity: CRITICAL,HIGH
          format: table
          output: trivy-report.txt
          exit-code: 0      <span class="c"># don't fail — just report</span>

      - name: Open issue if vulnerabilities found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('trivy-report.txt', 'utf8')
            if (report.includes('CRITICAL') || report.includes('HIGH')) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Security: CVEs found in Docker image (weekly scan)',
                body: '&#96;&#96;&#96;\n' + report + '\n&#96;&#96;&#96;\n\nUpdate base image or dependencies to resolve.'
              })
            }</div>
  <h2>When an Image Breaks</h2>
  <div class="code-block"><span class="code-label">// CONTAINER DEBUG PROMPTS</span><span class="c"># Get the full error log</span>
docker logs CONTAINER_NAME --tail 100

<span class="c"># Shell into a running container to investigate</span>
docker exec -it CONTAINER_NAME sh

<span class="c"># Shell into a FAILED container (override entrypoint)</span>
docker run -it --entrypoint sh IMAGE_NAME:TAG

<span class="c"># AI prompt when something is broken:</span>
"My container is failing to start. Here is the full error:
{docker logs output}
Here is my Dockerfile:
{paste}
Diagnose the cause and provide the fix."</div>
  <div class="info-box"><strong>Pin versions, but not too tightly.</strong> node:20-alpine pins the major.minor but allows patch updates (security fixes). node:20.11.1-alpine3.19 pins everything — maximum reproducibility, zero automatic security patches. The right level depends on your update cadence. Most teams use the middle path: pin major.minor, allow patches.</div>
</div>`,

'docker:quiz': () => `<div class="panel" id="panel-docker-quiz">

/* ════════════════════════════════════════════════════════════════
   RUNTIME STATE
════════════════════════════════════════════════════════════════ */
let activeCourse = COURSES[0].id;
let activeModule = COURSES[0].sections[0].modules[0].id;
const visitedModules = {}; // { 'mcp:intro': true, ... }
const quizState = {};      // { mcp: { idx, score, answered }, agents: { ... } }

// Init quiz states
COURSES.forEach(c => {
  quizState[c.id] = { idx: 0, score: 0, answered: false };
});

/* ════════════════════════════════════════════════════════════════
   BUILD UI
════════════════════════════════════════════════════════════════ */
function buildCoursePills() {
  const row = document.getElementById('course-pills-row');
  row.innerHTML = COURSES.map(c => `
    <div class="course-pill ${c.id === activeCourse ? 'active' : ''} ${c.status === 'coming-soon' ? 'locked' : ''}"
         id="pill-${c.id}"
         onclick="${c.status === 'coming-soon' ? '' : `switchCourse('${c.id}')`}"
         title="${c.status === 'coming-soon' ? 'Coming soon' : c.longTitle}">
      <span class="pill-dot" style="background:${c.accentColor}"></span>
      ${c.icon} ${c.title}
      ${c.status === 'coming-soon' ? '<span style="font-size:9px;opacity:0.6"> 🔒</span>' : ''}
    </div>
  `).join('');
}

function buildSidebarNav(courseId) {
  const course = COURSES.find(c => c.id === courseId);
  const container = document.getElementById('nav-scroll');
  container.innerHTML = course.sections.map(sec => `
    <div class="nav-section-group">
      <div class="nav-section-label">${sec.label}</div>
      ${sec.modules.map(m => `
        <div class="nav-item ${courseId === activeCourse && m.id === activeModule ? 'active' : ''}"
             id="nav-${courseId}-${m.id}"
             onclick="navigate('${courseId}', '${m.id}')">
          <span class="ni-icon">${m.icon}</span>
          ${m.title}
          ${m.badge ? `<span class="ni-badge">${m.badge}</span>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function buildMiniProgress() {
  const list = document.getElementById('mini-prog-list');
  list.innerHTML = COURSES.filter(c => c.status === 'available').map(c => {
    const totalMods = c.sections.reduce((sum, s) => sum + s.modules.length, 0);
    const visitedMods = c.sections.reduce((sum, s) => sum + s.modules.filter(m => visitedModules[`${c.id}:${m.id}`]).length, 0);
    const pct = totalMods > 0 ? Math.round(visitedMods / totalMods * 100) : 0;
    return `<div class="mini-prog">
      <div class="mini-prog-dot" style="background:${c.accentColor}"></div>
      <span style="width:52px;">${c.title}</span>
      <div class="mini-prog-bar"><div class="mini-prog-fill" style="width:${pct}%;background:${c.accentColor}"></div></div>
      <span style="width:28px;text-align:right">${pct}%</span>
    </div>`;
  }).join('');
}

function ensurePanel(courseId, moduleId) {
  const panelId = `panel-${courseId}-${moduleId}`;
  if (!document.getElementById(panelId)) {
    const mount = document.getElementById('panels-mount');
    const html = getPanelHTML(courseId, moduleId);
    mount.insertAdjacentHTML('beforeend', html);
    // Initialize quiz if this is a quiz panel
    if (moduleId === 'quiz') {
      setTimeout(() => initQuiz(courseId), 50);
    }
  }
}

/* ════════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════════ */
function switchCourse(courseId) {
  if (courseId === activeCourse) return;
  activeCourse = courseId;
  const course = COURSES.find(c => c.id === courseId);

  // Set CSS accent
  document.body.className = course.accentClass;

  // Update marks
  document.getElementById('academy-mark').style.background =
    `linear-gradient(135deg, ${course.accentColor}, var(--violet))`;

  // Rebuild nav
  buildCoursePills();
  buildSidebarNav(courseId);

  // Navigate to first module of new course
  const firstModule = course.sections[0]?.modules[0];
  if (firstModule) navigate(courseId, firstModule.id);
}

function navigate(courseId, moduleId) {
  // Hide all panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  // Ensure panel exists
  ensurePanel(courseId, moduleId);

  // Show target panel
  const panel = document.getElementById(`panel-${courseId}-${moduleId}`);
  if (panel) panel.classList.add('active');

  // Update active state
  activeCourse = courseId;
  activeModule = moduleId;
  visitedModules[`${courseId}:${moduleId}`] = true;

  // Update nav items
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.getElementById(`nav-${courseId}-${moduleId}`);
  if (navItem) navItem.classList.add('active');

  // Update topbar
  const course = COURSES.find(c => c.id === courseId);
  const mod = course.sections.flatMap(s => s.modules).find(m => m.id === moduleId);
  const totalMods = course.sections.reduce((s, sec) => s + sec.modules.length, 0);
  const modIdx = course.sections.flatMap(s => s.modules).findIndex(m => m.id === moduleId) + 1;

  document.getElementById('topbar-course-badge').textContent = course.title.toUpperCase();
  document.getElementById('topbar-course-badge').style.background = course.accentDim;
  document.getElementById('topbar-course-badge').style.color = course.accentColor;
  document.getElementById('topbar-title').textContent = mod?.title || '';
  document.getElementById('topbar-module-badge').textContent =
    mod?.badge ? `Module ${mod.badge} of ${totalMods - 2}` : '';

  // Update progress
  updateProgress();

  // Scroll to top
  document.getElementById('content-scroll').scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const course = COURSES.find(c => c.id === activeCourse);
  const totalMods = COURSES.filter(c => c.status === 'available')
    .reduce((sum, c) => sum + c.sections.reduce((s, sec) => s + sec.modules.length, 0), 0);
  const visitedCount = Object.keys(visitedModules).length;
  const overallPct = Math.round(visitedCount / totalMods * 100);

  document.getElementById('prog-fill').style.width = overallPct + '%';
  document.getElementById('prog-pct').textContent = overallPct + '%';
  document.getElementById('prog-fill').style.background = course.accentColor;
  buildMiniProgress();
}

/* ════════════════════════════════════════════════════════════════
   QUIZ ENGINE
════════════════════════════════════════════════════════════════ */
function initQuiz(courseId) {
  quizState[courseId] = { idx: 0, score: 0, answered: false };
  renderQuiz(courseId);
}

function renderQuiz(courseId) {
  const course = COURSES.find(c => c.id === courseId);
  const qs = course.quiz;
  const state = quizState[courseId];
  const container = document.getElementById(`quiz-container-${courseId}`);
  const nextBtn = document.getElementById(`quiz-next-${courseId}`);
  const completeDiv = document.getElementById(`quiz-complete-${courseId}`);
  if (!container) return;

  completeDiv.style.display = 'none';
  if (nextBtn) nextBtn.style.display = 'none';
  state.answered = false;

  const q = qs[state.idx];
  const letters = ['A','B','C','D'];

  document.getElementById(`quiz-score-${courseId}`).textContent =
    `Q ${state.idx + 1} of ${qs.length}  |  Score: ${state.score}/${state.idx}`;

  container.innerHTML = `<div class="quiz-q-wrap">
    <div class="quiz-q-text">${q.q}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `
        <button class="quiz-opt" onclick="selectAnswer('${courseId}',${i})" id="qopt-${courseId}-${i}">
          <span class="opt-key">${letters[i]}</span>${opt}
        </button>
      `).join('')}
    </div>
    <div id="quiz-fb-${courseId}"></div>
  </div>`;
}

function selectAnswer(courseId, idx) {
  const state = quizState[courseId];
  if (state.answered) return;
  state.answered = true;

  const course = COURSES.find(c => c.id === courseId);
  const q = course.quiz[state.idx];

  document.querySelectorAll(`[id^="qopt-${courseId}-"]`).forEach(b => b.classList.add('answered'));
  document.getElementById(`qopt-${courseId}-${q.correct}`).classList.add('correct');
  if (idx !== q.correct) document.getElementById(`qopt-${courseId}-${idx}`).classList.add('wrong');
  else state.score++;

  const fb = document.getElementById(`quiz-fb-${courseId}`);
  fb.className = `quiz-fb ${idx === q.correct ? 'correct' : 'wrong'}`;
  fb.textContent = (idx === q.correct ? '✓ Correct!  ' : '✗ Not quite.  ') + q.explanation;

  document.getElementById(`quiz-score-${courseId}`).textContent =
    `Q ${state.idx + 1} of ${course.quiz.length}  |  Score: ${state.score}/${state.idx + 1}`;

  const nextBtn = document.getElementById(`quiz-next-${courseId}`);
  if (nextBtn) {
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = state.idx === course.quiz.length - 1 ? 'See Results →' : 'Next →';
  }
}

function quizNext(courseId) {
  const state = quizState[courseId];
  const course = COURSES.find(c => c.id === courseId);
  state.idx++;
  if (state.idx >= course.quiz.length) {
    showQuizResults(courseId);
  } else {
    renderQuiz(courseId);
  }
}

function showQuizResults(courseId) {
  const state = quizState[courseId];
  const course = COURSES.find(c => c.id === courseId);
  const container = document.getElementById(`quiz-container-${courseId}`);
  const nextBtn = document.getElementById(`quiz-next-${courseId}`);
  const completeDiv = document.getElementById(`quiz-complete-${courseId}`);

  if (container) container.innerHTML = '';
  if (nextBtn) nextBtn.style.display = 'none';

  const pct = Math.round(state.score / course.quiz.length * 100);
  const msg = pct >= 90 ? "Excellent! You have a solid command of this material."
    : pct >= 70 ? "Good work. Review the sections where you had trouble to fill the gaps."
    : pct >= 50 ? "Making progress. Revisit the Foundations modules and try again."
    : "Keep studying! Work through the modules carefully before retrying.";

  completeDiv.style.display = 'block';
  completeDiv.innerHTML = `<div class="quiz-complete-card">
    <div class="qc-emoji">🎯</div>
    <div class="qc-title">Quiz Complete!</div>
    <div class="qc-score">${state.score} / ${course.quiz.length} correct — ${pct}%</div>
    <div class="qc-msg">${msg}</div>
    <button class="btn btn-primary" onclick="resetQuiz('${courseId}')">Take Again</button>
  </div>`;

  document.getElementById(`quiz-score-${courseId}`).textContent =
    `Final: ${state.score}/${course.quiz.length}`;
}

function resetQuiz(courseId) {
  quizState[courseId] = { idx: 0, score: 0, answered: false };
  renderQuiz(courseId);
  document.getElementById(`quiz-complete-${courseId}`).style.display = 'none';
}

/* ════════════════════════════════════════════════════════════════
   SHARED UTILITIES
════════════════════════════════════════════════════════════════ */
function switchTab(btn, groupId, targetId) {
  const group = document.getElementById(groupId);
  if (!group) return;
  group.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const target = document.getElementById(targetId);
  if (target) target.classList.add('active');
  btn.closest('.tab-bar').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleAcc(header) {
  header.classList.toggle('open');
  header.nextElementSibling?.classList.toggle('open');
}

/* ════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════ */
(function init() {
  buildCoursePills();
  buildSidebarNav(activeCourse);
  buildMiniProgress();

  // Load first panel
  const firstCourse = COURSES[0];
  const firstMod = firstCourse.sections[0].modules[0];
  ensurePanel(firstCourse.id, firstMod.id);
  document.getElementById(`panel-${firstCourse.id}-${firstMod.id}`)?.classList.add('active');
  visitedModules[`${firstCourse.id}:${firstMod.id}`] = true;

  // Set topbar
  document.getElementById('topbar-course-badge').textContent = firstCourse.title.toUpperCase();
  document.getElementById('topbar-course-badge').style.background = firstCourse.accentDim;
  document.getElementById('topbar-course-badge').style.color = firstCourse.accentColor;
  document.getElementById('topbar-title').textContent = firstMod.title;

  updateProgress();
})();
</script>
</body>
</html>
