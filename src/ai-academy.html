<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --bg:         #FAFBFC;
  --surface:    #FFFFFF;
  --card:       #F3F4F6;
  --card2:      #E5E7EB;
  --border:     #D1D5DB;
  --text:       #1F2937;
  --muted:      #6B7280;
  --muted2:     #374151;

  /* Course accent — overridden per course via .course-active class */
  --accent:     #0D7377;
  --accent-dim: rgba(13,115,119,0.1);
  --accent-glow:rgba(13,115,119,0.15);

  /* Fixed palette — WCAG AA compliant with light backgrounds */
  --cyan:       #0D7377;
  --cyan-dim:   rgba(13,115,119,0.1);
  --amber:      #B45309;
  --amber-dim:  rgba(180,83,9,0.1);
  --violet:     #6D28D9;
  --violet-dim: rgba(109,40,217,0.1);
  --green:      #047857;
  --green-dim:  rgba(4,120,87,0.1);
  --red:        #991B1B;
  --red-dim:    rgba(153,27,27,0.1);
  --teal:       #0F766E;
  --teal-dim:   rgba(15,118,110,0.1);

  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', sans-serif;
  --display: 'Space Grotesk', sans-serif;

  --radius:  8px;
  --radius-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.65;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
#sidebar {
  width: 265px;
  min-width: 265px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 20;
}

.sidebar-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.academy-wordmark {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.academy-wordmark .mark {
  width: 24px; height: 24px;
  background: linear-gradient(135deg, var(--accent), var(--violet));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  transition: background 0.4s;
}
.academy-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
}

/* Course switcher pills */
.course-pills {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.course-pills-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 7px;
}
.pills-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.course-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 11.5px;
  color: var(--muted);
  transition: all 0.15s;
  font-family: var(--sans);
  white-space: nowrap;
}
.course-pill:hover { color: var(--text); border-color: var(--muted); }
.course-pill.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}
.course-pill .pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.course-pill.locked { opacity: 0.45; cursor: default; }
.course-pill.locked:hover { color: var(--muted); border-color: var(--border); }

/* Nav list */
.nav-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.nav-section-group { margin-bottom: 4px; }
.nav-section-label {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 18px 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 18px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted2);
  border-left: 2px solid transparent;
  transition: all 0.12s;
  line-height: 1.3;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: var(--accent-dim);
}
.nav-item .ni-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item .ni-badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 9px;
  background: var(--card2);
  color: var(--muted);
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}
.nav-item.active .ni-badge { background: var(--accent-dim); color: var(--accent); }

/* Sidebar footer */
.sidebar-footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 12px 16px 14px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  font-family: var(--mono);
  color: var(--muted);
  margin-bottom: 6px;
}
.progress-track { height: 3px; background: var(--border); border-radius: 2px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s, background 0.4s; }
.course-progress-list { margin-top: 8px; }
.mini-prog {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10.5px;
  color: var(--muted);
  padding: 2px 0;
  font-family: var(--mono);
}
.mini-prog-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.mini-prog-bar { flex: 1; height: 2px; background: var(--border); border-radius: 1px; }
.mini-prog-fill { height: 100%; border-radius: 1px; transition: width 0.5s; }

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.topbar {
  flex-shrink: 0;
  background: rgba(8,13,26,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.topbar-course-badge {
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 9px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topbar-module-badge {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  white-space: nowrap;
}

#content-scroll {
  flex: 1;
  overflow-y: auto;
}
.panel { display: none; padding: 32px 36px 56px; max-width: 980px; }
.panel.active { display: block; }

/* ═══════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════ */
h1 {
  font-family: var(--display);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.6px;
  line-height: 1.2;
  margin-bottom: 12px;
}
h1 .hl { color: var(--accent); transition: color 0.4s; }
h2 {
  font-family: var(--display);
  font-size: 19px;
  font-weight: 600;
  margin: 32px 0 10px;
  color: var(--text);
}
h3 {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  margin: 18px 0 8px;
  color: var(--accent);
  transition: color 0.4s;
}
.lead {
  font-size: 15.5px;
  color: var(--muted2);
  margin-bottom: 24px;
  line-height: 1.75;
  max-width: 700px;
}
.breadcrumb {
  font-size: 11.5px;
  color: var(--muted);
  font-family: var(--mono);
  margin-bottom: 14px;
}
.breadcrumb .bc-accent { color: var(--accent); transition: color 0.4s; }

/* ═══════════════════════════════════════
   CARDS
═══════════════════════════════════════ */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin: 16px 0; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card-icon { font-size: 22px; margin-bottom: 10px; }
.card-title { font-family: var(--display); font-weight: 600; font-size: 13.5px; margin-bottom: 6px; }
.card-body { font-size: 13px; color: var(--muted2); line-height: 1.6; }
.tag {
  display: inline-block;
  margin-top: 10px;
  font-size: 10.5px;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  transition: background 0.4s, color 0.4s;
}
.tag.amber { background: var(--amber-dim); color: var(--amber); }
.tag.violet { background: var(--violet-dim); color: var(--violet); }
.tag.green { background: var(--green-dim); color: var(--green); }
.tag.red { background: var(--red-dim); color: var(--red); }
.tag.teal { background: var(--teal-dim); color: var(--teal); }

/* ═══════════════════════════════════════
   CODE BLOCKS
═══════════════════════════════════════ */
.code-block {
  background: #050A14;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.75;
  margin: 14px 0;
  overflow-x: auto;
  white-space: pre;
}
.code-block .code-label {
  display: block;
  font-size: 9.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}
.k  { color: var(--violet); }
.s  { color: var(--green); }
.n  { color: var(--cyan); }
.c  { color: #3A4E72; }
.v  { color: var(--amber); }
.fn { color: var(--teal); }

/* ═══════════════════════════════════════
   INFO BOXES
═══════════════════════════════════════ */
.info-box {
  border-left: 3px solid var(--accent);
  background: var(--accent-dim);
  padding: 13px 17px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 14px 0;
  font-size: 13.5px;
  line-height: 1.65;
  transition: border-color 0.4s, background 0.4s;
}
.info-box strong { color: var(--accent); transition: color 0.4s; }
.info-box.amber { border-left-color: var(--amber); background: var(--amber-dim); }
.info-box.amber strong { color: var(--amber); }
.info-box.green { border-left-color: var(--green); background: var(--green-dim); }
.info-box.green strong { color: var(--green); }
.info-box.violet { border-left-color: var(--violet); background: var(--violet-dim); }
.info-box.violet strong { color: var(--violet); }
.info-box.red { border-left-color: var(--red); background: var(--red-dim); }
.info-box.red strong { color: var(--red); }

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tab-bar {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 9px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.12s;
  white-space: nowrap;
  font-family: var(--sans);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ═══════════════════════════════════════
   DIAGRAM / FLOW
═══════════════════════════════════════ */
.diagram-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin: 18px 0;
  overflow: hidden;
}
.diagram-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 18px;
}
.flow-node {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  text-align: center;
}
.flow-node.c-accent { border-color: var(--accent); box-shadow: 0 0 14px var(--accent-glow); }
.flow-node.c-amber  { border-color: var(--amber);  box-shadow: 0 0 14px rgba(255,179,71,0.15); }
.flow-node.c-green  { border-color: var(--green);  box-shadow: 0 0 14px rgba(78,238,168,0.12); }
.flow-node.c-violet { border-color: var(--violet); box-shadow: 0 0 14px rgba(167,139,250,0.12); }
.flow-node.c-red    { border-color: var(--red);    box-shadow: 0 0 14px rgba(255,107,107,0.12); }
.node-eyebrow { font-family: var(--mono); font-size: 9.5px; color: var(--muted); margin-bottom: 3px; }
.node-name { font-family: var(--display); font-size: 13.5px; font-weight: 600; }
.node-sub  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.flow-node.c-accent .node-name { color: var(--accent); }
.flow-node.c-amber  .node-name { color: var(--amber); }
.flow-node.c-green  .node-name { color: var(--green); }
.flow-node.c-violet .node-name { color: var(--violet); }
.flow-node.c-red    .node-name { color: var(--red); }

.arrow-h { display: flex; align-items: center; gap: 0; padding: 0 6px; }
.arrow-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), var(--accent), var(--border)); animation: pulse-line 2.5s ease-in-out infinite; }
@keyframes pulse-line { 0%,100%{opacity:0.35} 50%{opacity:1} }
.arrow-label { font-size: 9.5px; color: var(--muted); font-family: var(--mono); margin-top: 4px; text-align: center; }

/* ═══════════════════════════════════════
   TABLES
═══════════════════════════════════════ */
.data-table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
.data-table th {
  background: var(--card2);
  padding: 10px 13px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  border: 1px solid var(--border);
  text-transform: uppercase;
  font-weight: 600;
}
.data-table td { padding: 10px 13px; border: 1px solid var(--border); vertical-align: top; }
.data-table tr:hover td { background: rgba(255,255,255,0.018); }
.chk { color: var(--green); }
.xmark { color: var(--red); }
.partial { color: var(--amber); }

/* ═══════════════════════════════════════
   ACCORDIONS
═══════════════════════════════════════ */
.accordion { margin: 8px 0; }
.acc-header {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--display);
  font-weight: 500;
  font-size: 13.5px;
  margin-bottom: 2px;
  transition: border-color 0.12s;
}
.acc-header:hover, .acc-header.open { border-color: var(--accent); color: var(--accent); }
.acc-header.open { border-radius: var(--radius) var(--radius) 0 0; margin-bottom: 0; }
.acc-arrow { transition: transform 0.2s; font-size: 11px; color: var(--muted); }
.acc-header.open .acc-arrow { transform: rotate(180deg); }
.acc-body {
  display: none;
  background: var(--card2);
  border: 1px solid var(--accent);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 14px 16px;
  font-size: 13.5px;
  color: var(--muted2);
  margin-bottom: 4px;
  line-height: 1.7;
}
.acc-body.open { display: block; }

/* ═══════════════════════════════════════
   CHECKLIST
═══════════════════════════════════════ */
.checklist { list-style: none; }
.checklist li {
  display: flex;
  gap: 9px;
  padding: 5px 0;
  font-size: 13.5px;
  color: var(--muted2);
}
.checklist li::before { content: '▸'; color: var(--accent); font-size: 11px; margin-top: 4px; flex-shrink: 0; transition: color 0.4s; }

/* ═══════════════════════════════════════
   CAP LIST
═══════════════════════════════════════ */
.cap-list { list-style: none; }
.cap-list li { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
.cap-list li:last-child { border-bottom: none; }
.cap-icon { font-size: 16px; margin-top: 2px; }
.cap-text strong { display: block; font-weight: 500; color: var(--text); }
.cap-text span { color: var(--muted2); font-size: 13px; }

/* ═══════════════════════════════════════
   QUIZ
═══════════════════════════════════════ */
.quiz-q-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  margin-bottom: 18px;
}
.quiz-q-text { font-family: var(--display); font-size: 16px; font-weight: 500; margin-bottom: 18px; line-height: 1.45; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  cursor: pointer;
  font-size: 13.5px;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 11px;
  text-align: left;
}
.quiz-opt:hover:not(.answered) { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: rgba(78,238,168,0.08); color: var(--green); }
.quiz-opt.wrong   { border-color: var(--red);   background: rgba(255,107,107,0.08); color: var(--red); }
.opt-key { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 20px; flex-shrink: 0; }
.quiz-fb {
  margin-top: 11px;
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.6;
}
.quiz-fb.correct { background: rgba(78,238,168,0.07); color: #6DFFC0; border: 1px solid rgba(78,238,168,0.2); }
.quiz-fb.wrong   { background: rgba(255,107,107,0.07); color: #FF9999; border: 1px solid rgba(255,107,107,0.2); }

.quiz-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
.btn {
  padding: 9px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  border: none;
  font-family: var(--sans);
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.quiz-score-disp { font-family: var(--mono); font-size: 12px; color: var(--muted); }

.quiz-complete-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px;
  text-align: center;
  margin-top: 24px;
}
.qc-emoji { font-size: 44px; margin-bottom: 12px; }
.qc-title { font-family: var(--display); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.qc-score { font-family: var(--mono); font-size: 15px; color: var(--accent); margin-bottom: 14px; }
.qc-msg { color: var(--muted2); font-size: 14px; margin-bottom: 22px; }

/* ═══════════════════════════════════════
   AGENT LOOP ANIMATION (signature element)
═══════════════════════════════════════ */
.agent-loop-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin: 18px 0;
  overflow: hidden;
  min-height: 200px;
}
.agent-loop-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,179,71,0.05), transparent);
  pointer-events: none;
}
.loop-svg {
  width: min(520px, 100%);
  height: auto;
}

/* Agent pattern – cycle nodes */
.cycle-node {
  cursor: default;
}
.cycle-node rect {
  transition: filter 0.3s;
}
.cycle-node.active-step rect {
  filter: drop-shadow(0 0 8px currentColor);
}
@keyframes step-pulse {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.loop-step { animation: step-pulse 1.5s ease-in-out infinite; }

/* cheatsheet grid */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; margin-top: 20px; }
.cheat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
}
.cheat-card h3 { margin-top: 0; color: var(--accent); font-size: 13px; }
.method-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; }
.method-name { font-family: var(--mono); font-size: 11.5px; color: var(--accent); white-space: nowrap; }
.method-desc { font-size: 12px; color: var(--muted); }

/* vendor table */
.vendor-table { margin: 18px 0; }
.vendor-row {
  display: grid;
  grid-template-columns: 150px 1fr 100px 130px;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.vendor-row:hover { background: rgba(255,255,255,0.018); }
.vendor-row.vr-header { color: var(--muted); font-size: 10px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; }
.vendor-name { font-family: var(--display); font-weight: 600; font-size: 13.5px; }
.vendor-desc { font-size: 12.5px; color: var(--muted2); }
.status-badge {
  font-size: 10.5px;
  font-family: var(--mono);
  padding: 3px 8px;
  border-radius: 4px;
  text-align: center;
  white-space: nowrap;
}
.sb-native  { background: var(--green-dim);  color: var(--green); }
.sb-beta    { background: var(--amber-dim);  color: var(--amber); }
.sb-partial { background: var(--violet-dim); color: var(--violet); }

/* transport cells */
.transport-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
.t-cell { flex: 1; min-width: 140px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; }
.t-cell.tc-accent { border-color: var(--accent); }
.t-cell.tc-amber  { border-color: var(--amber); }
.t-cell.tc-green  { border-color: var(--green); }
.t-cell .tc-label { font-family: var(--mono); font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.t-cell .tc-name  { font-family: var(--display); font-size: 13px; font-weight: 600; }
.t-cell .tc-desc  { font-size: 12px; color: var(--muted2); margin-top: 4px; }

/* home panel */
.home-course-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--card);
}
.home-course-card:hover { transform: translateY(-3px); }
.hcc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.hcc-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.hcc-title { font-family: var(--display); font-weight: 700; font-size: 15px; }
.hcc-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.hcc-desc { font-size: 13px; color: var(--muted2); line-height: 1.6; margin-bottom: 14px; }
.hcc-modules { display: flex; flex-wrap: wrap; gap: 5px; }
.hcc-mod-tag { font-size: 11px; font-family: var(--mono); padding: 2px 7px; border-radius: 3px; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* highlights */
.hl        { color: var(--accent); font-weight: 500; transition: color 0.4s; }
.hl-amber  { color: var(--amber);  font-weight: 500; }
.hl-green  { color: var(--green);  font-weight: 500; }
.hl-violet { color: var(--violet); font-weight: 500; }
.hl-red    { color: var(--red);    font-weight: 500; }
.hl-teal   { color: var(--teal);   font-weight: 500; }

code.inline {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--card2);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--accent);
  transition: color 0.4s;
}

/* course accent theming */
.ca-mcp    { --accent: #0D7377; --accent-dim: rgba(13,115,119,0.1); --accent-glow: rgba(13,115,119,0.15); }

@media (max-width: 740px) {
  #sidebar { width: 210px; min-width: 210px; }

    { q: "What is the single most impactful thing you can do to improve AI output quality?", options: ["Use a bigger model","Be more specific and detailed in your prompt","Increase the temperature setting","Add more examples to the training data"], correct: 1, explanation: "Specificity is the highest-leverage prompt improvement. A clear, detailed prompt with explicit constraints, format requirements, and context consistently outperforms vague prompts even on smaller models." },
    { q: "What is 'prompt injection' in the context of AI applications?", options: ["Automatically improving prompts with AI","Malicious input that overrides the system prompt or hijacks the model's behavior","Adding too many instructions to a system prompt","Using templates to generate prompts programmatically"], correct: 1, explanation: "Prompt injection attacks embed instructions in user input or external content (web pages, files, tool results) that attempt to override the system prompt and redirect the model's behavior. A key threat in agentic systems." },
    { q: "Which metric best measures whether an RAG system is retrieving the right chunks?", options: ["BLEU score","Retrieval recall — what fraction of relevant chunks were actually retrieved","Perplexity","Token count of retrieved context"], correct: 1, explanation: "Retrieval recall measures whether the relevant information was actually retrieved. High-quality generation from poor retrieval is impossible — retrieval quality is the gating factor in RAG system performance." },
    { q: "What is 'temperature' in LLM inference, and when should you set it to 0?", options: ["Processing speed — set to 0 for maximum speed","A sampling parameter controlling output randomness — set to 0 for deterministic, factual tasks","Memory usage — set to 0 to reduce RAM consumption","The model's confidence score — set to 0 for uncertain outputs"], correct: 1, explanation: "Temperature controls output randomness. Temperature 0 makes the model deterministic (always picks the highest-probability token) — ideal for factual Q&A, code generation, data extraction. Higher temperatures suit creative tasks." },
    { q: "What is the key difference between few-shot and zero-shot prompting?", options: ["Few-shot uses a larger model","Zero-shot includes no examples; few-shot includes 2–10 worked examples in the prompt","Few-shot requires fine-tuning first","Zero-shot is always better than few-shot"], correct: 1, explanation: "Zero-shot relies on the model's trained knowledge alone. Few-shot provides input-output examples that demonstrate the desired format or behavior. Few-shot is especially powerful for unusual formats or domain-specific tasks." },
    { q: "What is 'hallucination' in LLMs and what's the most reliable mitigation?", options: ["The model generating code instead of text — mitigation: use a code-specific model","The model generating plausible but false statements — mitigation: ground outputs in retrieved evidence (RAG)","The model repeating itself — mitigation: increase diversity penalty","The model being too verbose — mitigation: reduce max_tokens"], correct: 1, explanation: "Hallucination is confident generation of false information. The most reliable mitigation is grounding: force the model to answer only from retrieved, verified sources (RAG) rather than from parametric memory alone." },
    { q: "When designing a tool for an AI agent, what makes the 'description' field most important?", options: ["It affects the tool's execution speed","The model reads the description to decide WHEN and WHETHER to call the tool — a poor description causes missed or incorrect calls","It determines access permissions for the tool","It is only shown to human developers, not the model"], correct: 1, explanation: "The model cannot see your tool's implementation — only its name, description, and parameter schema. The description is how the model decides when to use the tool. Include: what it does, when to use it, and when NOT to use it." },
    { q: "What does 'context window utilization' mean in practice for long AI workflows?", options: ["How many GPU cores are being used","How much of the model's available context window is currently filled with tokens — affects cost, speed, and behavior near the limit","The percentage of time the model spends in attention computation","How often the model accesses external memory"], correct: 1, explanation: "Context window utilization tracks how much of the token budget is consumed. Near 100% utilization degrades performance (the model loses track of earlier content), increases latency, and raises cost. Long workflows require active context management." },
    { q: "What is 'chain-of-thought' prompting and what does it improve?", options: ["Linking multiple API calls together","Instructing the model to show its reasoning step-by-step before giving a final answer — improves accuracy on multi-step problems","Chaining multiple models together in sequence","Storing conversation history across sessions"], correct: 1, explanation: "CoT prompting instructs the model to reason explicitly before answering. This consistently improves accuracy on tasks requiring multiple steps: math, logic, planning, code debugging. The classic trigger is 'Let's think step by step.'" },
    { q: "What is the 'system prompt' in a chat LLM API call?", options: ["A hidden instruction that overrides the model's training","A special message (usually the first) that sets the model's role, behavior rules, and context for the entire conversation","A technical parameter that controls model temperature","The user's first message in the conversation"], correct: 1, explanation: "The system prompt is a privileged message (role: 'system') that persists across the conversation and sets the model's persona, rules, constraints, and context. It's where you define who the model is and how it should behave." },

  quiz: [
    { q: "In a RAG system, what is the single biggest factor limiting answer quality?", options: ["The size of the LLM","Retrieval quality — if the right chunks aren't retrieved, the LLM can't answer correctly","The temperature setting","The number of tokens in the prompt"], correct: 1, explanation: "RAG quality is gated by retrieval. A powerful LLM cannot answer from context it never received. If the relevant chunks aren't retrieved, generation fails regardless of model quality. Retrieval is the bottleneck to optimize first." },
    { q: "What is an embedding in the context of RAG?", options: ["A compressed version of a document","A dense vector representation of text that captures semantic meaning","A pointer to a database row","An encrypted form of the source text"], correct: 1, explanation: "An embedding is a dense numeric vector (typically 256–3072 dimensions) that represents the semantic meaning of text. Similar meanings produce nearby vectors, enabling semantic similarity search via distance metrics like cosine similarity." },
    { q: "Why does naive fixed-size character chunking often hurt RAG quality?", options: ["It uses too much storage","It can split sentences or ideas mid-thought, breaking semantic coherence","It is too slow to compute","It requires a GPU"], correct: 1, explanation: "Fixed-size chunking (e.g., every 500 characters) can cut through the middle of a sentence, table, or logical unit — producing chunks that lack coherent meaning. Semantic chunking (by paragraph, section, or sentence boundary) preserves meaning and improves retrieval." },
    { q: "What does a reranker add to a RAG pipeline?", options: ["It generates the final answer","It re-scores retrieved candidates with a more accurate (but slower) model to reorder them by true relevance","It compresses the retrieved chunks","It translates chunks to the query language"], correct: 1, explanation: "A reranker (typically a cross-encoder) takes the top-N candidates from fast vector search and re-scores each against the query with much higher accuracy. It reorders so the most relevant chunks appear first, dramatically reducing false positives in the final context." },
    { q: "What is hybrid search in RAG?", options: ["Searching across multiple languages","Combining dense vector search with sparse keyword search (e.g., BM25) for better recall","Using two different LLMs","Searching both the cloud and local storage"], correct: 1, explanation: "Hybrid search combines semantic (dense vector) search with lexical (sparse, keyword-based like BM25) search. Vector search captures meaning; keyword search catches exact terms, names, and codes. Together they outperform either alone — especially for technical content with specific identifiers." },
    { q: "What is 'chunk overlap' and why is it used?", options: ["Storing the same chunk twice for redundancy","Including some text from the end of one chunk at the start of the next, to avoid losing context at boundaries","Merging duplicate chunks","Overlapping multiple vector databases"], correct: 1, explanation: "Chunk overlap (typically 10–20%) repeats some text between consecutive chunks. This ensures that an idea spanning a chunk boundary appears complete in at least one chunk, preventing context loss when a key sentence gets split across the boundary." },
    { q: "What problem does 'query rewriting' solve in RAG?", options: ["It makes queries shorter to save tokens","It transforms a vague or conversational user query into one or more search-optimized queries that retrieve better","It translates queries to SQL","It removes profanity from queries"], correct: 1, explanation: "User queries are often vague, conversational, or context-dependent ('what about the second one?'). Query rewriting uses an LLM to expand, clarify, or decompose the query into search-optimized forms — improving retrieval recall, especially for multi-turn conversations." },
    { q: "Which metric specifically measures whether the LLM's answer is grounded in the retrieved context?", options: ["Latency","Faithfulness (groundedness) — whether claims in the answer are supported by retrieved chunks","Token count","Embedding dimension"], correct: 1, explanation: "Faithfulness (or groundedness) measures whether the generated answer's claims are actually supported by the retrieved context, rather than hallucinated. It's distinct from answer relevance and retrieval recall — a complete RAG evaluation measures all three." },
    { q: "In Reciprocal Rank Fusion (RRF), what happens to a document that ranks well in BOTH the vector search and the keyword search results?", options: ["It gets removed as a duplicate","Its scores from both lists are summed, pushing it toward the top of the fused ranking","Only its better rank is kept, the other is discarded","It is penalized for appearing twice"], correct: 1, explanation: "RRF computes 1/(k + rank) for a document in each result list and sums those values across lists. A document appearing high in both the vector and keyword results accumulates a larger combined score than one that only appears in a single list, so it rises to the top of the fused ranking." },
    { q: "What problem does 'late chunking' specifically address that standard chunk-then-embed approaches struggle with?", options: ["Storage costs of large vector databases","Loss of meaning from pronouns and cross-references that point to information in a different chunk", "Slow embedding API latency","Incompatibility between embedding models"], correct: 1, explanation: "Late chunking embeds the full document first with a long-context model, then pools token embeddings into chunks — so each chunk's vector retains context from elsewhere in the document. This specifically helps when a chunk contains a pronoun or reference (e.g. 'it trips at 12A') whose antecedent ('the eFuse') lives in an earlier, separately-chunked sentence." },
  ],
},

    { q: "What is the highest-leverage component of most prompts?", options: ["The greeting","Specificity — clear, detailed task description with explicit success criteria","Using ALL CAPS for emphasis","The length of the prompt"], correct: 1, explanation: "Specificity is consistently the highest-leverage prompt improvement. A precise task description with explicit constraints, format requirements, and success criteria outperforms vague prompts even on the same model. Vagueness forces the model to guess your intent." },
    { q: "What role does a system prompt serve?", options: ["It's the user's first message","A privileged instruction that sets the model's role, rules, and behavior for the entire conversation","A hidden message that bypasses safety","A debugging log"], correct: 1, explanation: "The system prompt (role: 'system') is a privileged message that persists across the conversation, defining the model's persona, behavioral rules, constraints, and context. It carries more weight than user messages and is where you define who the model is." },
    { q: "When is few-shot prompting most valuable over zero-shot?", options: ["When you want shorter responses","When the task has an unusual format or domain-specific pattern that examples can demonstrate","When using a larger model","Few-shot is always better"], correct: 1, explanation: "Few-shot shines when the desired output has an unusual format, specific style, or domain pattern that's hard to describe but easy to demonstrate. Examples teach by showing. For common tasks the model already knows, zero-shot often suffices and saves tokens." },
    { q: "What does chain-of-thought (CoT) prompting improve, and how?", options: ["Response speed by skipping steps","Accuracy on multi-step problems by making the model reason explicitly before answering","Token efficiency by being concise","Output formatting consistency"], correct: 1, explanation: "CoT instructs the model to reason step-by-step before giving a final answer. By 'thinking out loud,' the model breaks complex problems into tractable steps, dramatically improving accuracy on math, logic, planning, and debugging tasks. The classic trigger: 'Let's think step by step.'" },
    { q: "On a current frontier model with native extended thinking enabled, what is true about prompted chain-of-thought ('let's think step by step')?", options: ["It's required on every single prompt or the model cannot reason at all","It's often redundant — the model already reasons internally in a separate thinking phase before producing its visible answer","It permanently disables the model's reasoning ability","It only works if you also lower the temperature to 0"], correct: 1, explanation: "Native extended/reasoning modes perform multi-step reasoning in an internal phase before the visible response. Explicitly asking such a model to 'think step by step' in the prompt frequently adds little, since the reasoning is already happening — prompted CoT remains valuable mainly for non-reasoning models, visible-reasoning requirements, or below a reasoning model's minimum thinking budget." },
    { q: "What is self-consistency in prompting?", options: ["Using the same prompt template every time","Sampling multiple reasoning paths and taking the majority answer to improve reliability","Making the model agree with the user","Checking the prompt for typos"], correct: 1, explanation: "Self-consistency samples multiple independent CoT reasoning paths (at higher temperature) for the same question, then takes the majority-vote answer. Because correct reasoning tends to converge while errors diverge, this improves accuracy on problems with a definitive answer — at the cost of more inference calls." },
    { q: "What is the strongest guarantee available for getting schema-conformant structured output from a model today?", options: ["Asking nicely in the prompt and hoping","A 'JSON mode' flag, which guarantees valid JSON syntax but not your specific schema","Native structured-output / strict schema mode, which uses grammar-constrained decoding so the model cannot emit a token sequence violating your JSON Schema","Setting temperature to 0"], correct: 2, explanation: "Native structured-output modes (strict schema enforcement, including for tool-call arguments) constrain decoding at the token level so the response is guaranteed to match your JSON Schema's types, enums, and required fields. This is a stronger guarantee than JSON mode, which only ensures syntactically valid JSON — you still need to describe your schema in the prompt and validate it yourself. Schema conformance still doesn't guarantee the values are semantically correct, so validation logic remains necessary." },
    { q: "What is prompt decomposition?", options: ["Removing words to shorten the prompt","Breaking a complex task into a sequence of smaller, focused sub-prompts","Translating the prompt to another language","Compressing the prompt with abbreviations"], correct: 1, explanation: "Decomposition splits a complex task into a chain of simpler sub-prompts, each handling one focused step. Rather than asking the model to do everything at once (which splits its attention and degrades quality), each sub-prompt gets full focus. The outputs chain together." },
    { q: "Which is a defense against prompt injection?", options: ["Using a higher temperature","Structurally separating trusted instructions from untrusted content (e.g., with XML tags) and instructing the model never to follow instructions in untrusted sections","Making prompts longer","Using more few-shot examples"], correct: 1, explanation: "A key defense is structural separation: wrap untrusted content (user input, web pages, tool results) in clearly delimited sections (XML tags work well) and explicitly instruct the model to treat that content as data, never as instructions to follow. Combined with input filtering and output constraints." },

  quiz: [
    { q: "What is a token in the context of an LLM?", options: ["A single character","A chunk of text (often a word or sub-word piece) that is the basic unit the model processes","A complete sentence","An API authentication key"], correct: 1, explanation: "A token is the basic unit an LLM processes — typically a word or sub-word fragment. Common words may be one token; rare words split into several. English averages roughly 0.75 words per token. Models read and generate text token by token." },
    { q: "What is the core innovation of the attention mechanism?", options: ["It makes models train faster","It lets the model weigh the relevance of every other token when processing each token, capturing long-range relationships","It reduces the model's memory usage","It encrypts the input"], correct: 1, explanation: "Attention lets each token 'look at' and weigh the relevance of all other tokens in the context when computing its representation. This captures long-range dependencies and relationships between words regardless of distance — the breakthrough that made transformers so powerful." },
    { q: "What does the 'context window' refer to?", options: ["The model's training dataset","The maximum number of tokens the model can process at once (input + output)","The user interface window","The time window for an API request"], correct: 1, explanation: "The context window is the maximum number of tokens a model can attend to in a single forward pass — including the system prompt, conversation history, retrieved context, and the generated output. Exceed it and earlier content must be truncated or compressed." },
    { q: "What happens during the pre-training phase of an LLM?", options: ["The model is taught to follow instructions","The model learns language patterns by predicting the next token across a massive text corpus","Human raters score the model's outputs","The model is connected to tools"], correct: 1, explanation: "Pre-training is self-supervised next-token prediction over a massive corpus. The model learns grammar, facts, reasoning patterns, and world knowledge purely by predicting what comes next. This produces a 'base model' that is knowledgeable but not yet aligned to follow instructions." },
    { q: "What is RLHF and what problem does it solve?", options: ["A faster training algorithm","Reinforcement Learning from Human Feedback — aligns model behavior with human preferences for helpfulness and safety","A compression technique","A way to add new knowledge after training"], correct: 1, explanation: "RLHF (Reinforcement Learning from Human Feedback) fine-tunes a pre-trained model using human preference data. Humans rank model outputs; a reward model learns these preferences; the LLM is optimized against it. This is how raw base models become helpful, harmless, instruction-following assistants." },
    { q: "Why are LLM outputs probabilistic rather than deterministic by default?", options: ["Because of hardware errors","Because the model samples the next token from a probability distribution, and sampling introduces randomness (controlled by temperature)","Because the internet changes","Because of network latency"], correct: 1, explanation: "At each step the model produces a probability distribution over possible next tokens. Sampling from this distribution (rather than always taking the most likely token) introduces controlled randomness. Temperature 0 makes it deterministic (always pick the top token); higher temperatures increase diversity." },
    { q: "Why do LLMs hallucinate?", options: ["They are programmed to lie","They generate the most statistically plausible continuation, which isn't always factually true — they have no built-in truth verification","Their training data is encrypted","They run out of memory"], correct: 1, explanation: "LLMs predict plausible token sequences based on patterns, not verified facts. When the model lacks specific knowledge, it generates text that 'sounds right' statistically but may be false. There's no inherent fact-checking — which is why grounding (RAG) and verification matter for factual tasks." },
    { q: "What is the KV cache and why does it matter?", options: ["A database of API keys","A cache of computed key/value attention tensors that avoids recomputing them for prior tokens during generation, dramatically speeding up inference","A backup of the model weights","A cache of user conversations"], correct: 1, explanation: "During generation, the model would otherwise recompute attention for all prior tokens at every step. The KV cache stores the key and value tensors for already-processed tokens, so only the new token needs computation. This is essential for efficient inference but consumes memory that grows with context length." },
    { q: "What does a Mixture of Experts (MoE) architecture do?", options: ["Trains several entirely separate models and votes between them","Splits the feed-forward layers into many specialized sub-networks ('experts') and routes each token to only a few of them, so the model has huge total capacity but activates only a fraction per token","Runs the same model on multiple GPUs for redundancy","Compresses the model weights to a smaller file size"], correct: 1, explanation: "MoE models (DeepSeek-V3, Mixtral, and most current frontier models) have many expert FFN sub-networks but a learned router sends each token to only a handful of them. DeepSeek-V3 has 671B total parameters but activates only about 37B per token — near-frontier quality at a fraction of the per-token compute of an equivalently capable dense model." },
    { q: "What problem do Grouped-Query Attention (GQA) and Multi-head Latent Attention (MLA) solve?", options: ["They make the model's vocabulary larger","They reduce the size of the KV cache needed during inference, compared to standard multi-head attention, enabling longer context and higher throughput", "They eliminate the need for positional encoding","They remove the need for a tokenizer"], correct: 1, explanation: "Standard multi-head attention gives every head its own Key/Value projections, which makes the KV cache large and expensive to store during generation. GQA (used in Llama, Mistral) shares K/V across groups of heads; MLA (used in DeepSeek) compresses K/V into a small latent vector. Both shrink the cache with minimal quality loss, which is why nearly all current production models use one of them instead of plain multi-head attention." },
    { q: "What is Direct Preference Optimization (DPO), and how does it differ from classic RLHF?", options: ["It removes the need for any preference data at all","It optimizes the model directly on pairs of preferred/rejected responses with a simple loss, skipping the separate reward model and the reinforcement-learning loop that classic RLHF requires", "It only works for image-generation models","It is a way to compress model weights"], correct: 1, explanation: "Classic RLHF trains a separate reward model from human preference rankings, then uses reinforcement learning (e.g. PPO) to optimize the LLM against that reward model — a complex, often unstable pipeline. DPO reframes the same preference data as a direct classification-style loss on the policy model itself, skipping the reward model and RL loop. It's simpler and more stable, and by the mid-2020s is widely used either standalone or alongside RLHF/RLAIF in multi-stage alignment pipelines." },
    { q: "What is speculative decoding, and why does it speed up inference?", options: ["It skips safety filters to generate faster","A small, fast 'draft' model proposes several next tokens, and the large target model verifies them all in one parallel pass, accepting matches for free and only falling back to normal generation on mismatches","It reduces the number of layers in the model permanently","It pre-computes every possible response in advance"], correct: 1, explanation: "Speculative decoding uses a cheap draft model (or a quantized self-speculative copy of the target model) to guess ahead several tokens, then has the expensive target model check all of them in a single forward pass instead of one token at a time. Accepted guesses are essentially free; only mismatches require a normal generation step. This can meaningfully speed up generation latency without changing the final output distribution." },
  ],
},

  quiz: [
    { q: "When using AI to interpret a safety standard like IEC 62368-1, what is the essential guardrail?", options: ["Always trust the AI's interpretation if it cites a clause","A qualified engineer must verify every AI interpretation against the actual standard before it informs a compliance decision","Only use AI for standards written after 2020","Never write down that AI was used"], correct: 1, explanation: "AI can accelerate finding and summarizing relevant clauses, but compliance decisions carry legal and safety weight. A qualified engineer must always verify AI interpretations against the authoritative standard text. AI is a research accelerator, not a compliance authority. Document its use in the engineering record." },
    { q: "Why is RAG (retrieval-augmented generation) particularly valuable for datasheet and standards Q&A?", options: ["It makes the AI faster","It grounds answers in the actual document text and provides citations, reducing hallucination of specs that don't exist","It translates datasheets automatically","It reduces token costs to zero"], correct: 1, explanation: "Datasheets and standards contain precise, specific values that an LLM may misremember or fabricate from parametric memory. RAG retrieves the actual document text and grounds answers in it with citations — letting an engineer verify the source. This is far safer than asking an LLM to recall specs from memory." },
    { q: "What is an appropriate first AI use case when introducing it to a skeptical hardware team?", options: ["Letting AI approve final PCB layouts autonomously","Low-stakes, high-volume tasks like drafting documentation or summarizing test logs, where errors are caught easily and value is immediate","Replacing the compliance engineer","Auto-generating safety certifications"], correct: 1, explanation: "Start where errors are low-cost and easily caught, and time savings are immediate — documentation drafts, test log summaries, datasheet lookups. This builds trust and demonstrates value without risking safety-critical decisions. Expand to higher-stakes uses only after the team trusts the tooling." },
    { q: "When using AI to analyze a BOM (Bill of Materials), what should you always verify independently?", options: ["The font of the output","Critical specifications like voltage ratings, tolerances, and compliance markings — against authoritative sources, not the AI's claim","Only the part count","Nothing — AI is reliable for BOMs"], correct: 1, explanation: "AI can speed up BOM analysis (flagging EOL parts, finding alternates, spotting inconsistencies), but any safety- or compliance-critical spec — voltage rating, creepage/clearance implications, certification marks — must be verified against the authoritative datasheet or standard. Treat AI output as a flag to investigate, not a final answer." },
    { q: "What is the safest way to use AI for schematic review?", options: ["Let AI redesign the schematic automatically","Use AI to flag potential issues for an engineer to investigate, always showing its reasoning and the rule it's applying","Trust AI to catch all errors so humans don't need to review","Only use AI on schematics that don't matter"], correct: 1, explanation: "AI excels at surfacing candidate issues — missing pull-ups, spacing concerns, unconnected nets — for human investigation. It should always show its reasoning and the specific rule or standard it's applying, so the engineer can verify. The engineer remains the decision-maker; AI is a second set of eyes, not a replacement." },
    { q: "Why should sensitive design data (proprietary schematics, unreleased specs) be handled carefully with AI tools?", options: ["It slows down the AI","Data sent to third-party model APIs may be logged or retained; use enterprise agreements, zero-retention endpoints, or local models for sensitive IP","It makes the output less accurate","There is no concern"], correct: 1, explanation: "Proprietary hardware IP sent to a public model API may be logged, retained, or used per the provider's terms. For sensitive data, use enterprise agreements with zero-retention/no-training guarantees, or run local open-weight models (Ollama) so nothing leaves your infrastructure. Always check your organization's data policy first." },
    { q: "What is a realistic, high-value AI application for environmental stress test data?", options: ["Replacing the test chamber","Summarizing trends, flagging anomalies, and drafting the analysis section of a report — with the engineer verifying conclusions","Deciding pass/fail autonomously for certification","Deleting outlier data automatically"], correct: 1, explanation: "AI can rapidly summarize large test datasets, surface trends and anomalies across temperature/humidity cycles, and draft report narratives — saving significant engineer time. But pass/fail and certification conclusions must be made by a qualified engineer reviewing the actual data; AI assists the analysis, it doesn't own the verdict." },
    { q: "How should AI assistance be reflected in formal engineering records?", options: ["It should never be mentioned","Document AI use as you would any tool or reference — noting that outputs were engineer-reviewed — to maintain traceability and accountability","Claim the engineer did everything manually","Only mention it if asked by an auditor"], correct: 1, explanation: "Just as you document the use of a reference handbook, calculator, or simulation tool, AI assistance should be noted in the engineering record — with the key fact that a qualified engineer reviewed and verified the outputs. This maintains traceability, accountability, and audit-readiness in regulated environments." },
    { q: "Current multimodal AI models reviewing a schematic image are generally MOST reliable at which task?", options: ["Measuring exact trace widths and clearances from the image","Identifying component types and recognizing standard topologies (e.g. a buck converter or op-amp gain stage)","Computing the exact currents and voltages throughout the circuit","Reading dense reference-designator text at small sizes with perfect accuracy"], correct: 1, explanation: "Vision-capable models are comparatively strong at component/topology recognition, but weak at precise visual measurement, fine print, and multi-step numerical/symbolic reasoning from an image. Any specific number or measurement an AI reports from a schematic image should be independently verified against the source file, not trusted as a measurement." },
    { q: "A compliance question requires combining a spec from two different datasheets to reach a conclusion. What should a well-built datasheet RAG answer do?", options: ["Average the two values and present a single confident number","Clearly separate what each source actually supports and flag what neither document addresses, rather than blending them into one unverifiable claim", "Ignore the second datasheet to keep the answer simple", "Decline to answer any question involving more than one document"], correct: 1, explanation: "The value of grounded RAG over plain LLM chat is precisely this: it should distinguish per-source facts from any inference layered on top, and explicitly flag gaps where the cited documents don't actually connect the way the question assumes. Silently synthesizing a confident answer across sources that don't support it is the failure mode citations are meant to prevent." },

  quiz: [
    { q: "What is the central problem context engineering solves?", options: ["Making the model train faster","Deciding what information to place in a finite, attention-limited context window to maximize output quality","Reducing the number of model parameters","Encrypting the prompt"], correct: 1, explanation: "Context engineering is the discipline of curating exactly what enters the context window \u2014 and in what order and form \u2014 because the window is finite, every token costs money and attention, and more context is not automatically better." },
    { q: "Why isn't 'just put everything in the context window' a good strategy, even with large windows?", options: ["It's always cheaper to use less","Cost and latency scale with tokens, and models attend unevenly \u2014 irrelevant content dilutes attention and degrades quality (context rot)","Large windows don't exist","The model will refuse"], correct: 1, explanation: "Even when content fits, every token adds cost and latency, and irrelevant material competes for the model's attention. Performance can actually degrade as the window fills with low-signal content \u2014 a phenomenon often called context rot. Curation beats accumulation." },
    { q: "What is the 'lost in the middle' effect?", options: ["The model forgets its system prompt","Models recall information at the beginning and end of the context more reliably than content buried in the middle","The middle layers of the network are unused","A bug in tokenization"], correct: 1, explanation: "LLMs exhibit a U-shaped attention bias: content at the start and end of the context is recalled more reliably than content in the middle. Place the most critical instructions and information at the edges, not the center, of a long context." },
    { q: "What is rolling summarization used for?", options: ["Making the model's answers shorter","Compressing older conversation turns into a compact summary to free context space while preserving key information","Summarizing the system prompt","Translating the conversation"], correct: 1, explanation: "As a conversation grows past a threshold, rolling summarization condenses the oldest turns into a short summary (often 10:1 compression), which replaces the verbose originals \u2014 freeing tokens while retaining the essential thread." },
    { q: "In a long-running agent, what is the fastest-growing and most volatile part of the context?", options: ["The system prompt","Accumulated tool-call results and observations","The user's name","The temperature setting"], correct: 1, explanation: "Tool results accumulate with every step of an agent loop and can balloon quickly. Managing them \u2014 via compression, selective retention, or external storage \u2014 is the central context-engineering challenge in agentic systems." },
    { q: "What is the difference between context (working memory) and external memory?", options: ["They are the same thing","Context is the finite in-window working memory for the current turn; external memory is persistent storage (files, vector DBs) the model retrieves from on demand","External memory is faster","Context never changes"], correct: 1, explanation: "Context is transient working memory \u2014 what the model sees right now, bounded by the window. External memory persists across turns and sessions; relevant pieces are retrieved into context just-in-time. Good context engineering moves information fluidly between the two." },
    { q: "What is 'just-in-time' retrieval in context engineering?", options: ["Loading all data at startup","Pulling only the specific information needed for the current step into context, rather than pre-loading everything","Caching the entire database","Retrieving data after the model responds"], correct: 1, explanation: "Just-in-time retrieval keeps the context lean by fetching only what each step needs, when it needs it \u2014 mirroring how a person opens the one reference they need rather than spreading every document on the desk at once." },
    { q: "What is context offloading?", options: ["Deleting the conversation","Moving bulky information out of the context window into external storage (files, notes, scratchpads) and pulling it back only when needed","Sending context to another model","Compressing the model weights"], correct: 1, explanation: "Offloading writes detailed information to an external store \u2014 a file, a scratchpad, a structured note \u2014 and keeps only a reference or summary in context. The model retrieves the full detail on demand, keeping the working window focused." },
    { q: "What did Chroma's 2025 'Context Rot' study find when testing 18 frontier models (including GPT-4.1, Claude 4, and Gemini 2.5) on long-context tasks?", options: ["Performance is constant as long as content fits within the window","Reliability declines continuously as input length grows \u2014 even on simple retrieval tasks, and well before the window is full","Only open-weight models show degradation","Longer context always improves accuracy"], correct: 1, explanation: "The study found degradation is a continuous slope, not a cliff at the context limit \u2014 a model with a 200K window can show meaningful quality loss by 50K tokens. This is empirical evidence that 'it fits in the window' is not the same as 'the model will use it well.'" },
    { q: "As of 2026, why is it misleading to say 'the context window' as if it were one fixed number across all frontier models?", options: ["All major models now have exactly the same window size","Window sizes vary widely by family and tier \u2014 Claude models are commonly ~200K while GPT-5.x and Gemini 3.x reach the high hundreds-of-thousands to low millions of tokens","Context windows were deprecated in favor of unlimited memory","Token counts no longer apply to modern models"], correct: 1, explanation: "Context window size is model- and tier-specific and changes with nearly every release. Treating it as a universal constant leads to budgets that are wrong for whichever model you're actually calling \u2014 always check the specific model's documented limit." },
    { q: "What does Anthropic's native context-editing feature (the clear_tool_uses strategy) do?", options: ["Deletes the system prompt once the conversation gets long","Automatically clears older tool-call results once input tokens cross a configured threshold, while keeping a placeholder so the model still knows the action occurred","Rewrites the user's original question","Switches the model to a smaller context window"], correct: 1, explanation: "Context editing is a server-side primitive: you configure a token trigger and how many recent tool results to keep verbatim, and the API automatically clears older, bulkier tool outputs \u2014 implementing the 'compact tool results' pattern without custom code. Pairing it with the memory tool lets the model save important details before they're cleared." },

},

  quiz: [
    { q: "What is 'vibe coding'?", options: ["Coding without a computer","Building software by describing intent to an AI in natural language and iterating on what it generates, often without reading every line","A type of music","A testing framework"], correct: 1, explanation: "Vibe coding describes the AI-first workflow of expressing intent in natural language and letting the model generate and revise code, steering by results and feel rather than writing every line by hand. It's fast and powerful \u2014 but without discipline it accumulates bloat and entropy quickly." },
    { q: "Why do vibe-coded projects tend to accumulate bloat faster than hand-written ones?", options: ["AI writes slower code","Generation is cheap and fast, so unused code, duplicate helpers, dead files, and redundant docs pile up faster than they're cleaned \u2014 and the human may not be reading every addition","AI never makes mistakes","Bloat is impossible in AI projects"], correct: 1, explanation: "Because the marginal cost of generating more code or docs is near zero, AI workflows produce volume quickly. Duplicates, abandoned experiments, and over-engineered abstractions accumulate \u2014 especially when the human isn't reviewing every line \u2014 unless you actively prune." },
    { q: "What is the purpose of a CLAUDE.md (or equivalent context file) in a project?", options: ["To store passwords","To give the AI persistent project context \u2014 conventions, architecture, constraints, and commands \u2014 so it behaves consistently across sessions","To replace the README for users","To configure the compiler"], correct: 1, explanation: "A context file like CLAUDE.md is a persistent, version-controlled brief for the AI: project structure, coding conventions, key commands, and do/don't rules. It keeps the model consistent across sessions and prevents it from re-deriving (and re-deciding) conventions every time." },
    { q: "You want one context file that works across Claude Code, Cursor, and Copilot. What should you do?", options: ["Write only a CLAUDE.md \u2014 every tool reads it", "Write your conventions in AGENTS.md (the cross-tool standard) and have Claude Code import it from CLAUDE.md with @AGENTS.md", "Write the same content five times, once per tool's expected filename", "It's impossible; pick one tool"], correct: 1, explanation: "AGENTS.md has become the broadly-supported cross-tool standard, read natively by Cursor, Copilot, Aider, Devin, and others \u2014 but Claude Code specifically still reads CLAUDE.md, not AGENTS.md, natively. The fix is to put your real conventions in AGENTS.md once and add a CLAUDE.md that imports it with @AGENTS.md (or, as a fallback on POSIX systems, symlink CLAUDE.md to AGENTS.md), so every tool stays in sync from one source of truth." },
    { q: "What's the difference between a rule written in your context file and a rule enforced by a Claude Code hook?", options: ["There is no difference", "A context-file rule is prose the model usually follows; a hook runs deterministic code that executes regardless of what the model decides, so it can't be skipped", "Hooks are slower and less reliable than prose rules", "Context files can only contain code, hooks can only contain prose"], correct: 1, explanation: "Context files are strong suggestions \u2014 well-written ones are followed most of the time, but they rely on the model reading and prioritizing them correctly. Hooks (PreToolUse, PostToolUse, etc.) execute real code at defined lifecycle points and run no matter what, which is why the handful of rules that must never be broken \u2014 never commit secrets, never skip tests before stopping \u2014 should be backed by a hook, not just a line in a context file." },
    { q: "Why is a clear, conventional directory structure especially important in AI-assisted projects?", options: ["It makes the repo look nice","It helps both you and the AI locate code predictably, reduces duplicate implementations, and lets the AI load only relevant context","Directory structure doesn't matter","It speeds up the CPU"], correct: 1, explanation: "A predictable structure (e.g., src/, tests/, docs/) lets the AI find and place code where it belongs instead of inventing new locations or duplicating logic. It also enables loading only the relevant directory into context, keeping the window focused." },
    { q: "What is a good practice to prevent the AI from creating duplicate or redundant code?", options: ["Never let the AI write code","Point it at existing modules and explicitly instruct it to reuse or extend them; periodically ask it to find and consolidate duplication","Delete the whole project weekly","Use a bigger model"], correct: 1, explanation: "Proactively tell the AI which existing utilities to reuse, and run periodic 'find duplicated logic and consolidate it' passes. Without this, an AI asked to add a feature will often write a fresh helper rather than discovering the one that already exists." },
    { q: "What is the recommended approach to AI-generated documentation to avoid doc bloat?", options: ["Generate a new doc for every change","Maintain a small set of living documents (README, architecture, decisions) and update them \u2014 rather than spawning many overlapping, stale files","Never write docs","Put all docs in code comments only"], correct: 1, explanation: "AI happily generates a new markdown file per request, producing piles of overlapping, quickly-stale docs. Instead, keep a few canonical living documents and instruct the AI to update them in place. Fewer, current docs beat many redundant ones." },
    { q: "Why should you commit small, frequent, well-described changes in a vibe-coded project?", options: ["To inflate the commit count","So you can review what the AI changed, isolate problems, and roll back cleanly \u2014 large opaque AI commits are hard to audit and revert","Git requires it","It makes the AI faster"], correct: 1, explanation: "Small, scoped commits with clear messages make AI-generated changes reviewable and reversible. A giant 'AI built the feature' commit mixing dozens of files is nearly impossible to audit or partially undo when something breaks." },
    { q: "Why is reviewing every diff before committing especially important in AI-assisted projects?", options: ["It isn't \u2014 AI code never has security issues", "Beyond catching dead code and drift, AI-assisted commits have been found to expose secrets like API keys at more than twice the rate of human-only commits", "It's purely a style preference", "It only matters for open-source projects"], correct: 1, explanation: "AI assistants will readily hardcode a key or token they encounter (e.g., from a pasted .env or an error message) to make an example 'just work.' Measured data on AI-assisted commits shows secret exposure at over twice the rate of human-only commits, which makes the pre-commit diff review a security control, not just a tidiness habit." },
    { q: "What is a healthy way to handle AI-generated experimental code and one-off artifacts?", options: ["Keep everything forever just in case","Quarantine experiments (e.g., a scratch/ or experiments/ dir, gitignored or clearly marked) and delete them once their lesson is captured","Commit them to main immediately","Email them to yourself"], correct: 1, explanation: "Experiments, throwaway scripts, and generated artifacts should live in a clearly-marked, often gitignored area and be deleted once you've extracted what you needed. Letting them mingle with production code is a primary source of artifact bloat and confusion." },

},

'mcp:architecture': () => `<div class="panel" id="panel-mcp-architecture">

  <p class="lead">MCP uses a three-tier architecture: a <em>Host</em> containing one or more <em>Clients</em>, each holding a 1:1 connection to an <em>MCP Server</em>.</p>

    <div class="diagram-label">// THREE-TIER ARCHITECTURE</div>

        <div class="flow-node c-green" style="min-width:140px;padding:18px 20px;"><div class="node-eyebrow">TIER 3</div><div class="node-name">Server</div><div class="node-sub">Your tool · API · DB<br>data source</div></div>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px;">Exposes tools,<br>resources, prompts</div>

      <p style="color:var(--muted2);margin-bottom:14px;">The host is the user-facing application. It owns the UX, manages security policies, and decides which MCP servers to connect to.</p>
      <ul class="checklist"><li>Launches and manages MCP client connections</li><li>Controls which servers the user has authorized</li><li>Routes LLM requests through the client layer to servers</li><li>Aggregates results from multiple servers into model context</li><li>Handles user-facing consent dialogs for sensitive operations</li></ul>

<span class="n">Server → Client:</span>  <span class="k">initialize_response</span> {protocolVersion, capabilities}
<span class="n">Client → Server:</span>  <span class="k">initialized</span> <span class="c">// session now active</span></div>
    </div>

      <p style="color:var(--muted2);margin-bottom:14px;">A program (local process or remote service) that exposes capabilities. Servers are lightweight wrappers around existing APIs or tools.</p>

        <div class="t-cell tc-green"><div class="tc-label">Remote / Current</div><div class="tc-name">Streamable HTTP</div><div class="tc-desc">Single <code class="inline">/mcp</code> endpoint, POST + optional GET stream. Stateless-friendly — works behind load balancers and serverless gateways.</div></div>

    </div>
    <div class="tab-content" id="t-primitives">
      <h2>Three Primitives</h2>
      <ul class="cap-list">
        <li><div class="cap-icon">🔧</div><div class="cap-text"><strong style="color:var(--accent)">Tools — Model-controlled actions</strong><span>Functions the AI decides to invoke. Each has name, description, and JSON Schema for args. Examples: search web, write file, query DB.</span></div></li>

        <li><div class="cap-icon">💬</div><div class="cap-text"><strong style="color:var(--green)">Prompts — User-controlled templates</strong><span>Pre-built templates triggered by the user via slash commands or menus. Server defines the template; user triggers it.</span></div></li>
      </ul>
      <div class="info-box violet"><strong>Control hierarchy:</strong> Tools = model, Resources = app, Prompts = user. This maps decision authority to the right layer.</div>
    </div>
    <div class="tab-content" id="t-lifecycle">
      <h2>Session Lifecycle</h2>
      <div class="code-block"><span class="code-label">// COMPLETE MCP SESSION</span><span class="c">// Phase 1: Initialization</span>
Host spawns server (stdio) or connects (HTTP/SSE)
Client → initialize(version, capabilities)
Server → initialize_response(capabilities)
Client → initialized  <span class="c">// session active</span>

<span class="c">// Phase 2: Discovery</span>
Client → tools/list     <span class="c">// "what tools exist?"</span>
Client → resources/list <span class="c">// "what can I read?"</span>

<span class="c">// Phase 3: Execution (repeated)</span>
Model decides → Host sends tools/call(name, args)
Server executes → returns content[]
Host injects result into model context

<span class="c">// Phase 4: Termination</span>
Host closes connection / subprocess exits</div>
    </div>
  </div>
</div>`,
