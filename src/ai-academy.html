'llm:overview': () => `<div class="panel" id="panel-llm-overview">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Building Blocks</span> › The Big Picture</div>
  <h1>The <span class="hl">Big Picture</span></h1>
  <p class="lead">A large language model is, at its core, a next-token predictor: given a sequence of text, it predicts what comes next. From that deceptively simple objective — repeated over trillions of words — emerges grammar, reasoning, knowledge, and the ability to follow instructions. This course demystifies how.</p>
  <div class="info-box"><strong>The whole model in one sentence:</strong> An LLM converts text into tokens, turns tokens into vectors, passes them through stacked transformer layers that let each token attend to every other, and outputs a probability distribution over the next token — then repeats.</div>
  <h2>The Journey of a Prompt</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// TEXT IN, TEXT OUT — THE FULL PATH</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">input</div><div class="node-name" style="font-size:12px;">Text</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">step 1</div><div class="node-name" style="font-size:12px;">Tokenize</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">step 2</div><div class="node-name" style="font-size:12px;">Embed</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">step 3</div><div class="node-name" style="font-size:12px;">Transformer Layers</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">step 4</div><div class="node-name" style="font-size:12px;">Predict Token</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="text-align:center;min-width:88px;"><div class="node-eyebrow">repeat</div><div class="node-name" style="font-size:12px;">Output Text</div></div>
    </div>
  </div>
  <h2>What We'll Cover</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🔤</div><div class="card-title">Tokens</div><div class="card-body">How text becomes the discrete units a model processes — and why this affects cost, context, and quirks.</div><span class="tag">input</span></div>
    <div class="card"><div class="card-icon">🧲</div><div class="card-title">Embeddings</div><div class="card-body">How tokens become vectors that encode meaning in high-dimensional space.</div><span class="tag amber">representation</span></div>
    <div class="card"><div class="card-icon">👁</div><div class="card-title">Attention</div><div class="card-body">The mechanism that lets the model weigh relationships between all tokens — the core breakthrough.</div><span class="tag violet">mechanism</span></div>
    <div class="card"><div class="card-icon">🎓</div><div class="card-title">Training</div><div class="card-body">How pre-training, fine-tuning, and RLHF turn raw text into a helpful assistant.</div><span class="tag green">learning</span></div>
  </div>
  <div class="info-box green"><strong>Why this matters for builders:</strong> Understanding the machinery explains the behavior — why models hallucinate, why context windows have limits, why tokenization causes odd failures, why temperature changes output. This knowledge makes you far more effective at prompting, RAG, and debugging.</div>
</div>`,

'llm:tokens': () => `<div class="panel" id="panel-llm-tokens">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Building Blocks</span> › Tokenization</div>
  <h1><span class="hl">Tokenization</span></h1>
  <p class="lead">Models don't see text as letters or words — they see tokens. A tokenizer splits text into a vocabulary of sub-word pieces, the atomic units the model reads and generates. This single design choice has surprisingly wide effects.</p>
  <div class="info-box"><strong>Key fact:</strong> A token is typically a word or a fragment of one. In English, roughly 1 token ≈ 0.75 words, or about 4 characters. "Unbelievable" might split into "un", "believ", "able". Common words are single tokens; rare words fragment.</div>
  <h2>How Tokenization Works</h2>
  <div class="code-block"><span class="code-label">// TEXT TO TOKENS (illustrative)</span>"The eFuse limits current to 12A."

tokens:  ["The", " e", "Fuse", " limits", " current", " to", " 12", "A", "."]
ids:     [464,   384,  37,     7095,      1459,       284,   717,  32,  13]

<span class="c">// Note: "eFuse" splits into "e"+"Fuse" — it's not a common word.</span>
<span class="c">// "12A" splits into "12"+"A". Spaces attach to the following token.</span></div>
  <h2>Why Tokenization Matters</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">💰</div><div class="cap-text"><strong style="color:var(--accent)">Cost &amp; limits are per-token</strong><span>You pay per token and context windows are measured in tokens. Knowing ~0.75 words/token lets you estimate cost and fit.</span></div></li>
    <li><div class="cap-icon">🔢</div><div class="cap-text"><strong style="color:var(--accent)">Number &amp; math quirks</strong><span>Numbers tokenize inconsistently ("12" vs "120" vs "1200"), which is part of why LLMs historically struggled with arithmetic.</span></div></li>
    <li><div class="cap-icon">🌍</div><div class="cap-text"><strong style="color:var(--accent)">Language inequality</strong><span>English is token-efficient; many other languages use more tokens for the same meaning — making them costlier and consuming more context.</span></div></li>
    <li><div class="cap-icon">🔤</div><div class="cap-text"><strong style="color:var(--accent)">Character-level blindness</strong><span>Because models see tokens, not letters, tasks like "count the r's in strawberry" or reversing a string can trip them up — the model can't easily see inside a token.</span></div></li>
  </ul>
  <h2>Tokenization Algorithms</h2>
  <table class="data-table">
    <tr><th>Method</th><th>Used by</th><th>Idea</th></tr>
    <tr><td><span class="hl">BPE (Byte-Pair Encoding)</span></td><td>GPT family, many others</td><td>Merge the most frequent character pairs iteratively into tokens</td></tr>
    <tr><td><span class="hl">SentencePiece</span></td><td>Llama, T5, others</td><td>Language-agnostic sub-word tokenization, treats text as raw bytes</td></tr>
    <tr><td><span class="hl">WordPiece</span></td><td>BERT lineage</td><td>Similar to BPE, merges based on likelihood gains</td></tr>
  </table>
  <h2>Real Tokenizers, Real Vocabularies</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Vocabulary size is a real design choice with real consequences. OpenAI's current encoding, <span class="hl">o200k_base</span> (GPT-4o and newer), uses roughly 200K vocabulary entries — about double the ~100K of the older <span class="hl">cl100k_base</span> (GPT-4 / GPT-3.5 era). A larger vocabulary lets more text compress into fewer tokens (cheaper, more fits in context) at the cost of a bigger embedding table. Anthropic does not publish a downloadable Claude tokenizer — the only authoritative way to count Claude tokens is the <code class="inline">count_tokens</code> endpoint on the Messages API.</p>
  <div class="code-block"><span class="code-label">// TRY THIS — HANDS-ON EXERCISE</span><span class="c">// Open OpenAI's tokenizer visualizer (platform.openai.com/tokenizer)</span>
<span class="c">// or install tiktoken locally, then tokenize these three strings.</span>
<span class="c">// Predict the token count BEFORE you check, then compare:</span>

1. "ChatGPT is great."                              <span class="c">// short, common words</span>
2. "The eFuse subsystem's overcurrent threshold is 12.5A."  <span class="c">// technical/compound</span>
3. "supercalifragilisticexpialidocious"              <span class="c">// one rare long word</span>

<span class="c">// Expect: (1) ~4-5 tokens. (2) splits far more than the word count</span>
<span class="c">// suggests -- "eFuse", "subsystem's", "12.5A" all fragment. (3) one</span>
<span class="c">// "word" becomes 6-9 sub-word pieces, never a single token.</span>

<span class="c"># pip install tiktoken</span>
<span class="k">import</span> tiktoken
enc = tiktoken.get_encoding(<span class="s">"o200k_base"</span>)
ids = enc.encode(<span class="s">"The eFuse subsystem's overcurrent threshold is 12.5A."</span>)
print(len(ids), ids)
print(enc.decode(ids[:3]))   <span class="c"># round-trip any slice back to text</span></div>
  <div class="info-box amber"><strong>Practical takeaway:</strong> When estimating cost or context usage, count tokens, not words — use the provider's tokenizer (tiktoken for OpenAI, the Messages API count_tokens endpoint for Claude) or the rule of thumb (~0.75 words/token). And if a model fails at a character-level task, tokenization is often the culprit.</div>
</div>`,

'llm:embeddings': () => `<div class="panel" id="panel-llm-embeddings">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Building Blocks</span> › Embeddings &amp; Vectors</div>
  <h1>Embeddings <span class="hl">&amp; Vectors</span></h1>
  <p class="lead">Once text is tokenized, each token is converted into a vector — a long list of numbers — that represents its meaning. These embeddings are how a model turns discrete symbols into something it can do math on. Meaning becomes geometry.</p>
  <div class="info-box"><strong>The core idea:</strong> Every token maps to a point in high-dimensional space (hundreds to thousands of dimensions). Tokens with similar meanings sit near each other. The model learns these positions during training — they're not hand-assigned.</div>
  <h2>From Token to Vector</h2>
  <div class="code-block"><span class="code-label">// EMBEDDING LOOKUP</span>token "voltage" -> id 8234 -> embedding vector:
  [0.12, -0.88, 0.34, 0.01, ..., -0.22]   <span class="c"># e.g. 4096 numbers</span>

<span class="c"># These vectors have learned structure. Famously:</span>
vec("king") - vec("man") + vec("woman")  ~=  vec("queen")
<span class="c"># Meaning relationships become vector arithmetic.</span></div>
  <h2>Two Kinds of Embeddings</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🔤</div><div class="card-title">Token Embeddings</div><div class="card-body">Inside the model — each token's learned vector, the input to the transformer layers. Static lookup, then refined by context.</div><span class="tag">internal</span></div>
    <div class="card"><div class="card-icon">📄</div><div class="card-title">Sentence/Document Embeddings</div><div class="card-body">A whole passage compressed to one vector for semantic search (this is what powers RAG retrieval). Output of a dedicated embedding model.</div><span class="tag amber">retrieval</span></div>
  </div>
  <h2>Positional Information</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Word order matters ("dog bites man" vs "man bites dog"), but raw embeddings carry no position. Models add <span class="hl">positional encodings</span> so each token's vector also reflects where it sits in the sequence.</p>
  <div class="info-box violet"><strong>Modern approach — RoPE:</strong> Most current models use Rotary Position Embeddings (RoPE), which encode position by rotating the vector. RoPE handles long sequences gracefully and is part of why context windows have grown so large.</div>
  <h2>Why This Matters</h2>
  <ul class="checklist">
    <li>Embeddings are why models grasp synonyms and analogies — similar meanings are geometrically near</li>
    <li>The same embedding technology powers RAG: document and query vectors enable semantic search</li>
    <li>Embedding dimensionality is a key model design parameter — more dimensions, more nuance, more compute</li>
    <li>Positional encoding choices (like RoPE) directly affect how long a context the model can handle</li>
  </ul>
</div>`,

'llm:attention': () => `<div class="panel" id="panel-llm-attention">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">The Transformer</span> › Attention</div>
  <h1><span class="hl">Attention</span></h1>
  <p class="lead">Attention is the mechanism that made modern LLMs possible. It lets every token look at every other token and decide how much each one matters for understanding it. This is how a model resolves "it" to the right noun, or connects a verb to its distant subject.</p>
  <div class="info-box"><strong>The 2017 breakthrough:</strong> The paper "Attention Is All You Need" introduced the transformer, replacing slow sequential processing with attention that processes all tokens in parallel while modeling their relationships. Every major LLM since is a descendant.</div>
  <h2>The Intuition</h2>
  <div class="code-block"><span class="code-label">// ATTENTION RESOLVES RELATIONSHIPS</span>"The eFuse tripped because it exceeded its current limit."

<span class="c"># When processing "it", attention weighs every other token:</span>
"it" attends strongly to -> "eFuse"   (high weight, 0.7)
"it" attends weakly to   -> "limit"   (low weight, 0.1)
"it" attends weakly to   -> "The"     (low weight, 0.02)

<span class="c"># The model learns that "it" refers to the eFuse — from context,</span>
<span class="c"># not from a rule. Attention makes this possible.</span></div>
  <h2>Query, Key, Value</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Attention works through three learned projections of each token's vector:</p>
  <ul class="cap-list">
    <li><div class="cap-icon">❓</div><div class="cap-text"><strong style="color:var(--accent)">Query (Q)</strong><span>What this token is "looking for." Like a search query asking which other tokens are relevant to me.</span></div></li>
    <li><div class="cap-icon">🔑</div><div class="cap-text"><strong style="color:var(--accent)">Key (K)</strong><span>What each token "offers" — its advertised content. Queries are matched against keys to compute relevance.</span></div></li>
    <li><div class="cap-icon">💎</div><div class="cap-text"><strong style="color:var(--accent)">Value (V)</strong><span>The actual information a token contributes. Once relevance (Q·K) is computed, values are blended by those weights.</span></div></li>
  </ul>
  <div class="code-block"><span class="code-label">// THE ATTENTION FORMULA (conceptually)</span>For each token:
  scores   = Query · Keys          <span class="c"># how relevant is every other token?</span>
  weights  = softmax(scores)        <span class="c"># normalize to sum to 1</span>
  output   = weights · Values       <span class="c"># weighted blend of information</span>

<span class="c"># "Scaled dot-product attention" — the core operation,</span>
<span class="c"># run in parallel across all tokens.</span></div>
  <h2>Hands-On: Compute Attention by Hand</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The formula is abstract until you run real numbers through it. Here's a tiny 3-token example — work through it with a calculator (or a few lines of Python/numpy) to see exactly how "scores → softmax → weighted blend" produces an output vector.</p>
  <div class="code-block"><span class="code-label">// TOY EXAMPLE — 3 TOKENS, 2-DIM VECTORS (do the math yourself)</span><span class="c"># Sentence: "cat chased mouse" — computing attention for "chased"</span>
<span class="c"># (real models use 64-128+ dims per head; this is simplified to fit on paper)</span>

Query (for "chased"):      q = [1.0, 0.0]
Keys:  k_cat = [1.0, 0.0]   k_chased = [0.0, 1.0]   k_mouse = [0.8, 0.2]
Values: v_cat = [2,5]       v_chased = [0,1]         v_mouse = [4,1]

<span class="c"># Step 1 — raw scores = dot product of query with each key</span>
score_cat    = q·k_cat    = (1*1.0 + 0*0.0)  = 1.0
score_chased = q·k_chased = (1*0.0 + 0*1.0)  = 0.0
score_mouse  = q·k_mouse  = (1*0.8 + 0*0.2)  = 0.8

<span class="c"># Step 2 — softmax turns scores into weights that sum to 1</span>
<span class="c"># softmax(x) = exp(x) / sum(exp(all x))</span>
exp(1.0)=2.72   exp(0.0)=1.00   exp(0.8)=2.23   -> sum = 5.95
weight_cat    = 2.72 / 5.95 = <span class="hl">0.46</span>
weight_chased = 1.00 / 5.95 = <span class="hl">0.17</span>
weight_mouse  = 2.23 / 5.95 = <span class="hl">0.37</span>

<span class="c"># Step 3 — output = weighted sum of Values</span>
output = 0.46*[2,5] + 0.17*[0,1] + 0.37*[4,1]
       = [0.92,2.30] + [0,0.17] + [1.48,0.37]
       = <span class="hl">[2.40, 2.84]</span>

<span class="c"># "chased" ends up attending most to "cat" (0.46) — plausible, since</span>
<span class="c"># in "cat chased mouse" the subject is highly relevant to the verb.</span>
<span class="c"># Try changing the query vector and re-running the three steps yourself.</span></div>
  <div class="info-box"><strong>Exercise:</strong> Recompute the example above using q = [0.0, 1.0] instead (pretend "chased" is now "looking for its subject's target"). Which token gets the highest weight, and does that match your intuition?</div>
  <h2>Multi-Head Attention</h2>
  <div class="info-box violet"><strong>Many perspectives at once:</strong> Models don't run attention just once — they run many "heads" in parallel, each learning to focus on different kinds of relationships (one head tracks grammar, another tracks references, another tracks topic). Their outputs combine, giving the model a rich, multi-faceted view of how tokens relate.</div>
  <h2>Modern Attention Variants</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Plain multi-head attention (MHA) gives every head its own Key and Value projections — accurate, but the KV cache it needs at inference time grows expensive. Most current production models use a cheaper variant:</p>
  <table class="data-table">
    <tr><th>Variant</th><th>Idea</th><th>Used by</th></tr>
    <tr><td><span class="hl">MHA</span> (Multi-Head)</td><td>Every head has its own K/V projections — most expressive, biggest KV cache</td><td>Original transformer, early GPT models</td></tr>
    <tr><td><span class="hl">MQA</span> (Multi-Query)</td><td>All heads share one K/V projection — smallest cache, some quality loss</td><td>PaLM, some efficiency-focused models</td></tr>
    <tr><td><span class="hl">GQA</span> (Grouped-Query)</td><td>Heads are split into groups; each group shares a K/V projection — a middle ground</td><td>Llama 2/3, Mistral, most current open models</td></tr>
    <tr><td><span class="hl">MLA</span> (Multi-head Latent Attention)</td><td>Compresses K/V into a small shared latent vector before caching, then reconstructs per-head — big cache savings with little quality loss</td><td>DeepSeek-V2/V3</td></tr>
  </table>
  <div class="info-box green"><strong>Why this is in an inference module too:</strong> GQA and MLA exist purely to shrink the KV cache (covered later) — the memory cost of remembering every token's Key and Value during generation. Smaller KV cache means longer context and higher throughput per GPU, which is why nearly every current frontier model uses one of these variants instead of plain MHA.</div>
</div>`,

'llm:architecture': () => `<div class="panel" id="panel-llm-architecture">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">The Transformer</span> › Architecture</div>
  <h1>Transformer <span class="hl">Architecture</span></h1>
  <p class="lead">A transformer stacks the same building block — an attention layer plus a feed-forward network — dozens or hundreds of times. Tokens flow up through these layers, their representations refined at each step, until the top layer predicts the next token.</p>
  <h2>The Anatomy of a Layer</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// ONE TRANSFORMER BLOCK (repeated N times)</div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;max-width:340px;margin:0 auto;">
      <div class="flow-node c-accent" style="width:100%;text-align:center;"><div class="node-name" style="font-size:12px;">Input from previous layer</div></div>
      <div style="color:var(--accent)">↓</div>
      <div class="flow-node c-amber" style="width:100%;text-align:center;"><div class="node-name" style="font-size:12px;">Multi-Head Attention</div><div class="node-sub">tokens exchange information</div></div>
      <div style="color:var(--accent)">↓ + residual</div>
      <div class="flow-node c-violet" style="width:100%;text-align:center;"><div class="node-name" style="font-size:12px;">Feed-Forward Network</div><div class="node-sub">per-token processing</div></div>
      <div style="color:var(--accent)">↓ + residual</div>
      <div class="flow-node c-green" style="width:100%;text-align:center;"><div class="node-name" style="font-size:12px;">Output to next layer</div></div>
    </div>
  </div>
  <h2>The Key Components</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Attention sub-layer <span class="acc-arrow">▾</span></div><div class="acc-body">Where tokens communicate. Each token gathers relevant information from all others via the Q/K/V mechanism. This is the only place tokens "talk to each other" — the feed-forward layer processes each independently.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Feed-forward network (FFN) <span class="acc-arrow">▾</span></div><div class="acc-body">A small neural network applied to each token independently. This is where much of the model's stored "knowledge" lives — the FFN transforms each token's representation based on what was gathered by attention. Often the largest share of parameters.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Residual connections <span class="acc-arrow">▾</span></div><div class="acc-body">Each sub-layer adds its output to its input (rather than replacing it). These "skip connections" let information and gradients flow through very deep stacks without degrading — essential for training models hundreds of layers deep.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Layer normalization <span class="acc-arrow">▾</span></div><div class="acc-body">Keeps the numbers flowing through the network in a stable range, which makes training reliable. Applied around each sub-layer.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">The output head <span class="acc-arrow">▾</span></div><div class="acc-body">After the final layer, a projection maps the top token's vector to a score for every token in the vocabulary. Softmax turns these into probabilities — the model's prediction for the next token.</div></div>
  <h2>Scale: What "Large" Means</h2>
  <table class="data-table">
    <tr><th>Dimension</th><th>Typical range</th><th>Effect</th></tr>
    <tr><td>Layers (depth)</td><td>32 – 120+</td><td>More layers → more abstraction &amp; reasoning depth</td></tr>
    <tr><td>Hidden size (width)</td><td>4,096 – 16,384+</td><td>Wider vectors → more representational capacity</td></tr>
    <tr><td>Attention heads</td><td>32 – 128</td><td>More heads → more relationship types tracked</td></tr>
    <tr><td>Parameters (total)</td><td>billions – trillions</td><td>More parameters → more capacity &amp; knowledge</td></tr>
  </table>
  <div class="info-box green"><strong>Mixture of Experts (MoE):</strong> Most current frontier models use MoE — the feed-forward block is split into many "expert" sub-networks, and a learned router sends each token to only a handful of them (e.g. 8 of 256). This gives the knowledge capacity of a huge model at the compute cost of a much smaller one. DeepSeek-V3 is a concrete example: 671B total parameters, but only ~37B are active for any given token — GPT-4-class quality at a fraction of the inference compute. Mixtral-8x7B (46.7B total, ~13B active) was an earlier, smaller proof of the same idea. By 2025, MoE architectures power the majority of new frontier model releases — dense models like the original GPT-3 are increasingly the exception, not the rule.</div>
  <h2>Exercise: Dense vs. MoE Compute</h2>
  <div class="code-block"><span class="code-label">// WORK THROUGH THIS YOURSELF</span>A dense model has 70B parameters. Every token activates all 70B.

An MoE model has 8 experts of ~9B parameters each (72B total in FFN
layers, roughly comparable footprint), but the router picks only
2 experts per token.

<span class="c">// Q1: Roughly how many parameters does the MoE model actually</span>
<span class="c">//     "use" (compute against) per token?</span>
<span class="c">//     -> ~2 * 9B = 18B active, vs 70B for the dense model</span>

<span class="c">// Q2: If inference cost scales with active parameters, roughly how</span>
<span class="c">//     much cheaper per-token is the MoE forward pass?</span>
<span class="c">//     -> ~70/18 ≈ 3.9x cheaper, while the model "knows" as much as</span>
<span class="c">//        a 72B-class dense model would (and DeepSeek-V3 pushes this</span>
<span class="c">//        idea to 671B total / 37B active — about 18x leverage)</span></div>
</div>`,

'llm:context': () => `<div class="panel" id="panel-llm-context">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">The Transformer</span> › Context Windows</div>
  <h1>Context <span class="hl">Windows</span></h1>
  <p class="lead">The context window is the maximum amount of text — measured in tokens — a model can consider at once. It's the model's working memory: everything it can "see" when generating the next token, including your prompt, the conversation, and its own output so far.</p>
  <div class="info-box"><strong>Hard boundary:</strong> Everything must fit — system prompt + conversation history + retrieved context + the response being generated. Exceed the window and the oldest content must be dropped or compressed. The model has no memory beyond it.</div>
  <h2>Why Context Is Limited</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Attention compares every token to every other token. That's an <span class="hl">N-squared</span> relationship: double the context, quadruple the attention computation and memory. This quadratic cost is the fundamental reason context windows aren't infinite.</p>
  <div class="code-block"><span class="code-label">// THE QUADRATIC SCALING PROBLEM</span>1,000 tokens   ->  1,000,000 attention pairs
10,000 tokens  ->  100,000,000 attention pairs   (100x the cost)
100,000 tokens ->  10,000,000,000 attention pairs (10,000x)

<span class="c"># This is why long context is expensive and why much research</span>
<span class="c"># targets making attention cheaper (sparse, linear, flash attention).</span></div>
  <h2>How Context Windows Grew</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Early models had ~2K-4K token windows. Modern models reach 200K and beyond — some to 1M+. This came from advances in positional encoding (RoPE), efficient attention implementations (FlashAttention), and architectural tricks — not from brute force alone.</p>
  <h2>The "Lost in the Middle" Effect</h2>
  <div class="info-box amber"><strong>Important limitation:</strong> A large context window doesn't mean uniform attention across it. Models tend to recall information at the <span class="hl">beginning</span> and <span class="hl">end</span> of the context better than the middle. Put the most important instructions and content at the edges, not buried in the center of a long context.</div>
  <h2>Practical Implications</h2>
  <ul class="checklist">
    <li>Bigger context isn't free — cost and latency scale with tokens used, even within the limit</li>
    <li>"It fits in context" doesn't guarantee the model will use all of it equally well</li>
    <li>For large knowledge bases, RAG (retrieve only what's relevant) beats stuffing everything into context</li>
    <li>Position matters: lead with the system prompt, end with the current task — the high-attention zones</li>
    <li>Long conversations eventually need summarization/compression to stay within the window</li>
  </ul>
</div>`,

'llm:training': () => `<div class="panel" id="panel-llm-training">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Training &amp; Inference</span> › How Models Learn</div>
  <h1>How Models <span class="hl">Learn</span></h1>
  <p class="lead">A capable assistant is built in stages. First, massive self-supervised pre-training teaches language and knowledge. Then fine-tuning shapes that raw capability into something helpful, instruction-following, and aligned. Understanding the stages explains both the model's powers and its limits.</p>
  <h2>The Training Pipeline</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// FROM RAW TEXT TO HELPFUL ASSISTANT</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-accent" style="text-align:center;min-width:130px;"><div class="node-eyebrow">stage 1</div><div class="node-name" style="font-size:13px;">Pre-training</div><div class="node-sub">predict next token<br>(trillions of words)</div></div>
      <div style="color:var(--accent);font-size:18px;">→</div>
      <div class="flow-node c-amber" style="text-align:center;min-width:130px;"><div class="node-eyebrow">stage 2</div><div class="node-name" style="font-size:13px;">Fine-Tuning (SFT)</div><div class="node-sub">learn to follow<br>instructions</div></div>
      <div style="color:var(--accent);font-size:18px;">→</div>
      <div class="flow-node c-green" style="text-align:center;min-width:130px;"><div class="node-eyebrow">stage 3</div><div class="node-name" style="font-size:13px;">RLHF / Alignment</div><div class="node-sub">align with human<br>preferences</div></div>
    </div>
  </div>
  <h2>Stage 1 — Pre-training</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The model is shown enormous amounts of text and trained on one objective: predict the next token. To do this well, it's forced to learn grammar, facts, reasoning patterns, and world knowledge — all implicitly.</p>
  <div class="code-block"><span class="code-label">// SELF-SUPERVISED NEXT-TOKEN PREDICTION</span>Input:    "The capital of France is ___"
Target:   "Paris"

<span class="c"># No human labels needed — the text IS the supervision.</span>
<span class="c"># Repeat across trillions of tokens. The model learns the patterns</span>
<span class="c"># that make accurate prediction possible: language, facts, logic.</span>
<span class="c"># Result: a "base model" — knowledgeable but not yet an assistant.</span></div>
  <h2>Stage 2 — Supervised Fine-Tuning (SFT)</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The base model can complete text but doesn't reliably follow instructions. SFT trains it on curated examples of instructions paired with high-quality responses — teaching it the assistant behavior: answer questions, follow directions, use the right format.</p>
  <h2>Stage 3 — Alignment (RLHF)</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The final stage aligns the model with human preferences for helpfulness, honesty, and harmlessness — covered in depth in the next module.</p>
  <div class="info-box amber"><strong>Why knowledge has a cutoff:</strong> The model's factual knowledge is frozen at the moment pre-training data was collected. It can't know events after that "knowledge cutoff" unless given the information at runtime (via search or RAG). This is a direct consequence of how training works — the weights don't update after deployment.</div>
</div>`,

'llm:rlhf': () => `<div class="panel" id="panel-llm-rlhf">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Training &amp; Inference</span> › RLHF &amp; Alignment</div>
  <h1>RLHF <span class="hl">&amp; Alignment</span></h1>
  <p class="lead">A pre-trained, instruction-tuned model is capable but not necessarily helpful, honest, or safe in the way people want. Alignment — most famously via RLHF (Reinforcement Learning from Human Feedback) — closes that gap, shaping the model's behavior to match human preferences.</p>
  <div class="info-box"><strong>The gap alignment closes:</strong> A raw model might give a technically-correct-but-useless answer, ramble, confidently state falsehoods, or comply with harmful requests. Alignment teaches it to be genuinely helpful, to hedge appropriately, and to decline harmful asks.</div>
  <h2>How RLHF Works</h2>
  <div class="diagram-wrap">
    <div class="diagram-label">// RLHF IN THREE STEPS</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:12px;align-items:center;"><div class="flow-node c-accent" style="min-width:44px;text-align:center;"><div class="node-name">1</div></div><div style="font-size:13px;color:var(--muted2);"><strong style="color:var(--accent);">Collect preferences.</strong> Humans compare model responses to the same prompt and rank which is better.</div></div>
      <div style="display:flex;gap:12px;align-items:center;"><div class="flow-node c-amber" style="min-width:44px;text-align:center;"><div class="node-name" style="color:var(--amber)">2</div></div><div style="font-size:13px;color:var(--muted2);"><strong style="color:var(--amber);">Train a reward model.</strong> A separate model learns to predict human preference — to score any response the way a human would.</div></div>
      <div style="display:flex;gap:12px;align-items:center;"><div class="flow-node c-green" style="min-width:44px;text-align:center;"><div class="node-name" style="color:var(--green)">3</div></div><div style="font-size:13px;color:var(--muted2);"><strong style="color:var(--green);">Optimize the LLM.</strong> The model is fine-tuned (via RL) to produce responses the reward model scores highly — i.e., responses humans prefer.</div></div>
    </div>
  </div>
  <h2>Alignment Approaches</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">👍</div><div class="card-title">RLHF</div><div class="card-body">The classic approach. Human rankings → reward model → RL optimization. Powerful but complex and expensive to run.</div><span class="tag">classic</span></div>
    <div class="card"><div class="card-icon">⚡</div><div class="card-title">DPO</div><div class="card-body">Direct Preference Optimization. Skips the separate reward model, optimizing directly on preference pairs with a simple classification-style loss. Simpler and more stable than RLHF, and by the mid-2020s a dominant approach for many fine-tunes.</div><span class="tag amber">efficient</span></div>
    <div class="card"><div class="card-icon">🤖</div><div class="card-title">RLAIF</div><div class="card-body">Reinforcement Learning from AI Feedback. An AI model (guided by a constitution or rubric) generates the preference judgments instead of human raters — scales far beyond what human labeling budgets allow, often combined with DPO downstream.</div><span class="tag green">scalable</span></div>
    <div class="card"><div class="card-icon">📜</div><div class="card-title">Constitutional AI</div><div class="card-body">Anthropic's approach, used for the Claude family. The model critiques and revises its own outputs against a written set of principles (a "constitution"), then that self-critique data trains the model further — combining human data for helpfulness with AI feedback for harm avoidance.</div><span class="tag violet">principled</span></div>
  </div>
  <div class="info-box"><strong>These aren't mutually exclusive:</strong> Modern alignment pipelines typically chain several stages — e.g. SFT, then rejection sampling, then DPO and/or RLHF rounds, sometimes with RLAIF-generated preference data feeding the later rounds. Meta's Llama 4, for example, combined SFT, rejection sampling, PPO, and DPO across multiple refinement passes rather than relying on a single technique.</div>
  <h2>What Alignment Does and Doesn't Fix</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">✅</div><div class="cap-text"><strong style="color:var(--green)">Improves</strong><span>Helpfulness, instruction-following, tone, willingness to decline harmful requests, calibrated hedging.</span></div></li>
    <li><div class="cap-icon">⚠️</div><div class="cap-text"><strong style="color:var(--amber)">Doesn't eliminate</strong><span>Hallucination, knowledge cutoff, reasoning errors. Alignment shapes behavior and values — it doesn't make the model omniscient or perfectly truthful.</span></div></li>
  </ul>
  <div class="info-box green"><strong>Why "helpful, honest, harmless" recurs:</strong> These three goals (often called HHH) are the north star of alignment. Much of what makes a model pleasant and safe to use — versus a raw next-token predictor — comes from this stage.</div>
</div>`,

'llm:inference': () => `<div class="panel" id="panel-llm-inference">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Training &amp; Inference</span> › Inference &amp; Sampling</div>
  <h1>Inference <span class="hl">&amp; Sampling</span></h1>
  <p class="lead">Inference is the model in action: generating text one token at a time. At each step it produces a probability distribution over the entire vocabulary, then samples one token from it. The sampling strategy — controlled by parameters like temperature — shapes whether output is focused or creative.</p>
  <h2>Autoregressive Generation</h2>
  <div class="code-block"><span class="code-label">// ONE TOKEN AT A TIME</span>Prompt: "The eFuse protects against"

step 1 -> distribution over vocab -> sample -> "over"
step 2 -> "The eFuse protects against over" -> sample -> "current"
step 3 -> "...against overcurrent" -> sample -> " conditions"
...continues until a stop token or max length...

<span class="c"># Each generated token is appended and fed back in.</span>
<span class="c"># This loop is why generation latency scales with output length.</span></div>
  <h2>The Sampling Parameters</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Temperature — randomness control <span class="acc-arrow">▾</span></div><div class="acc-body">Scales the probability distribution before sampling. Temperature 0 = always pick the most likely token (deterministic, focused). Higher temperature flattens the distribution, making less-likely tokens more probable (diverse, creative). 0 for facts/code/extraction; 0.7-1.0 for creative writing.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Top-p (nucleus sampling) <span class="acc-arrow">▾</span></div><div class="acc-body">Only sample from the smallest set of tokens whose probabilities sum to p (e.g. 0.9). This dynamically limits choices to the plausible set, cutting off the long tail of unlikely tokens. A common default is 0.9-0.95.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Top-k <span class="acc-arrow">▾</span></div><div class="acc-body">Only consider the k most likely tokens at each step. Simpler than top-p but less adaptive (k is fixed regardless of how peaked the distribution is). Often used together with or instead of top-p.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Max tokens &amp; stop sequences <span class="acc-arrow">▾</span></div><div class="acc-body">Max tokens caps output length (and cost). Stop sequences are strings that immediately halt generation when produced — useful for enforcing structure (stop after a closing brace) or preventing run-on output.</div></div>
  <h2>Hands-On: Compute Temperature &amp; Top-p Yourself</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Work through this by hand to see exactly what temperature and top-p do to a real distribution. Suppose the model's raw next-token logits, after softmax at temperature 1, give these probabilities:</p>
  <div class="code-block"><span class="code-label">// STARTING DISTRIBUTION (temperature = 1)</span>token:  "current"  "voltage"  "circuit"  "banana"  "..."
prob:    0.50       0.30        0.15       0.04      0.01

<span class="c">// Step 1 — apply temperature T by rescaling logits before softmax:</span>
<span class="c">//   T &lt; 1 sharpens the distribution (more confident, less random)</span>
<span class="c">//   T &gt; 1 flattens it (more random, more "creative")</span>
<span class="c">// At T=0.5, the gap between "current" and "banana" widens further;</span>
<span class="c">// at T=1.5, probabilities move closer together (banana becomes</span>
<span class="c">// more reachable). At T=0, only "current" (the argmax) is ever picked.</span>

<span class="c">// Step 2 — apply top-p = 0.9 on the T=1 distribution above:</span>
<span class="c">// sort descending, keep adding until cumulative sum >= 0.9:</span>
0.50 (cum 0.50) + 0.30 (cum 0.80) + 0.15 (cum 0.95) -> STOP, keep these 3
<span class="c">// "banana" and "..." are cut entirely -- never sampled this step,</span>
<span class="c">// even though they had nonzero probability under temperature alone.</span>

<span class="c">// EXERCISE: with top-p = 0.75 instead, which tokens survive?</span>
<span class="c">// -> only "current" (0.50) and "voltage" (cum 0.80 >= 0.75) survive.</span>
<span class="c">// Notice: lowering p tightens the nucleus even with temperature fixed.</span></div>
  <div class="info-box amber"><strong>Try it for real:</strong> Call any chat completion API with the same prompt and <code class="inline">temperature: 0</code>, <code class="inline">logprobs: true</code> (or the closest equivalent) to see the actual top alternative tokens and their probabilities at each step — then re-run at <code class="inline">temperature: 1.2</code> and compare how much the output changes.</div>
  <h2>The KV Cache</h2>
  <div class="info-box violet"><strong>Why generation stays fast:</strong> Naively, generating each new token would recompute attention over all prior tokens. The <span class="hl">KV cache</span> stores the key and value vectors of already-processed tokens, so each new token only computes its own — turning quadratic recomputation into a manageable cost. The trade-off: the cache grows with context length and consumes significant memory — which is exactly why GQA, MQA, and MLA (covered in the Attention module) exist: they shrink what has to be cached per token.</div>
  <h2>Speeding Up Inference Further</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🎲</div><div class="card-title">Speculative Decoding</div><div class="card-body">A small, fast "draft" model guesses several tokens ahead; the large target model verifies them in a single parallel pass and accepts the ones that match what it would have generated anyway. Verified tokens are free — only mismatches require a normal full step. Modern variants even make the draft model a quantized copy of the target model itself (self-speculative decoding), reporting 2x+ speedups with little quality loss.</div><span class="tag">latency</span></div>
    <div class="card"><div class="card-icon">📉</div><div class="card-title">Quantization</div><div class="card-body">Storing weights (and sometimes the KV cache) in lower precision — 8-bit or 4-bit instead of 16/32-bit floats — shrinks memory footprint and speeds up compute, usually with a small, often negligible, quality cost. Combining 4-bit weight quantization with a quantized KV cache compounds the savings, which is why it's now common in both research and production serving stacks.</div><span class="tag amber">memory</span></div>
    <div class="card"><div class="card-icon">📦</div><div class="card-title">Batching</div><div class="card-body">Serving many requests together lets the GPU do more useful matrix-multiply work per memory load. Continuous batching (dynamically adding new requests to an in-flight batch rather than waiting for a fixed batch to finish) is standard in production inference servers.</div><span class="tag violet">throughput</span></div>
  </div>
  <h2>Why Outputs Vary</h2>
  <ul class="checklist">
    <li>At temperature &gt; 0, sampling introduces randomness — the same prompt can give different outputs</li>
    <li>Temperature 0 is near-deterministic but not always perfectly reproducible across hardware/batching</li>
    <li>This is by design — it's what enables creativity and diversity, but it's why you must evaluate over many samples</li>
  </ul>
</div>`,

'llm:limits': () => `<div class="panel" id="panel-llm-limits">
  <div class="breadcrumb">LLM Core › <span class="bc-accent">Training &amp; Inference</span> › Limits &amp; Failure Modes</div>
  <h1>Limits <span class="hl">&amp; Failure Modes</span></h1>
  <p class="lead">Understanding how LLMs work reveals why they fail in characteristic ways. These aren't random bugs — they're direct consequences of the architecture and training. Knowing them makes you a sharper, safer user and builder.</p>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🌀 Hallucination <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> The model generates the most plausible continuation, not the verified-true one. It has no built-in fact-checker — when it lacks knowledge, it produces confident-sounding text anyway. <strong>Mitigation:</strong> Ground answers in retrieved sources (RAG), ask for citations, verify factual claims, use lower temperature for factual tasks.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">📅 Knowledge cutoff <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> Knowledge is frozen at training time. The model cannot know later events. <strong>Mitigation:</strong> Provide current information at runtime via web search or RAG. Never rely on the model for recent facts without grounding.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔢 Arithmetic &amp; precise counting <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> Numbers tokenize awkwardly and the model predicts patterns rather than computing. Character-level tasks (counting letters) are hard because the model sees tokens, not characters. <strong>Mitigation:</strong> Give the model a calculator/code tool for math; don't trust mental arithmetic on important numbers.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🪟 Context limitations <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> Finite context window plus the "lost in the middle" effect means information can be dropped or under-weighted. <strong>Mitigation:</strong> Keep critical content at the start/end; use RAG instead of stuffing; summarize long histories.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🎭 Sycophancy &amp; suggestibility <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> Trained partly on human approval, models can over-agree, mirror a user's stated (wrong) belief, or be steered by leading questions. <strong>Mitigation:</strong> Ask neutrally; request the model to argue both sides; don't telegraph the answer you want if you want an honest assessment.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">🔓 Prompt injection &amp; jailbreaks <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> The model can't fundamentally distinguish trusted instructions from untrusted content in its context. <strong>Mitigation:</strong> Structural separation, input filtering, least privilege, human-in-the-loop (covered in the Prompt Engineering course).</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">⚖️ Bias &amp; uneven knowledge <span class="acc-arrow">▾</span></div><div class="acc-body"><strong>Why:</strong> Models reflect patterns and imbalances in their training data — including societal biases and uneven coverage across topics, languages, and domains. <strong>Mitigation:</strong> Evaluate across groups and edge cases; don't assume uniform competence across all domains; keep humans in the loop for consequential decisions.</div></div>
  <div class="info-box green"><strong>The throughline:</strong> Every failure mode traces back to what an LLM fundamentally is — a probabilistic pattern-completer trained on a fixed corpus. It is not a database, a calculator, or a reasoning engine with ground truth. Used with that understanding — grounded, verified, and supervised where it matters — it's extraordinarily powerful.</div>
</div>`,
