'rag:why': () => `<div class="panel" id="panel-rag-why">
  <div class="breadcrumb">RAG › <span class="bc-accent">Foundations</span> › Why RAG?</div>
  <h1>Why <span class="hl">RAG?</span></h1>
  <p class="lead">Retrieval-Augmented Generation connects an LLM to an external knowledge source at query time. Instead of relying on what the model memorized during training, RAG retrieves relevant information and feeds it into the context — so answers are grounded, current, and citable.</p>
  <div class="info-box"><strong>One-line definition:</strong> RAG = retrieve relevant documents, then generate an answer using those documents as context. The model reasons over your data instead of guessing from memory.</div>
  <h2>The Problems RAG Solves</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🌀</div><div class="card-title">Hallucination</div><div class="card-body">LLMs confidently fabricate facts. Grounding answers in retrieved evidence — with citations — keeps the model honest and verifiable.</div><span class="tag">accuracy</span></div>
    <div class="card"><div class="card-icon">📅</div><div class="card-title">Stale Knowledge</div><div class="card-body">Training data has a cutoff. RAG injects current information — today's docs, latest specs — without retraining the model.</div><span class="tag amber">freshness</span></div>
    <div class="card"><div class="card-icon">🔒</div><div class="card-title">Private Data</div><div class="card-body">Models don't know your internal wikis, datasheets, or codebase. RAG gives access to proprietary knowledge without fine-tuning.</div><span class="tag violet">private</span></div>
    <div class="card"><div class="card-icon">🔍</div><div class="card-title">Traceability</div><div class="card-body">RAG answers cite their sources. Users can verify claims against the original document — essential for regulated and technical domains.</div><span class="tag green">citations</span></div>
  </div>
  <h2>RAG vs. Fine-Tuning vs. Long Context</h2>
  <table class="data-table">
    <tr><th>Approach</th><th>Best for</th><th>Updates</th><th>Cost</th><th>Citations</th></tr>
    <tr><td><span class="hl">RAG</span></td><td>Factual Q&A over a large/changing knowledge base</td><td class="chk">Instant (re-index)</td><td class="chk">Low</td><td class="chk">Yes</td></tr>
    <tr><td><span class="hl-amber">Fine-Tuning</span></td><td>Consistent style, format, or specialized behavior</td><td class="xmark">Retrain required</td><td class="xmark">High</td><td class="xmark">No</td></tr>
    <tr><td><span class="hl-violet">Long Context</span></td><td>One-off analysis of a specific document set</td><td class="chk">Per-request</td><td class="partial">△ Token cost scales</td><td class="partial">△ Limited</td></tr>
  </table>
  <div class="info-box green"><strong>They combine:</strong> RAG and fine-tuning are not mutually exclusive. Fine-tune for format and tone; use RAG for facts. Many production systems use both — a fine-tuned model that follows your house style, retrieving from a live knowledge base.</div>
  <h2>When NOT to Use RAG</h2>
  <ul class="checklist">
    <li>The answer is general knowledge the model already knows well (no retrieval needed)</li>
    <li>The task is creative or open-ended, with no factual grounding required</li>
    <li>The entire relevant knowledge fits comfortably in the context window every time (just include it directly)</li>
    <li>You need the model to learn a behavior or style — that's fine-tuning territory, not retrieval</li>
  </ul>
</div>`,

'rag:pipeline': () => `<div class="panel" id="panel-rag-pipeline">
  <div class="breadcrumb">RAG › <span class="bc-accent">Foundations</span> › The RAG Pipeline</div>
  <h1>The RAG <span class="hl">Pipeline</span></h1>
  <p class="lead">A RAG system has two phases: an offline <em>indexing</em> phase that prepares your knowledge base, and an online <em>retrieval + generation</em> phase that answers queries. Understanding both is essential to building and debugging RAG.</p>
  <div class="diagram-wrap">
    <div class="diagram-label">// PHASE 1 — INDEXING (offline, one-time + on updates)</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;">
      <div class="flow-node c-accent" style="min-width:90px;text-align:center;"><div class="node-eyebrow">source</div><div class="node-name" style="font-size:12px;">Documents</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="min-width:90px;text-align:center;"><div class="node-eyebrow">split</div><div class="node-name" style="font-size:12px;">Chunk</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="min-width:90px;text-align:center;"><div class="node-eyebrow">encode</div><div class="node-name" style="font-size:12px;">Embed</div></div>
      <div style="color:var(--accent)">→</div>
      <div class="flow-node c-accent" style="min-width:90px;text-align:center;"><div class="node-eyebrow">store</div><div class="node-name" style="font-size:12px;">Vector DB</div></div>
    </div>
  </div>
  <div class="diagram-wrap">
    <div class="diagram-label">// PHASE 2 — RETRIEVAL + GENERATION (online, per query)</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">user</div><div class="node-name" style="font-size:12px;">Query</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">encode</div><div class="node-name" style="font-size:12px;">Embed</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">search</div><div class="node-name" style="font-size:12px;">Retrieve</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">reorder</div><div class="node-name" style="font-size:12px;">Rerank</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">build</div><div class="node-name" style="font-size:12px;">Augment</div></div>
      <div style="color:var(--amber)">→</div>
      <div class="flow-node c-amber" style="min-width:80px;text-align:center;"><div class="node-eyebrow">LLM</div><div class="node-name" style="font-size:12px;">Generate</div></div>
    </div>
  </div>
  <h2>The Seven Steps</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">1. Load — ingest source documents <span class="acc-arrow">▾</span></div><div class="acc-body">Pull in your raw knowledge: PDFs, web pages, wikis, databases, datasheets. Parse each into clean text, stripping boilerplate, navigation, and formatting noise. Extract metadata (title, source, date, section) — you'll use it for filtering and citations.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">2. Chunk — split into retrievable units <span class="acc-arrow">▾</span></div><div class="acc-body">Break documents into chunks small enough to be precise but large enough to be meaningful. Chunk by semantic boundary (paragraph, section) with overlap. This is one of the highest-impact design decisions — covered in depth in the Chunking module.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">3. Embed — convert chunks to vectors <span class="acc-arrow">▾</span></div><div class="acc-body">Run each chunk through an embedding model to produce a dense vector capturing its meaning. The same model must embed both chunks (at index time) and queries (at search time) so they live in the same vector space.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">4. Store — index in a vector database <span class="acc-arrow">▾</span></div><div class="acc-body">Store vectors alongside their source text and metadata in a vector database that supports fast approximate nearest-neighbor search. The DB builds an index (HNSW, IVF) enabling sub-millisecond similarity search over millions of vectors.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">5. Retrieve — find relevant chunks <span class="acc-arrow">▾</span></div><div class="acc-body">Embed the user query, then search the vector DB for the top-K most similar chunks. Optionally combine with keyword search (hybrid) and apply metadata filters (date, source, permissions).</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">6. Augment — build the prompt <span class="acc-arrow">▾</span></div><div class="acc-body">Insert the retrieved chunks into a prompt template alongside the user's question and a grounding instruction ("answer only from this context, cite sources"). This augmented prompt is what the LLM actually sees.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">7. Generate — produce the grounded answer <span class="acc-arrow">▾</span></div><div class="acc-body">The LLM reads the augmented prompt and generates an answer grounded in the retrieved context, ideally citing which chunks it used. Post-process to verify citations and format the response.</div></div>
</div>`,

'rag:embeddings': () => `<div class="panel" id="panel-rag-embeddings">
  <div class="breadcrumb">RAG › <span class="bc-accent">Foundations</span> › Embeddings</div>
  <h1><span class="hl">Embeddings</span></h1>
  <p class="lead">Embeddings are the heart of semantic retrieval. An embedding model converts text into a dense vector — a list of numbers — where semantically similar texts produce vectors that are close together in space. This is what lets RAG find meaning, not just keywords.</p>
  <div class="info-box"><strong>Intuition:</strong> "How do I reset my password?" and "I forgot my login credentials" share almost no words, but mean nearly the same thing. Their embeddings sit close together — so a query about one retrieves chunks about the other. Keyword search would miss this entirely.</div>
  <h2>How Embeddings Work</h2>
  <div class="code-block"><span class="code-label">// EMBEDDING A PIECE OF TEXT</span>text  = "The eFuse provides overcurrent protection at 12A"
vector = embed(text)
<span class="c">// -> [0.021, -0.044, 0.118, ..., 0.007]  (e.g. 1536 dimensions)</span>

<span class="c">// Similarity between two texts = cosine of angle between vectors</span>
similarity(embed("overcurrent protection"), embed("eFuse 12A limit"))
<span class="c">// -> 0.83  (high — semantically related)</span>

similarity(embed("overcurrent protection"), embed("Tuesday lunch menu"))
<span class="c">// -> 0.04  (low — unrelated)</span></div>
  <h2>Choosing an Embedding Model (current generation)</h2>
  <table class="data-table">
    <tr><th>Model</th><th>Provider</th><th>Dimensions</th><th>Notes</th></tr>
    <tr><td><span class="hl">voyage-3.5 / voyage-3-large</span></td><td>Voyage AI (Anthropic-recommended)</td><td>1024 (configurable)</td><td>Top-tier on code &amp; technical retrieval; instruction-tunable variants</td></tr>
    <tr><td><span class="hl">gemini-embedding-001</span></td><td>Google</td><td>3072 (truncatable)</td><td>Strong general + multilingual; unified model replacing prior Gecko line</td></tr>
    <tr><td><span class="hl-amber">text-embedding-3-large / -small</span></td><td>OpenAI</td><td>3072 / 1536 (scalable)</td><td>Safe default, dimension-adjustable via API param</td></tr>
    <tr><td><span class="hl-violet">embed-v4</span></td><td>Cohere</td><td>1536 (Matryoshka)</td><td>Multimodal (text+image) and multilingual; emits dense + sparse vectors for hybrid in one call</td></tr>
    <tr><td><span class="hl-green">BGE-M3 / Qwen3-Embedding</span></td><td>Open source (BAAI / Alibaba)</td><td>1024</td><td>Self-hostable, no API cost, multi-vector (dense+sparse+multi-vector) output</td></tr>
  </table>
  <div class="info-box amber"><strong>Stay current:</strong> embedding leaderboards move fast — check the <span class="hl">MTEB</span> (Massive Text Embedding Benchmark) leaderboard before locking in a model, and always benchmark candidates on a sample of <em>your own</em> documents and queries rather than trusting a generic leaderboard rank.</div>
  <h2>Key Principles</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🔗</div><div class="cap-text"><strong style="color:var(--accent)">Same model for index and query</strong><span>Chunks and queries must be embedded by the same model. Different models produce incompatible vector spaces — similarity scores become meaningless.</span></div></li>
    <li><div class="cap-icon">📏</div><div class="cap-text"><strong style="color:var(--accent)">Dimensions trade quality for cost</strong><span>Higher dimensions capture more nuance but cost more storage and compute. Matryoshka-style models (OpenAI text-embedding-3, Cohere embed-v4, Gemini) let you truncate dimensions post-hoc to trade quality for speed without re-embedding.</span></div></li>
    <li><div class="cap-icon">🌐</div><div class="cap-text"><strong style="color:var(--accent)">Domain matters</strong><span>General embedding models can struggle with highly specialized jargon. For technical domains (hardware, legal, medical), evaluate domain-tuned or stronger models — the quality gap is real.</span></div></li>
    <li><div class="cap-icon">📐</div><div class="cap-text"><strong style="color:var(--accent)">Normalize for cosine similarity</strong><span>Most RAG systems use cosine similarity. Many vector DBs expect normalized vectors — check whether your model outputs normalized embeddings or whether you must normalize them.</span></div></li>
  </ul>
  <h2>Try It — Embed and Compare Similarity Yourself</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">This is a runnable exercise. Install one embedding SDK, embed a few sentences, and compute cosine similarity by hand so the "vectors that mean similar things sit close together" claim stops being abstract.</p>
  <div class="code-block"><span class="code-label">// EXERCISE: COSINE SIMILARITY FROM SCRATCH</span>pip install voyageai numpy

import voyageai, numpy as np
vo = voyageai.Client()  <span class="c"># reads VOYAGE_API_KEY env var</span>

texts = [
    "How do I reset my password?",
    "I forgot my login credentials",
    "What's on the cafeteria menu today?",
]
result = vo.embed(texts, model="voyage-3.5", input_type="document")
vecs = np.array(result.embeddings)

def cosine(a, b):
    return np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b))

print("password vs forgot-login:", cosine(vecs[0], vecs[1]))  <span class="c"># expect high, e.g. ~0.7-0.9</span>
print("password vs menu:       ", cosine(vecs[0], vecs[2]))  <span class="c"># expect low, e.g. &lt;0.3</span>

<span class="c"># TASK: swap in 3 sentences from your own domain. Does a near-duplicate</span>
<span class="c"># meaning score high even with completely different words? If not,</span>
<span class="c"># this embedding model may be a poor fit for your content.</span></div>
  <div class="info-box green"><strong>What to look for:</strong> if two paraphrased sentences don't score meaningfully higher than two unrelated ones on your own data, that's a signal to benchmark a different embedding model before building anything else on top of it.</div>
</div>`,

'rag:chunking': () => `<div class="panel" id="panel-rag-chunking">
  <div class="breadcrumb">RAG › <span class="bc-accent">Retrieval Engine</span> › Chunking Strategies</div>
  <h1>Chunking <span class="hl">Strategies</span></h1>
  <p class="lead">Chunking — how you split documents before embedding — is one of the highest-impact, most underrated decisions in RAG. Bad chunking breaks meaning across boundaries; good chunking keeps each chunk coherent and retrievable.</p>
  <div class="info-box amber"><strong>The core tension:</strong> Chunks that are too small lack context (a retrieved sentence with no surrounding meaning). Chunks that are too large dilute relevance (the key fact is buried in noise, and you waste context tokens). The art is finding the right granularity for your content.</div>
  <h2>Chunking Approaches</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'ct1','c-fixed')">Fixed-Size</button>
    <button class="tab-btn" onclick="switchTab(this,'ct1','c-semantic')">Semantic</button>
    <button class="tab-btn" onclick="switchTab(this,'ct1','c-recursive')">Recursive</button>
    <button class="tab-btn" onclick="switchTab(this,'ct1','c-parent')">Parent-Child</button>
    <button class="tab-btn" onclick="switchTab(this,'ct1','c-late')">Late Chunking</button>
  </div>
  <div id="ct1">
    <div class="tab-content active" id="c-fixed">
      <h2>Fixed-Size Chunking</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Split every N tokens/characters with a fixed overlap. Simplest approach. Fast, predictable, but blind to structure — can cut mid-sentence.</p>
      <div class="code-block"><span class="code-label">// FIXED-SIZE WITH OVERLAP</span>chunk_size    = 512   <span class="c"># tokens per chunk</span>
chunk_overlap = 64    <span class="c"># ~12% overlap to preserve boundary context</span>

<span class="c"># Chunk 1: tokens   0-512</span>
<span class="c"># Chunk 2: tokens 448-960   (64-token overlap with chunk 1)</span>
<span class="c"># Chunk 3: tokens 896-1408</span></div>
      <div class="info-box"><strong>Use when:</strong> Content is uniform and unstructured (plain prose). Good baseline to start with before optimizing.</div>
    </div>
    <div class="tab-content" id="c-semantic">
      <h2>Semantic Chunking</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Split at natural semantic boundaries — paragraphs, sections, headings. Each chunk is a coherent unit of meaning. Higher quality, more work to implement.</p>
      <ul class="checklist">
        <li>Split on document structure: headings, sections, paragraphs</li>
        <li>Keep tables, code blocks, and lists intact as single chunks</li>
        <li>Respect natural topic boundaries rather than arbitrary token counts</li>
        <li>Attach section headers to each chunk as context ("Section 5.4.2: Overcurrent Protection — ...")</li>
      </ul>
      <div class="info-box green"><strong>Best for:</strong> Structured documents — datasheets, standards, technical manuals, wikis. The structure already marks meaningful boundaries.</div>
    </div>
    <div class="tab-content" id="c-recursive">
      <h2>Recursive Chunking</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Try to split on the largest natural separator first (sections), and recursively fall back to smaller ones (paragraphs, then sentences) until chunks fit the target size. The pragmatic default in most RAG frameworks.</p>
      <div class="code-block"><span class="code-label">// RECURSIVE SEPARATOR PRIORITY</span>separators = [
  "\n\n\n",   <span class="c"># section breaks (try first)</span>
  "\n\n",     <span class="c"># paragraphs</span>
  "\n",       <span class="c"># lines</span>
  ". ",       <span class="c"># sentences</span>
  " "         <span class="c"># words (last resort)</span>
]
<span class="c"># Split on the biggest separator that keeps chunks under the size limit</span></div>
    </div>
    <div class="tab-content" id="c-parent">
      <h2>Parent-Child (Small-to-Big)</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Embed small, precise child chunks for accurate retrieval — but return the larger parent chunk to the LLM for full context. Best of both worlds: precise matching, rich context.</p>
      <div class="code-block"><span class="code-label">// PARENT-CHILD RETRIEVAL</span><span class="c"># Index: embed small child chunks (e.g. single sentences)</span>
child_chunks = split_into_sentences(parent_section)
embed_and_store(child_chunks, metadata={parent_id: section.id})

<span class="c"># Retrieve: match on child (precise), return parent (context)</span>
matched_child = vector_search(query)
return get_parent(matched_child.parent_id)  <span class="c"># full section to LLM</span></div>
      <div class="info-box violet"><strong>Why it works:</strong> A specific sentence matches the query precisely (high retrieval accuracy), but the LLM gets the whole surrounding section (rich context for generation). Solves the small-vs-large tradeoff elegantly.</div>
    </div>
    <div class="tab-content" id="c-late">
      <h2>Late Chunking</h2>
      <p style="color:var(--muted2);margin-bottom:12px;">Instead of splitting text first and embedding each small piece in isolation, late chunking runs a <em>long-context</em> embedding model over the <strong>whole document first</strong>, then pools the resulting token-level embeddings into chunks. Each chunk's vector is computed with full-document context already baked in.</p>
      <div class="code-block"><span class="code-label">// WHY IT HELPS: ANAPHORA</span><span class="c"># Document: "The MAX17761 is a smart eFuse. It trips at 12A and</span>
<span class="c">#            shuts down thermally at 150C."</span>
<span class="c">#</span>
<span class="c"># Naive chunking might split into:</span>
<span class="c">#   Chunk A: "The MAX17761 is a smart eFuse."</span>
<span class="c">#   Chunk B: "It trips at 12A and shuts down thermally at 150C."</span>
<span class="c">#</span>
<span class="c"># Chunk B embedded ALONE has no idea what "It" refers to.</span>
<span class="c"># Late chunking embeds the full passage first, so Chunk B's vector</span>
<span class="c"># still carries the "MAX17761 eFuse" signal even after splitting.</span></div>
      <div class="info-box"><strong>Tradeoffs:</strong> requires a long-context embedding model (8K+ tokens) and is more expensive per document than chunk-then-embed. Most valuable when your documents are full of pronouns, cross-references, or section headers that earlier text disambiguates — research shows meaningful recall gains specifically on documents with heavy anaphoric reference. For straightforward prose, recursive or semantic chunking is usually good enough.</div>
    </div>
  </div>
  <h2>Chunking Rules of Thumb</h2>
  <ul class="checklist">
    <li>Start with 256–512 tokens per chunk, 10–20% overlap — then tune based on eval results (note: overlap shows little benefit if you're also running sparse/BM25 retrieval — measure on your own corpus)</li>
    <li>Never split tables, code blocks, or list items across chunks</li>
    <li>Prepend section/document headers to each chunk for standalone context</li>
    <li>Store rich metadata (source, section, page, date) for filtering and citations</li>
    <li>Test chunking empirically — measure retrieval recall on a golden query set</li>
    <li>If queries about pronouns/cross-references keep failing, try late chunking before reaching for a bigger model</li>
  </ul>
  <h2>Try It — Recursive Chunking, Hands-On</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Run this on a real text file and inspect the actual chunk boundaries — seeing where the splitter chose to cut is the fastest way to build intuition for chunk-size tradeoffs.</p>
  <div class="code-block"><span class="code-label">// EXERCISE: RECURSIVE CHARACTER SPLITTER</span>pip install langchain-text-splitters

from langchain_text_splitters import RecursiveCharacterTextSplitter

splitter = RecursiveCharacterTextSplitter(
    chunk_size=512,        <span class="c"># characters (swap for a token-based splitter in production)</span>
    chunk_overlap=64,
    separators=["\n\n", "\n", ". ", " "],
)

with open("my_document.txt") as f:
    text = f.read()

chunks = splitter.split_text(text)
print(f"{len(chunks)} chunks produced")
for i, c in enumerate(chunks[:3]):
    print(f"--- chunk {i} ({len(c)} chars) ---")
    print(c[:200], "...")

<span class="c"># TASK: try chunk_size=128 and chunk_size=1024 on the same document.</span>
<span class="c"># Inspect 3 chunks at each size. At which size do chunks start losing</span>
<span class="c"># coherent meaning? At which size do they start mixing unrelated topics?</span></div>
</div>`,

'rag:vectordbs': () => `<div class="panel" id="panel-rag-vectordbs">
  <div class="breadcrumb">RAG › <span class="bc-accent">Retrieval Engine</span> › Vector Databases</div>
  <h1>Vector <span class="hl">Databases</span></h1>
  <p class="lead">A vector database stores embeddings and performs fast similarity search over them. The right choice depends on scale, latency needs, existing infrastructure, and whether you need a managed service or self-hosted control.</p>
  <h2>How Vector Search Works</h2>
  <div class="info-box"><strong>The challenge:</strong> Comparing a query against millions of vectors one-by-one is too slow. Vector DBs use <span class="hl">Approximate Nearest Neighbor (ANN)</span> indexes — like HNSW or IVF — that find the closest vectors in sub-millisecond time by trading a tiny bit of accuracy for enormous speed.</div>
  <h2>The Major Options</h2>
  <div class="vendor-table">
    <div class="vendor-row vr-header"><div>Database</div><div>Type</div><div>Hosting</div><div>Best for</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">pgvector</div></div><div class="vendor-desc">Postgres extension. Add vector search to a database you already run. SQL filters + vectors in one query.</div><div><span class="status-badge sb-native">Self / Managed</span></div><div style="font-size:12px;color:var(--muted)">Existing Postgres shops</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">Pinecone</div></div><div class="vendor-desc">Fully managed, serverless vector DB. Zero ops, scales to billions. Popular for fast production launches.</div><div><span class="status-badge sb-beta">Managed</span></div><div style="font-size:12px;color:var(--muted)">Scale without ops</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">Weaviate</div></div><div class="vendor-desc">Open-source, built-in hybrid search and rerankers. Rich filtering, module ecosystem. Self-host or cloud.</div><div><span class="status-badge sb-native">Self / Cloud</span></div><div style="font-size:12px;color:var(--muted)">Hybrid search built-in</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">Qdrant</div></div><div class="vendor-desc">Open-source, Rust-based, very fast. Strong filtering and payload support. Self-host or managed cloud.</div><div><span class="status-badge sb-native">Self / Cloud</span></div><div style="font-size:12px;color:var(--muted)">Performance + filtering</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">Chroma</div></div><div class="vendor-desc">Lightweight, embedded. Runs in-process. Ideal for prototyping, notebooks, and small-to-medium apps.</div><div><span class="status-badge sb-beta">Embedded</span></div><div style="font-size:12px;color:var(--muted)">Prototyping &amp; dev</div></div>
    <div class="vendor-row"><div><div class="vendor-name" style="color:var(--accent)">Milvus</div></div><div class="vendor-desc">Open-source, built for billion-scale. Distributed architecture. Heavier to operate but massive scale.</div><div><span class="status-badge sb-partial">Self / Cloud</span></div><div style="font-size:12px;color:var(--muted)">Billion-scale</div></div>
  </div>
  <h2>Selection Guide</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🏃</div><div class="cap-text"><strong style="color:var(--accent)">Prototyping?</strong><span>Chroma — runs in-process, zero setup, perfect for notebooks and proofs of concept.</span></div></li>
    <li><div class="cap-icon">🐘</div><div class="cap-text"><strong style="color:var(--accent)">Already using Postgres?</strong><span>pgvector — keep vectors next to your relational data, combine SQL filters with vector search in one query. With an HNSW index, pgvector now matches or beats dedicated vector DBs at roughly 1M-vector scale, so for most teams already on Postgres, standing up a separate vector database isn't justified until scale or QPS genuinely demands it.</span></div></li>
    <li><div class="cap-icon">☁️</div><div class="cap-text"><strong style="color:var(--accent)">Want zero ops at scale?</strong><span>Pinecone — fully managed, serverless, sub-100ms latency at billions of vectors. You never touch an index. Pay for convenience.</span></div></li>
    <li><div class="cap-icon">🔧</div><div class="cap-text"><strong style="color:var(--accent)">Want control + hybrid search?</strong><span>Weaviate or Qdrant — open-source, self-hostable, with hybrid search and filtering built in. Qdrant tends to benchmark fastest for raw ANN latency; Weaviate has the most mature built-in hybrid-search tooling. Good for private/on-prem.</span></div></li>
  </ul>
  <div class="info-box amber"><strong>Don't over-choose:</strong> the vector DB is rarely the bottleneck in RAG quality — chunking, embeddings, and reranking matter far more. Pick the option with the least new operational surface area for your team (often pgvector if you already run Postgres) and revisit only if benchmarks show you actually need it.</div>
</div>`,

'rag:hybrid': () => `<div class="panel" id="panel-rag-hybrid">
  <div class="breadcrumb">RAG › <span class="bc-accent">Retrieval Engine</span> › Hybrid Search</div>
  <h1>Hybrid <span class="hl">Search</span></h1>
  <p class="lead">Pure semantic (vector) search captures meaning but can miss exact terms — part numbers, error codes, proper names, acronyms. Hybrid search combines vector search with keyword search to get the best of both: meaning <em>and</em> precision.</p>
  <div class="info-box"><strong>Why it matters for technical content:</strong> A query for "MAX17761 thermal shutdown" needs to match that exact part number. Embeddings might retrieve semantically similar power-management content while missing the specific part. Keyword search nails the exact term. Together, recall jumps.</div>
  <h2>The Two Search Types</h2>
  <div class="transport-row">
    <div class="t-cell tc-accent"><div class="tc-label">Dense / Semantic</div><div class="tc-name">Vector Search</div><div class="tc-desc">Matches meaning via embeddings. Finds conceptually related content even with different words. Misses exact rare terms.</div></div>
    <div class="t-cell tc-amber"><div class="tc-label">Sparse / Lexical</div><div class="tc-name">BM25 / Keyword</div><div class="tc-desc">Matches exact terms and their frequency. Nails part numbers, codes, names. Misses synonyms and paraphrases.</div></div>
    <div class="t-cell tc-green"><div class="tc-label">Combined</div><div class="tc-name">Hybrid</div><div class="tc-desc">Runs both, fuses the scores. Captures meaning AND exact matches. Outperforms either alone on most real corpora.</div></div>
  </div>
  <h2>Fusing the Results</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The standard fusion method is <span class="hl">Reciprocal Rank Fusion (RRF)</span> — it combines rankings from both searches without needing to normalize their different score scales.</p>
  <div class="code-block"><span class="code-label">// RECIPROCAL RANK FUSION</span><span class="c"># For each document, sum 1/(k + rank) across both result lists</span>
<span class="c"># k is a constant (commonly 60)</span>

RRF_score(doc) = sum over each search of:  1 / (k + rank_in_that_search)

<span class="c"># Example: a doc ranked #2 in vector and #5 in keyword search</span>
<span class="c"># = 1/(60+2) + 1/(60+5) = 0.0161 + 0.0154 = 0.0315</span>

<span class="c"># Documents appearing high in BOTH lists rise to the top</span></div>
  <h2>Practical Guidance</h2>
  <ul class="checklist">
    <li>Hybrid search consistently beats pure vector search on technical and enterprise corpora — measure it on your data</li>
    <li>Many vector DBs (Weaviate, Qdrant, pgvector, Cohere embed-v4's native sparse output) support hybrid search natively — check before building it yourself</li>
    <li>Weight the two methods based on your content: code/specs/IDs → lean keyword; conversational/conceptual → lean vector</li>
    <li>Always follow hybrid retrieval with a reranker for the final ordering (next module)</li>
  </ul>
  <h2>Try It — Implement RRF From Scratch</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">Fusion is simpler than it sounds. This exercise fuses two ranked lists (pretend one came from a vector search, one from BM25) using the same formula production systems use.</p>
  <div class="code-block"><span class="code-label">// EXERCISE: RECIPROCAL RANK FUSION</span>def rrf_fuse(vector_results, keyword_results, k=60, top_n=5):
    <span class="c">"""
    vector_results, keyword_results: lists of doc_ids, best match first.
    Returns doc_ids sorted by fused score, best first.
    """</span>
    scores = {}
    for rank, doc_id in enumerate(vector_results):
        scores[doc_id] = scores.get(doc_id, 0) + 1 / (k + rank + 1)
    for rank, doc_id in enumerate(keyword_results):
        scores[doc_id] = scores.get(doc_id, 0) + 1 / (k + rank + 1)
    return sorted(scores, key=scores.get, reverse=True)[:top_n]

<span class="c"># Pretend "doc7" matched well on meaning (vector) but "MAX17761" is an</span>
<span class="c"># exact part number only BM25 would rank highly</span>
vector_hits  = ["doc3", "doc7", "doc1", "doc9", "doc2"]
keyword_hits = ["doc9", "doc1", "doc7", "doc4", "doc3"]

print(rrf_fuse(vector_hits, keyword_hits))
<span class="c"># -> docs appearing high in BOTH lists (doc1, doc7, doc9) should rise to the top</span>

<span class="c"># TASK: change keyword_hits so "doc9" is #1 in both lists and confirm</span>
<span class="c"># it now wins the fused ranking. Then try k=10 vs k=200 — what changes?</span></div>
  <div class="info-box"><strong>What changing k does:</strong> a small k (e.g. 10) makes rank position matter a lot — being #1 vs #2 swings the score heavily. A large k (e.g. 200) flattens the differences, so appearing <em>anywhere</em> in both lists matters more than exact rank. 60 is the common default because it works well across most corpora.</div>
</div>`,

'rag:reranking': () => `<div class="panel" id="panel-rag-reranking">
  <div class="breadcrumb">RAG › <span class="bc-accent">Retrieval Engine</span> › Reranking</div>
  <h1><span class="hl">Reranking</span></h1>
  <p class="lead">Initial retrieval is fast but imprecise — it casts a wide net. A reranker is a second, more accurate pass that re-scores the top candidates against the query and reorders them so the truly most relevant chunks rise to the top. It's often the single highest-ROI addition to a RAG pipeline.</p>
  <div class="diagram-wrap">
    <div class="diagram-label">// RETRIEVE WIDE, RERANK NARROW</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;">
      <div class="flow-node c-accent" style="text-align:center;"><div class="node-eyebrow">fast pass</div><div class="node-name">Retrieve top 50</div><div class="node-sub">vector + keyword</div></div>
      <div style="color:var(--accent);font-size:20px;">→</div>
      <div class="flow-node c-amber" style="text-align:center;"><div class="node-eyebrow">accurate pass</div><div class="node-name">Rerank</div><div class="node-sub">cross-encoder scores each</div></div>
      <div style="color:var(--amber);font-size:20px;">→</div>
      <div class="flow-node c-green" style="text-align:center;"><div class="node-eyebrow">to LLM</div><div class="node-name">Keep top 5</div><div class="node-sub">most relevant only</div></div>
    </div>
  </div>
  <h2>Bi-Encoder vs. Cross-Encoder</h2>
  <table class="data-table">
    <tr><th></th><th>Bi-Encoder (retrieval)</th><th>Cross-Encoder (reranking)</th></tr>
    <tr><td><strong>How</strong></td><td>Embeds query and docs separately, compares vectors</td><td>Feeds query + doc together through the model</td></tr>
    <tr><td><strong>Speed</strong></td><td class="chk">Very fast (pre-computed)</td><td class="partial">△ Slower (per pair)</td></tr>
    <tr><td><strong>Accuracy</strong></td><td class="partial">△ Good</td><td class="chk">Much higher</td></tr>
    <tr><td><strong>Scale</strong></td><td class="chk">Millions of docs</td><td class="xmark">Only tens of candidates</td></tr>
  </table>
  <div class="info-box"><strong>Why the two-stage design:</strong> Cross-encoders are too slow to run against your whole corpus, but extremely accurate on a small candidate set. So retrieval (bi-encoder) narrows millions to ~50, then reranking (cross-encoder) picks the best ~5. Fast <em>and</em> accurate.</div>
  <h2>Reranker Options</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">🥇</div><div class="cap-text"><strong style="color:var(--accent)">Cohere Rerank</strong><span>Managed reranking API with a large context window, strong multilingual coverage, and consistently top-ranked quality. A popular default for production.</span></div></li>
    <li><div class="cap-icon">🔬</div><div class="cap-text"><strong style="color:var(--accent)">Voyage rerank</strong><span>Anthropic-recommended reranker, strong on technical, code, and instruction-following retrieval tasks; quality drops more than Cohere's on non-English languages, so check coverage if you're multilingual.</span></div></li>
    <li><div class="cap-icon">🆓</div><div class="cap-text"><strong style="color:var(--accent)">BGE-reranker / mxbai-rerank / open source</strong><span>Self-hostable cross-encoders. No API cost, full control — good for private deployments. Newer open releases are closing the gap with managed APIs.</span></div></li>
    <li><div class="cap-icon">🤖</div><div class="cap-text"><strong style="color:var(--accent)">LLM-as-reranker</strong><span>Use an LLM to score relevance directly. Flexible and powerful, but slower and more expensive than dedicated rerankers — best reserved for small candidate sets or when you need reasoning about relevance, not just a score.</span></div></li>
  </ul>
  <div class="info-box green"><strong>Impact:</strong> Adding a reranker is frequently the single biggest quality jump in a RAG pipeline — it directly fixes the "right document retrieved but buried at rank 8" problem that causes wrong or incomplete answers.</div>
  <h2>Try It — Measure the Reranker's Impact Yourself</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">The fastest way to internalize "reranking is high-ROI" is to watch a correct-but-buried result jump to the top.</p>
  <div class="code-block"><span class="code-label">// EXERCISE: BEFORE / AFTER RERANKING</span>pip install cohere

import cohere
co = cohere.Client()  <span class="c"># reads CO_API_KEY env var</span>

query = "What is the thermal shutdown threshold of the eFuse?"

<span class="c"># Pretend this is what fast vector search returned — note the answer</span>
<span class="c"># is in candidate index 4, buried near the bottom</span>
candidates = [
    "The eFuse supports hot-swap insertion without inrush current spikes.",
    "Power budget for the rail is 5W typical, 8W peak.",
    "Reverse polarity protection trips within 100 microseconds.",
    "The board uses a 4-layer PCB stackup for thermal dissipation.",
    "Thermal shutdown engages at 150C junction temperature and auto-recovers at 130C.",
]

reranked = co.rerank(query=query, documents=candidates, model="rerank-v3.5", top_n=5)
for r in reranked.results:
    print(f"score={r.relevance_score:.3f}  {candidates[r.index]}")

<span class="c"># TASK: confirm the thermal-shutdown sentence (originally rank 5) is now</span>
<span class="c"># rank 1 with a much higher score than the others. That gap IS the ROI.</span></div>
</div>`,

'rag:advanced': () => `<div class="panel" id="panel-rag-advanced">
  <div class="breadcrumb">RAG › <span class="bc-accent">Production</span> › Advanced Patterns</div>
  <h1>Advanced <span class="hl">Patterns</span></h1>
  <p class="lead">Beyond the basic pipeline, these patterns address the failure modes that emerge in real-world RAG: vague queries, multi-hop questions, and the gap between how questions and answers are phrased.</p>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Query Rewriting &amp; Expansion <span class="acc-arrow">▾</span></div><div class="acc-body">User queries are often vague or conversational ("what about the second option?"). An LLM rewrites the raw query into one or more search-optimized queries — resolving pronouns, adding context from conversation history, and expanding with synonyms. This dramatically improves retrieval recall for multi-turn conversations.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">HyDE — Hypothetical Document Embeddings <span class="acc-arrow">▾</span></div><div class="acc-body">Instead of embedding the question, ask an LLM to write a hypothetical <em>answer</em>, then embed that. Why? Answers are semantically closer to the document chunks you want to retrieve than questions are. A hypothetical answer about "eFuse thermal behavior" matches datasheet text better than the bare question does. The hypothetical answer can be wrong — it just needs to be in the right semantic neighborhood.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Multi-Query Retrieval <span class="acc-arrow">▾</span></div><div class="acc-body">Generate several variations of the user's query (different phrasings, sub-aspects), retrieve for each, and merge the deduplicated results. Catches relevant chunks that any single phrasing would miss. Especially useful for broad or ambiguous questions.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Metadata Filtering <span class="acc-arrow">▾</span></div><div class="acc-body">Combine vector search with structured filters: date ranges, document type, product line, access permissions. "Find spacing rules (vector) from the 2024 edition of the standard (metadata filter)." This prevents retrieving outdated or unauthorized content and sharply improves precision.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Agentic / Multi-Hop RAG <span class="acc-arrow">▾</span></div><div class="acc-body">For questions requiring multiple retrieval steps ("Compare the overcurrent specs of the part in design A vs design B"), an agent decomposes the question, retrieves for each sub-question, and synthesizes. Each hop's result informs the next query. Powerful but slower and more expensive — use when single-shot retrieval genuinely can't answer.</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Contextual Retrieval <span class="acc-arrow">▾</span></div><div class="acc-body">Before embedding each chunk, prepend a short LLM-generated context describing how the chunk fits in the larger document ("This chunk is from the thermal section of the MAX17761 datasheet, discussing shutdown thresholds"). This disambiguates chunks that would otherwise be unclear out of context, measurably improving retrieval accuracy.</div></div>
  <div class="info-box amber"><strong>Don't over-engineer:</strong> Start with a solid basic pipeline (good chunking + hybrid search + reranking). Add these advanced patterns only when evaluation reveals a specific failure they address. Each adds latency and cost.</div>
</div>`,

'rag:rageval': () => `<div class="panel" id="panel-rag-rageval">
  <div class="breadcrumb">RAG › <span class="bc-accent">Production</span> › Evaluating RAG</div>
  <h1>Evaluating <span class="hl">RAG</span></h1>
  <p class="lead">RAG has two failure surfaces — retrieval and generation — so it needs evaluation on both. A great answer from the wrong context is luck; a wrong answer from the right context is a generation bug. Measure them separately to know what to fix.</p>
  <h2>The Core RAG Metrics</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">🎯</div><div class="card-title">Context Recall</div><div class="card-body">Did retrieval fetch the chunks that actually contain the answer? The gating metric — if this is low, nothing downstream can save the answer.</div><span class="tag">retrieval</span></div>
    <div class="card"><div class="card-icon">🔍</div><div class="card-title">Context Precision</div><div class="card-body">Of the chunks retrieved, how many are actually relevant? Low precision wastes context tokens and can distract the model.</div><span class="tag amber">retrieval</span></div>
    <div class="card"><div class="card-icon">⚓</div><div class="card-title">Faithfulness</div><div class="card-body">Are the answer's claims actually supported by the retrieved context? Measures hallucination — the model inventing facts not in the source.</div><span class="tag red">generation</span></div>
    <div class="card"><div class="card-icon">✅</div><div class="card-title">Answer Relevance</div><div class="card-body">Does the answer actually address the user's question? A faithful answer to the wrong interpretation still fails the user.</div><span class="tag green">generation</span></div>
  </div>
  <h2>Diagnosing With the Metrics</h2>
  <table class="data-table">
    <tr><th>Recall</th><th>Faithfulness</th><th>Diagnosis</th><th>Fix</th></tr>
    <tr><td class="xmark">Low</td><td>—</td><td>Retrieval is failing</td><td>Chunking, embeddings, hybrid search, reranker</td></tr>
    <tr><td class="chk">High</td><td class="xmark">Low</td><td>Model hallucinating despite good context</td><td>Stronger grounding prompt; better model</td></tr>
    <tr><td class="chk">High</td><td class="chk">High</td><td>Answer relevance low → wrong interpretation</td><td>Query rewriting; clarify the prompt</td></tr>
    <tr><td class="chk">High</td><td class="chk">High</td><td>All good → ship it</td><td>Monitor in production</td></tr>
  </table>
  <h2>Tooling</h2>
  <ul class="cap-list">
    <li><div class="cap-icon">📐</div><div class="cap-text"><strong style="color:var(--accent)">RAGAS</strong><span>Open-source framework purpose-built for RAG evaluation. Computes faithfulness, answer relevance, context precision/recall using LLM-as-judge — free to use, the cost is the judge-model API calls.</span></div></li>
    <li><div class="cap-icon">🧪</div><div class="cap-text"><strong style="color:var(--accent)">TruLens / DeepEval</strong><span>Alternative open-source eval frameworks with the same core RAG metrics; both can point the judge at any OpenAI-compatible endpoint, including a self-hosted model, for evals that never leave your infrastructure.</span></div></li>
    <li><div class="cap-icon">🔭</div><div class="cap-text"><strong style="color:var(--accent)">LangSmith / Phoenix / Langfuse</strong><span>Trace every retrieval and generation step; build evaluation datasets; track metrics across pipeline changes over time.</span></div></li>
    <li><div class="cap-icon">📋</div><div class="cap-text"><strong style="color:var(--accent)">Golden Q&A set</strong><span>Curate 30–100 representative questions with known correct answers and known source chunks. Run on every change. Your most valuable RAG asset.</span></div></li>
  </ul>
  <h2>Try It — Run a Faithfulness Check</h2>
  <p style="color:var(--muted2);margin-bottom:12px;">You don't need a framework to start. This minimal LLM-as-judge faithfulness check is the same idea RAGAS automates at scale — run it once by hand to see exactly what it's checking.</p>
  <div class="code-block"><span class="code-label">// EXERCISE: MINIMAL LLM-AS-JUDGE FAITHFULNESS CHECK</span>import anthropic
client = anthropic.Anthropic()

context = "Thermal shutdown engages at 150C junction temperature and auto-recovers at 130C."
answer  = "The eFuse shuts down at 150C and turns back on once it cools to 130C."

judge_prompt = f"""You are checking whether an answer is fully supported by a
context. List each factual claim in the ANSWER, then mark it SUPPORTED or
UNSUPPORTED based only on the CONTEXT below. An UNSUPPORTED claim means the
context does not say this, even if it sounds plausible.

CONTEXT:
{context}

ANSWER:
{answer}"""

resp = client.messages.create(
    model="claude-sonnet-4-6", max_tokens=512,
    messages=[{"role": "user", "content": judge_prompt}]
)
print(resp.content[0].text)

<span class="c"># TASK: edit the answer variable to add one invented fact not in the context</span>
<span class="c"># (e.g. "...and has a 3-year warranty"). Confirm the judge marks it</span>
<span class="c"># UNSUPPORTED. This is exactly the kind of hallucination that</span>
<span class="c"># faithfulness scoring is designed to catch at scale.</span></div>
</div>`,

'rag:ragprod': () => `<div class="panel" id="panel-rag-ragprod">
  <div class="breadcrumb">RAG › <span class="bc-accent">Production</span> › Production Ops</div>
  <h1>Production <span class="hl">Ops</span></h1>
  <p class="lead">A RAG prototype in a notebook is one thing; a RAG system serving users reliably is another. These are the operational concerns that separate a demo from production.</p>
  <h2>Keeping the Index Fresh</h2>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Incremental Indexing <span class="acc-arrow">▾</span></div><div class="acc-body">Don't re-index everything on every change. Track document versions; when a source changes, re-chunk and re-embed only that document, and update its vectors in place. Use content hashes to detect actual changes and skip unchanged documents. Trigger on document-update events (webhook, file watcher, scheduled diff).</div></div>
  <div class="accordion"><div class="acc-header" onclick="toggleAcc(this)">Handling Deletions <span class="acc-arrow">▾</span></div><div class="acc-body">When a source document is deleted or superseded, its chunks must be removed from the index — otherwise the system retrieves and cites stale or retracted information. Tie chunk IDs to source document IDs so deletion is clean and complete.</div></div>
  <h2>Operational Concerns</h2>
  <div class="card-grid">
    <div class="card"><div class="card-icon">⚡</div><div class="card-title">Latency Budget</div><div class="card-body">Embed + retrieve + rerank + generate all add up. Budget each stage. Cache query embeddings for repeated queries; rerank fewer candidates if latency-bound.</div><span class="tag">performance</span></div>
    <div class="card"><div class="card-icon">💰</div><div class="card-title">Cost Control</div><div class="card-body">Embedding API calls, vector DB hosting, reranker calls, and generation tokens. Cache aggressively. Use smaller embedding dimensions where quality allows.</div><span class="tag amber">cost</span></div>
    <div class="card"><div class="card-icon">🔒</div><div class="card-title">Access Control</div><div class="card-body">Filter retrieval by user permissions via metadata. A user must never retrieve a chunk from a document they can't access. Enforce at query time.</div><span class="tag red">security</span></div>
    <div class="card"><div class="card-icon">📊</div><div class="card-title">Monitoring</div><div class="card-body">Log queries, retrieved chunks, and answers. Track retrieval hit rates, "no answer found" rates, and user feedback to catch quality drift.</div><span class="tag green">observability</span></div>
  </div>
  <h2>Handling "I Don't Know"</h2>
  <div class="info-box"><strong>Critical for trust:</strong> When retrieval returns nothing relevant, the system must say so — not fabricate an answer. Instruct the model: "If the context doesn't contain the answer, say you don't have that information." A RAG system that admits ignorance is far more trustworthy than one that confidently hallucinates. This is especially vital in technical and compliance contexts.</div>
  <h2>Production Checklist</h2>
  <ul class="checklist">
    <li>Incremental indexing pipeline with change detection and deletion handling</li>
    <li>Access-control filtering enforced at retrieval time</li>
    <li>"No relevant context" path that declines rather than hallucinates</li>
    <li>Citations linking every answer back to source chunks</li>
    <li>Latency and cost budgets per pipeline stage, with caching</li>
    <li>Golden eval set run on every index or prompt change</li>
    <li>Production logging of queries, retrievals, and user feedback</li>
  </ul>
</div>`,

'rag:impl': () => `<div class="panel" id="panel-rag-impl">
  <div class="breadcrumb">RAG › <span class="bc-accent">Training</span> › Host Setup Guides</div>
  <h1>RAG <span class="hl">Setup</span> by Platform</h1>
  <p class="lead">How to stand up a working RAG pipeline across common frameworks and platforms — from a notebook prototype to a managed service.</p>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'ri1','ri-langchain')">LangChain</button>
    <button class="tab-btn" onclick="switchTab(this,'ri1','ri-llamaindex')">LlamaIndex</button>
    <button class="tab-btn" onclick="switchTab(this,'ri1','ri-pgvector')">pgvector</button>
    <button class="tab-btn" onclick="switchTab(this,'ri1','ri-chroma')">Chroma</button>
    <button class="tab-btn" onclick="switchTab(this,'ri1','ri-anthropic')">Anthropic API</button>
  </div>
  <div id="ri1">
    <div class="tab-content active" id="ri-langchain">
      <h2>LangChain</h2>
      <div class="info-box"><strong>Best for:</strong> Composable pipelines, swapping components, broad integration ecosystem.</div>
      <div class="code-block"><span class="code-label">// MINIMAL RAG WITH LANGCHAIN</span>pip install langchain langchain-anthropic langchain-community chromadb

from langchain_community.vectorstores import Chroma
from langchain_anthropic import ChatAnthropic
from langchain.chains import RetrievalQA

# 1. Index (assumes docs already split into chunks)
db = Chroma.from_documents(chunks, embedding=my_embeddings)

# 2. Build retrieval QA chain
qa = RetrievalQA.from_chain_type(
    llm=ChatAnthropic(model="claude-sonnet-4-6"),
    retriever=db.as_retriever(search_kwargs={"k": 5})
)

# 3. Query
answer = qa.invoke("What is the overcurrent threshold?")</div>
    </div>
    <div class="tab-content" id="ri-llamaindex">
      <h2>LlamaIndex</h2>
      <div class="info-box"><strong>Best for:</strong> RAG-first framework with excellent defaults for indexing and retrieval.</div>
      <div class="code-block"><span class="code-label">// RAG WITH LLAMAINDEX</span>pip install llama-index llama-index-llms-anthropic

from llama_index.core import VectorStoreIndex, SimpleDirectoryReader
from llama_index.llms.anthropic import Anthropic

# Load + chunk + embed + index in one step
docs  = SimpleDirectoryReader("./datasheets").load_data()
index = VectorStoreIndex.from_documents(docs)

# Query engine with built-in retrieval + synthesis
engine = index.as_query_engine(
    llm=Anthropic(model="claude-sonnet-4-6"),
    similarity_top_k=5
)
print(engine.query("Summarize the thermal shutdown behavior"))</div>
    </div>
    <div class="tab-content" id="ri-pgvector">
      <h2>pgvector (Postgres)</h2>
      <div class="info-box"><strong>Best for:</strong> Teams already on Postgres who want vectors next to relational data.</div>
      <div class="code-block"><span class="code-label">// SETUP pgvector</span>-- Enable the extension
CREATE EXTENSION vector;

-- Table with a vector column (1536 dims for OpenAI embeddings)
CREATE TABLE chunks (
  id        bigserial PRIMARY KEY,
  source    text,
  content   text,
  embedding vector(1536)
);

-- Build an index for fast ANN search
CREATE INDEX ON chunks USING hnsw (embedding vector_cosine_ops);

-- Query: nearest neighbors to a query embedding
SELECT content, source
FROM chunks
ORDER BY embedding <=> '[0.01, -0.04, ...]'  -- query vector
LIMIT 5;</div>
    </div>
    <div class="tab-content" id="ri-chroma">
      <h2>Chroma (Prototyping)</h2>
      <div class="info-box green"><strong>Best for:</strong> Fast local prototyping — runs in-process, no server.</div>
      <div class="code-block"><span class="code-label">// CHROMA IN A NOTEBOOK</span>pip install chromadb

import chromadb
client = chromadb.Client()
col = client.create_collection("datasheets")

# Add documents (Chroma embeds them for you with a default model)
col.add(
    documents=["The eFuse trips at 12A...", "Thermal shutdown at 150C..."],
    ids=["c1", "c2"],
    metadatas=[{"source": "max17761"}, {"source": "max17761"}]
)

# Query
results = col.query(query_texts=["overcurrent limit"], n_results=3)</div>
    </div>
    <div class="tab-content" id="ri-anthropic">
      <h2>Anthropic API (Manual RAG)</h2>
      <div class="info-box"><strong>Best for:</strong> Full control over the augmentation prompt and grounding behavior.</div>
      <div class="code-block"><span class="code-label">// MANUAL AUGMENTATION + GENERATION</span>import anthropic
client = anthropic.Anthropic()

# After you've retrieved + reranked your top chunks:
context = "\n\n".join(f"[Doc {i+1}] {c}" for i, c in enumerate(top_chunks))

resp = client.messages.create(
    model="claude-sonnet-4-6", max_tokens=1024,
    system=("Answer using ONLY the provided context. Cite sources as [Doc N]. "
            "If the context lacks the answer, say so — do not guess."),
    messages=[{"role": "user",
               "content": f"Context:\n{context}\n\nQuestion: {query}"}]
)
print(resp.content[0].text)</div>
    </div>
  </div>
</div>`,
